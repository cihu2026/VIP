<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>🌿 後慈湖 VIP 行事曆 PRO</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Noto Sans TC",sans-serif;
}

body{

    background:
    linear-gradient(
        180deg,
        #10151f,
        #0b0f15
    );

    color:white;

    padding:18px;

    min-height:100vh;
}

.title{

    text-align:center;

    font-size:38px;

    font-weight:900;

    margin-top:10px;

    letter-spacing:1px;
}

.sub{

    text-align:center;

    opacity:.7;

    margin-top:10px;

    margin-bottom:28px;

    font-size:15px;
}

.card{

    background:
    rgba(255,255,255,.05);

    backdrop-filter:blur(14px);

    border:
    1px solid rgba(255,255,255,.08);

    border-radius:28px;

    padding:22px;

    margin-bottom:22px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.35);
}

.today{

    text-align:center;

    font-size:30px;

    font-weight:900;
}

.today-status{

    margin-top:18px;

    padding:20px;

    border-radius:24px;

    font-size:24px;

    font-weight:900;

    text-align:center;

    box-shadow:
    0 8px 25px rgba(0,0,0,.25);
}

.calendar{

    display:grid;

    grid-template-columns:
    repeat(7,1fr);

    gap:10px;

    margin-top:22px;
}

.day{

    background:
    rgba(255,255,255,.05);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:22px;

    min-height:110px;

    padding:10px;

    transition:.2s;
}

.day:hover{

    transform:translateY(-2px);

    background:
    rgba(255,255,255,.08);
}

.day-number{

    font-size:18px;

    font-weight:900;

    opacity:.9;
}

.event{

    margin-top:8px;

    padding:5px 8px;

    border-radius:12px;

    font-size:12px;

    font-weight:900;

    color:white;

    overflow:hidden;

    white-space:nowrap;

    text-overflow:ellipsis;

    box-shadow:
    0 4px 10px rgba(0,0,0,.25);
}

.detail-card{

    background:
    rgba(255,255,255,.05);

    border:
    1px solid rgba(255,255,255,.06);

    padding:20px;

    border-radius:24px;

    margin-top:16px;

    line-height:1.9;

    box-shadow:
    0 8px 20px rgba(0,0,0,.25);
}

.detail-card h3{

    font-size:24px;

    margin-bottom:10px;
}

.footer{

    text-align:center;

    opacity:.45;

    margin-top:35px;

    font-size:13px;
}

.badge{

    display:inline-block;

    padding:5px 12px;

    border-radius:999px;

    font-size:13px;

    font-weight:900;

    margin-left:8px;
}

</style>

</head>

<body>

<div class="title">
🌿 後慈湖 VIP 行事曆
</div>

<div class="sub">
AI 智慧排程｜Google Sheet 同步
</div>

<div class="card">

<div class="today">
📅 今日狀態
</div>

<div
id="todayStatus"
class="today-status">

⏳ 讀取中...

</div>

</div>

<div class="card">

<h2>
📆 本月 VIP 行事曆
</h2>

<div
class="calendar"
id="calendar">

</div>

</div>

<div class="card">

<h2>
📌 活動詳細資訊
</h2>

<div id="detail"></div>

</div>

<div class="footer">
VIP Calendar Dashboard PRO
</div>

<script>

// 🌿 Google Sheet CSV

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg/export?format=csv";

// 🌿 AI分類

function getType(text){

    text = text || "";

    if(
        text.includes("市長")
        ||
        text.includes("VIP")
        ||
        text.includes("貴賓")
    ){

        return {
            label:"VIP",
            color:"#ff5252"
        };
    }

    if(
        text.includes("拍攝")
        ||
        text.includes("攝影")
    ){

        return {
            label:"拍攝",
            color:"#9c27b0"
        };
    }

    if(
        text.includes("導覽")
    ){

        return {
            label:"導覽",
            color:"#00c853"
        };
    }

    return {
        label:"活動",
        color:"#2979ff"
    };
}

// 🌿 載入 Sheet

async function loadSheet(){

    try{

        const res =
        await fetch(SHEET_URL);

        const csv =
        await res.text();

        parseCSV(csv);

    }catch(err){

        console.error(err);

        document.getElementById(
            "todayStatus"
        ).innerHTML =
        "❌ 無法讀取 Google Sheet";
    }
}

// 🌿 CSV解析

function parseCSV(csv){

    const rows =
    csv.split("\n").slice(1);

    let events = [];

    rows.forEach(r=>{

        const cols = r.split(",");

        if(cols.length >= 8){

            events.push({

                date:cols[1],
                time:cols[2],
                name:cols[3],
                event:cols[4],
                people:cols[5],
                phone:cols[6],
                note:cols[7]
            });
        }
    });

    renderCalendar(events);
}

// 🌿 行事曆

function renderCalendar(events){

    const calendar =
    document.getElementById("calendar");

    const detail =
    document.getElementById("detail");

    calendar.innerHTML = "";

    detail.innerHTML = "";

    const today =
    new Date();

    const currentMonth =
    today.getMonth()+1;

    const daysInMonth =
    new Date(
        today.getFullYear(),
        currentMonth,
        0
    ).getDate();

    let todayVip = false;

    for(let day=1;day<=daysInMonth;day++){

        const dayDiv =
        document.createElement("div");

        dayDiv.className = "day";

        let html = `

        <div class="day-number">
            ${day}
        </div>
        `;

        events.forEach(e=>{

            if(!e.date) return;

            const match =
            e.date.match(/\d{1,2}\/(\d{1,2})/);

            if(match){

                const eventDay =
                parseInt(match[1]);

                if(eventDay===day){

                    const info =
                    getType(
                        `${e.event} ${e.note}`
                    );

                    html += `

                    <div
                    class="event"

                    style="
                    background:${info.color};
                    ">

                        ${info.label}

                    </div>
                    `;

                    detail.innerHTML += `

                    <div class="detail-card">

                        <h3>
                        📅 ${e.date}

                        <span
                        class="badge"

                        style="
                        background:${info.color};
                        ">

                        ${info.label}

                        </span>

                        </h3>

                        🕒 ${e.time}
                        <br>

                        👤 ${e.name}
                        <br>

                        📌 ${e.event}
                        <br>

                        👥 ${e.people}
                        <br>

                        ☎️ ${e.phone}
                        <br>

                        📝 ${e.note}

                    </div>
                    `;

                    if(
                        day===today.getDate()
                        &&
                        info.label==="VIP"
                    ){

                        todayVip = true;
                    }
                }
            }
        });

        dayDiv.innerHTML = html;

        calendar.appendChild(dayDiv);
    }

    // 今日狀態

    const status =
    document.getElementById("todayStatus");

    if(todayVip){

        status.innerHTML =
        "🔴 今日有 VIP / 貴賓活動";

        status.style.background =
        "linear-gradient(135deg,#ff5252,#ff1744)";

    }else{

        status.innerHTML =
        "🟢 今日無特殊貴賓";

        status.style.background =
        "linear-gradient(135deg,#00c853,#00b248)";
    }
}

// 🌿 啟動

loadSheet();

</script>

</body>
</html>
