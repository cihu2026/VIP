<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📅 後慈湖行程看板</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root {
            --bg: #0f172a;
            --card: rgba(255,255,255,0.07);
            --vip: #ff4d4d;
            --pending: #fbbf24;
            --today: #3b82f6;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: "Noto Sans TC", sans-serif; }
        body { background: var(--bg); color: #e2e8f0; padding: 10px; min-height: 100vh; }

        .header { text-align: center; margin: 15px 0; }
        .month-title { font-size: 28px; font-weight: 900; color: #fff; }

        /* 日曆區域 */
        .calendar-grid { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; 
            background: var(--card); padding: 12px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
        }
        .weekday { text-align: center; font-size: 16px; font-weight: 700; opacity: 0.6; color: #94a3b8; }
        .day { 
            aspect-ratio: 0.9 / 1; background: rgba(255,255,255,0.03); border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 22px; font-weight: 700; cursor: pointer; position: relative; border: 2px solid transparent;
        }
        .day.today { border: 3px solid var(--today); background: rgba(59, 130, 246, 0.25); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        .dots { display: flex; gap: 3px; margin-top: 5px; height: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* 行程清單區域 */
        .details-title { margin: 25px 0 15px; font-size: 24px; font-weight: 900; color: #fff; padding-left: 5px; border-left: 5px solid var(--today); padding-left: 15px; }
        .event-list { display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px; }
        .event-item { 
            background: var(--card); padding: 20px; border-radius: 20px; border-left: 10px solid var(--today);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .event-item.vip { border-left-color: var(--vip); background: rgba(255, 77, 77, 0.08); }
        .event-item.pending { border-left-color: var(--pending); background: rgba(251, 191, 36, 0.08); }

        .time-tag { font-size: 18px; font-weight: 900; color: #60a5fa; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .name-row { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: #fff; }
        .info-text { font-size: 19px; margin-bottom: 6px; opacity: 0.95; display: flex; align-items: center; gap: 8px; }
        .note-box { 
            margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 12px; 
            font-size: 18px; border-left: 4px solid #64748b; color: #cbd5e1; line-height: 1.5;
        }
        .badge { padding: 3px 10px; border-radius: 6px; font-size: 14px; color: #fff; font-weight: 900; }
    </style>
</head>
<body>

<div class="header">
    <div id="monthDisplay" class="month-title">載入中...</div>
</div>

<div class="calendar-grid" id="calendar">
    <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
    <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>
</div>

<div class="details-title">📌 <span id="selectedDateText">今日重點行程</span></div>
<div id="eventList" class="event-list"></div>

<script>
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

let allEvents = [];
const now = new Date();

async function init() {
    try {
        const res = await fetch(`${SHEET_URL}&cb=${new Date().getTime()}`);
        const csv = await res.text();
        allEvents = parseCSV(csv);
        renderCalendar(now.getFullYear(), now.getMonth());
        showEvents(now.getMonth() + 1, now.getDate());
    } catch (e) { document.getElementById("monthDisplay").innerText = "❌ 讀取失敗"; }
}

function parseCSV(csv) {
    const lines = csv.split(/\r?\n/).slice(1);
    const pattern = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
    return lines.map(line => {
        const c = line.split(pattern).map(v => v.replace(/^"|"$/g, '').trim());
        // 依照你的表格欄位索引：1:日期, 2:時間, 3:姓名, 4:活動, 5:人數, 6:電話, 7:備註
        if(!c[1] || !c[1].includes("/")) return null;
        const [m, d] = c[1].split("/").map(Number);
        return { month: m, day: d, time: c[2], name: c[3], event: c[4], people: c[5], phone: c[6], note: c[7] || "" };
    }).filter(e => e);
}

function renderCalendar(year, month) {
    const cal = document.getElementById("calendar");
    document.getElementById("monthDisplay").innerText = `${year}年 ${month + 1}月`;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    document.querySelectorAll('.day').forEach(d => d.remove());

    for(let i=0; i<firstDay; i++) {
        const div = document.createElement("div"); div.className = "day"; cal.appendChild(div);
    }

    for(let d=1; d<=daysInMonth; d++) {
        const div = document.createElement("div");
        div.className = "day";
        if(d === now.getDate() && month === now.getMonth()) div.classList.add("today");
        div.innerHTML = `<span>${d}</span>`;
        
        const dayEvents = allEvents.filter(e => e.month === (month + 1) && e.day === d);
        if(dayEvents.length > 0) {
            const dotContainer = document.createElement("div");
            dotContainer.className = "dots";
            dayEvents.slice(0,4).forEach(ev => {
                const dot = document.createElement("div"); dot.className = "dot";
                const t = (ev.event + ev.note).toUpperCase();
                if(t.includes("VIP") || t.includes("市長") || t.includes("貴賓")) dot.style.backgroundColor = "var(--vip)";
                else if(t.includes("待確認") || t.includes("暫定")) dot.style.backgroundColor = "var(--pending)";
                else dot.style.backgroundColor = "#fff";
                dotContainer.appendChild(dot);
            });
            div.appendChild(dotContainer);
        }

        div.onclick = () => {
            document.querySelectorAll('.day').forEach(el => el.style.borderColor = "transparent");
            div.style.borderColor = "var(--today)";
            showEvents(month + 1, d);
            const target = document.querySelector('.details-title');
            window.scrollTo({ top: target.offsetTop - 20, behavior: 'smooth' });
        };
        cal.appendChild(div);
    }
}

function showEvents(m, d) {
    const list = document.getElementById("eventList");
    document.getElementById("selectedDateText").innerText = `${m}月${d}日 行程明細`;
    list.innerHTML = "";

    const filtered = allEvents.filter(e => e.month === m && e.day === d).sort((a,b) => a.time.localeCompare(b.time));

    if(filtered.length === 0) {
        list.innerHTML = "<div style='opacity:0.5; text-align:center; padding:60px; font-size:22px;'>☕ 今日無預約行程</div>";
        return;
    }

    filtered.forEach(e => {
        const t = (e.event + e.note).toUpperCase();
        let typeClass = ""; let badge = "";
        if(t.includes("VIP") || t.includes("市長") || t.includes("貴賓")) { 
            typeClass = "vip"; badge = "<span class='badge' style='background:var(--vip)'>⭐ VIP</span>"; 
        } else if(t.includes("待確認") || t.includes("暫定")) { 
            typeClass = "pending"; badge = "<span class='badge' style='background:var(--pending); color:#000'>⚠️ 待確認</span>"; 
        }

        list.innerHTML += `
            <div class="event-item ${typeClass}">
                <div class="time-tag">⏰ ${e.time} ${badge}</div>
                <div class="name-row">${e.name} <span style="font-size:20px; opacity:0.7">(${e.people}人)</span></div>
                <div class="info-text">📌 ${e.event}</div>
                <div class="info-text">📞 ${e.phone}</div>
                ${e.note ? `<div class="note-box"><b>💡 備註內容：</b><br>${e.note}</div>` : ""}
            </div>
        `;
    });
}

init();
setInterval(init, 60000); // 每分鐘自動刷新
</script>
</body>
</html>
