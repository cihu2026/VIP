<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>慈湖公務團行政看板</title><style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');:root{--bg:#08111f;--bg2:#10233b;--text:#eef6ff;--muted:#9fb0c4;--border:rgba(255,255,255,.14);--accent:#6ee7f9;--mayor:#f8d56b;--director:#ef4444;--chief:#a855f7;--councilor:#f97316;--secretary:#38bdf8;--section:#22c55e;--vip:#fb7185}*{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans TC",sans-serif;-webkit-tap-highlight-color:transparent}body{min-height:100vh;color:var(--text);padding:18px;background:radial-gradient(circle at top left,rgba(110,231,249,.22),transparent 35%),radial-gradient(circle at top right,rgba(124,58,237,.24),transparent 34%),linear-gradient(145deg,var(--bg),var(--bg2) 55%,#070b13);background-attachment:fixed}.app{max-width:980px;margin:0 auto}.header-bar{position:relative;overflow:hidden;display:flex;justify-content:space-between;align-items:center;padding:20px;border:1px solid var(--border);border-radius:28px;background:linear-gradient(135deg,rgba(255,255,255,.16),rgba(255,255,255,.06));box-shadow:0 20px 55px rgba(0,0,0,.38);backdrop-filter:blur(18px);margin-bottom:18px}.header-bar:after{content:"";position:absolute;right:-45px;top:-70px;width:180px;height:180px;border-radius:999px;background:rgba(110,231,249,.18)}.main-title{position:relative;z-index:1}.badge{display:inline-flex;padding:5px 10px;border:1px solid rgba(110,231,249,.35);border-radius:999px;color:var(--accent);font-size:11px;font-weight:800;letter-spacing:.8px;background:rgba(110,231,249,.08);margin-bottom:8px}.main-title h1{font-size:27px;font-weight:900;color:#fff;line-height:1.15}.main-title p{margin-top:6px;font-size:11px;color:var(--muted);letter-spacing:1.6px;font-weight:700}#clock{position:relative;z-index:1;font-size:20px;font-weight:900;color:#fff;padding:10px 12px;border-radius:16px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.12)}.legend{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 18px}.pill{display:inline-flex;align-items:center;gap:6px;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:800}.pill i,.dot{display:block;border-radius:50%}.pill i{width:8px;height:8px;background:#fff}.pill.mayor i,.dot.mayor{background:var(--mayor);box-shadow:0 0 10px var(--mayor)}.pill.director i,.dot.director{background:var(--director);box-shadow:0 0 10px var(--director)}.pill.chief i,.dot.chief{background:var(--chief);box-shadow:0 0 10px var(--chief)}.pill.councilor i,.dot.councilor{background:var(--councilor);box-shadow:0 0 10px var(--councilor)}.pill.secretary i,.dot.secretary{background:var(--secretary);box-shadow:0 0 10px var(--secretary)}.pill.section i,.dot.section{background:var(--section);box-shadow:0 0 10px var(--section)}.pill.vip i,.dot.vip{background:var(--vip);box-shadow:0 0 10px var(--vip)}.calendars-container{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-bottom:26px}.calendar-box,.card,#empty-hint{background:rgba(255,255,255,.075);border:1px solid var(--border);box-shadow:0 15px 38px rgba(0,0,0,.24);backdrop-filter:blur(14px)}.calendar-box{border-radius:24px;padding:16px}.month-name{font-size:20px;font-weight:900;color:#fff;margin-bottom:14px;text-align:center}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.week-h{text-align:center;font-size:12px;color:#b5c2d2;padding-bottom:6px;font-weight:800}.day{aspect-ratio:1/1;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;font-weight:800;cursor:pointer;color:#d7e1ed;border:1px solid transparent;background:rgba(255,255,255,.025);transition:.18s}.day:not(:empty):hover{transform:translateY(-2px);background:rgba(255,255,255,.11)}.day.today{background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff;box-shadow:0 8px 18px rgba(56,189,248,.28)}.day.selected{border:2px solid var(--mayor);box-shadow:0 0 0 4px rgba(248,213,107,.13)}.dot{width:5px;height:5px;background:#fff;margin-top:4px;box-shadow:0 0 8px rgba(255,255,255,.75)}.list-title{margin:22px 0 15px;font-size:28px;font-weight:900;color:#fff;display:flex;align-items:center;gap:12px}.list-title:before{content:"";width:8px;height:32px;background:linear-gradient(180deg,var(--accent),#3b82f6);border-radius:999px}.card{position:relative;overflow:hidden;border-radius:24px;padding:20px;margin-bottom:16px}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:7px;background:var(--accent)}.card.mayor:before{background:var(--mayor)}.card.director:before{background:var(--director)}.card.chief:before{background:var(--chief)}.card.councilor:before{background:var(--councilor)}.card.secretary:before{background:var(--secretary)}.card.section:before{background:var(--section)}.card.vip:before{background:var(--vip)}.time-tag{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--accent);font-weight:900;font-size:18px;margin-bottom:12px}.level-label{color:#06111f;font-size:12px;padding:5px 10px;border-radius:999px;white-space:nowrap;font-weight:900;background:#fff}.level-label.mayor{background:var(--mayor)}.level-label.director{background:var(--director);color:#fff}.level-label.chief{background:var(--chief);color:#fff}.level-label.councilor{background:var(--councilor);color:#fff}.level-label.secretary{background:var(--secretary)}.level-label.section{background:var(--section)}.level-label.vip{background:var(--vip);color:#fff}.group-name{font-size:23px;font-weight:900;color:#fff;margin-bottom:14px;line-height:1.35}.group-name span{font-size:15px;color:var(--mayor);font-weight:900;margin-left:8px}.meta-item{color:var(--muted);border-top:1px solid rgba(255,255,255,.08);padding-top:10px;font-size:16px}.meta-item b{color:#fff;margin-left:5px}.note{margin-top:15px;padding:14px 15px;background:rgba(8,17,31,.42);border-radius:16px;font-size:15px;color:#d6deea;line-height:1.7;border:1px dashed rgba(255,255,255,.18);white-space:pre-wrap}#empty-hint{text-align:center;padding:42px;color:#718096;font-size:17px;font-weight:800;border-radius:22px}@media(max-width:760px){body{padding:14px}.header-bar{padding:18px;border-radius:24px}.main-title h1{font-size:24px}#clock{font-size:17px}.calendars-container{grid-template-columns:1fr}.day{border-radius:14px;font-size:15px}.list-title{font-size:26px}.card{border-radius:22px;padding:18px}.group-name{font-size:21px}}</style></head><body><div class="app"><div class="header-bar"><div class="main-title"><div class="badge">👥 OFFICIAL GROUP</div><h1>慈湖公務團</h1><p>CIHU OFFICIAL TOUR SCHEDULE</p></div><div id="clock">00:00:00</div></div><div class="legend"><span class="pill mayor"><i></i>市長</span><span class="pill director"><i></i>局長</span><span class="pill chief"><i></i>處長</span><span class="pill councilor"><i></i>議員</span><span class="pill secretary"><i></i>秘書</span><span class="pill section"><i></i>課長</span><span class="pill vip"><i></i>貴賓</span><span class="pill"><i></i>一般</span></div><div class="calendars-container"><div class="calendar-box"><div id="monthLabel-0" class="month-name">載入中...</div><div class="grid" id="calendar-0"><div class="week-h">日</div><div class="week-h">一</div><div class="week-h">二</div><div class="week-h">三</div><div class="week-h">四</div><div class="week-h">五</div><div class="week-h">六</div></div></div><div class="calendar-box"><div id="monthLabel-1" class="month-name">載入中...</div><div class="grid" id="calendar-1"><div class="week-h">日</div><div class="week-h">一</div><div class="week-h">二</div><div class="week-h">三</div><div class="week-h">四</div><div class="week-h">五</div><div class="week-h">六</div></div></div></div><div class="list-title" id="listDateLabel">選擇日期查看行程</div><div id="eventList"></div></div><script>const SHEET_ID="1-nkw5ZQIoQyNflxWbQ4_enhvtVAspX7RXGBm5u7RnBc",SHEET_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;let allData=[];const today=new Date();function updateTime(){document.getElementById("clock").innerText=new Date().toLocaleTimeString("zh-TW",{hour12:false})}updateTime();setInterval(updateTime,1000);async function load(){try{const res=await fetch(`${SHEET_URL}&cache=${Date.now()}`),text=await res.text();allData=parse(text);renderCal(today.getMonth(),today.getFullYear(),0);let nextM=today.getMonth()+1,nextY=today.getFullYear();if(nextM>11){nextM=0;nextY++}renderCal(nextM,nextY,1);selectDate(today.getFullYear(),today.getMonth()+1,today.getDate())}catch(e){console.error(e);document.getElementById("eventList").innerHTML='<div id="empty-hint">資料載入失敗，請確認試算表權限</div>'}}function parseCSVLine(line){return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v=>v.replace(/^"|"$/g,"").trim())}function normalizeHeader(text){return String(text||"").replace(/[：:]/g,"").replace(/\s+/g,"").trim()}function parseDateText(dateText){const clean=String(dateText||"").trim();if(!clean)return null;const dPart=clean.split(/[\/\-]/);let y=today.getFullYear(),m,d;if(dPart.length===3){y=parseInt(dPart[0],10);m=parseInt(dPart[1],10);d=parseInt(dPart[2],10)}else{m=parseInt(dPart[0],10);d=parseInt(dPart[1],10)}if(!m||!d)return null;return{y,m,d}}function parse(csv){const lines=csv.split(/\r?\n/).filter(line=>line.trim()!=="");if(!lines.length)return[];const headers=parseCSVLine(lines[0]).map(normalizeHeader);return lines.slice(1).map(row=>{const c=parseCSVLine(row),get=(...names)=>{for(const name of names){const i=headers.indexOf(normalizeHeader(name));if(i!==-1)return c[i]||""}return""};let dateText=get("日期","預約日期","參訪日期"),time=get("時間","預約時間","參訪時間"),name=get("團名","團體名稱","申請單位","單位名稱","姓名"),p=get("人數","參訪人數"),teacher=get("導覽老師","老師","負責老師"),note=get("備註","說明","其他");if(!dateText&&c[0]&&String(c[0]).match(/^\d{1,4}[\/\-]\d{1,2}([\/\-]\d{1,2})?$/)){dateText=c[0];time=time||c[1]||"";name=name||c[2]||"";p=p||c[3]||"";teacher=teacher||c[4]||"";note=note||c[5]||""}const parsedDate=parseDateText(dateText);if(!parsedDate)return null;return{y:parsedDate.y,m:parsedDate.m,d:parsedDate.d,time,name,p,teacher,note}}).filter(Boolean)}function getLevel(x){const t=`${x.name}${x.note}${x.teacher}`;if(/市長/.test(t))return{key:"mayor",label:"👑 市長"};if(/局長|署長|副局長/.test(t))return{key:"director",label:"🔴 局長"};if(/處長|副處長/.test(t))return{key:"chief",label:"🟣 處長"};if(/議員|議長|副議長/.test(t))return{key:"councilor",label:"🟠 議員"};if(/秘書|秘書長/.test(t))return{key:"secretary",label:"🔵 秘書"};if(/課長|股長/.test(t))return{key:"section",label:"🟢 課長"};if(/貴賓|VIP|重要|長官|會長/.test(t))return{key:"vip",label:"⭐ 貴賓"};return{key:"normal",label:""}}function topLevel(events){const rank={mayor:7,director:6,chief:5,councilor:4,secretary:3,section:2,vip:1,normal:0};return events.map(getLevel).sort((a,b)=>rank[b.key]-rank[a.key])[0]||{key:"normal"}}function renderCal(m,y,index){const container=document.getElementById(`calendar-${index}`),monthLabel=document.getElementById(`monthLabel-${index}`),mLabel=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];monthLabel.innerText=`${y}年 ${mLabel[m]}`;const start=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();container.querySelectorAll(".day").forEach(e=>e.remove());for(let i=0;i<start;i++){const empty=document.createElement("div");empty.className="day";container.appendChild(empty)}for(let d=1;d<=days;d++){const el=document.createElement("div");el.className="day";if(d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear())el.classList.add("today");el.innerHTML=`<span>${d}</span>`;const dayEvents=allData.filter(x=>x.y===y&&x.m===m+1&&x.d===d);if(dayEvents.length>0){const lvl=topLevel(dayEvents),dot=document.createElement("div");dot.className=`dot ${lvl.key}`;el.appendChild(dot)}el.onclick=()=>{document.querySelectorAll(".day").forEach(x=>x.classList.remove("selected"));el.classList.add("selected");selectDate(y,m+1,d)};container.appendChild(el)}}function escapeHTML(text){return String(text||"").replace(/[&<>'"]/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[s]))}function selectDate(y,m,d){const list=document.getElementById("eventList"),week=["週日","週一","週二","週三","週四","週五","週六"],dayName=week[new Date(y,m-1,d).getDay()];document.getElementById("listDateLabel").innerText=`${m}月${d}日 (${dayName})`;const filtered=allData.filter(x=>x.y===y&&x.m===m&&x.d===d).sort((a,b)=>String(a.time).localeCompare(String(b.time)));if(!filtered.length){list.innerHTML='<div id="empty-hint">本日尚無行程安排</div>';return}list.innerHTML="";filtered.forEach(x=>{const lvl=getLevel(x),label=lvl.key!=="normal"?`<span class="level-label ${lvl.key}">${lvl.label}</span>`:"";list.innerHTML+=`<div class="card ${lvl.key}"><span class="time-tag">預約時間：${escapeHTML(x.time||"未填")} ${label}</span><div class="group-name">${escapeHTML(x.name||"未填團名")}<span>(${escapeHTML(x.p||"未知")}人)</span></div><div class="meta-item">導覽老師：<b>${escapeHTML(x.teacher||"未填")}</b></div>${x.note?`<div class="note"><b>備註：</b><br>${escapeHTML(x.note)}</div>`:""}</div>`})}load();setInterval(load,60000);</script></body></html>
