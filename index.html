<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIHU SCHEDULE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --bg: #0b0f1a;
            --accent: #3b82f6;
            --vip: #f43f5e;
            --pending: #fbbf24;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', "Noto Sans TC", sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 20px; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* 簡約標題區 */
        .header { 
            padding: 20px 5px 30px; 
            text-align: left;
        }
        .header-sub {
            font-size: 12px;
            color: var(--accent);
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .month-title { 
            font-size: 38px; 
            font-weight: 900; 
            letter-spacing: -1.5px;
        }

        /* 日曆區塊：極簡化 */
        .calendar-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 20px;
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .weekday { 
            text-align: center; font-size: 12px; font-weight: 700; 
            color: var(--text-sub); padding-bottom: 15px; opacity: 0.5;
        }
        .day { 
            aspect-ratio: 1/1; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 18px; font-weight: 500; cursor: pointer; transition: 0.2s;
        }
        .day:hover { background: rgba(255,255,255,0.05); }
        .day.today { 
            background: var(--accent); 
            color: #fff; 
            font-weight: 900;
        }
        
        /* 行程點點 */
        .dots { display: flex; gap: 3px; margin-top: 4px; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.3); }
        .day.today .dot { background: #fff; }

        /* 行程清單標題 */
        .details-header { 
            margin: 40px 0 20px; 
            font-size: 20px; 
            font-weight: 900; 
            display: flex; 
            align-items: center; 
            gap: 12px;
        }
        .details-header::before {
            content: ''; width: 4px; height: 24px; background: var(--accent); border-radius: 2px;
        }

        /* 行程卡片：扁平化設計 */
        .event-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 60px; }
        .event-card { 
            background: var(--card-bg); 
            border: 1px solid var(--card-border); 
            padding: 20px; 
            border-radius: 20px;
            transition: transform 0.2s;
        }
        .event-card.vip { border-left: 4px solid var(--vip); }
        .event-card.pending { border-left: 4px solid var(--pending); }

        .time-tag { font-size: 14px; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .name-row { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 4px; }
        .info-row { font-size: 16px; color: var(--text-sub); margin-bottom: 2px; }
        
        .note-box { 
            margin-top: 15px; padding: 12px; background: rgba(255,255,255,0.02); 
            border-radius: 10px; font-size: 15px; color: var(--text-sub); font-style: italic;
        }
        
        .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 900; margin-left: 5px; vertical-align: middle; }

        #sync-info { position: fixed; bottom: 20px; left: 20px; font-size: 10px; color: var(--text-sub); opacity: 0.4; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-sub">Cihu Management</div>
    <div id="monthDisplay" class="month-title">2026 MAY</div>
</div>

<div class="calendar-container">
    <div class="calendar-grid" id="calendar">
        <div class="weekday">S</div><div class="weekday">M</div><div class="weekday">T</div>
        <div class="weekday">W</div><div class="weekday">T</div><div class="weekday">F</div><div class="weekday">S</div>
    </div>
</div>

<div class="details-header"><span id="selectedDateText">Schedule</span></div>
<div id="eventList" class="event-list"></div>
<div id="sync-info">Waiting for sync...</div>

<script>
// 修正後的 SHEET 設定
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let allEvents = [];
const now = new Date();

async function fetchData() {
    try {
        const res = await fetch(`${SHEET_URL}&cb=${new Date().getTime()}`);
        const csv = await res.text();
        allEvents = parseCSV(csv);
        renderCalendar(now.getFullYear(), now.getMonth());
        showEvents(now.getMonth() + 1, now.getDate());
        document.getElementById('sync-info').innerText = `LAST SYNC: ${new Date().toLocaleTimeString()}`;
    } catch (e) { 
        document.getElementById('sync-info').innerText = "SYNC ERROR";
    }
}

function parseCSV(csv) {
    const lines = csv.split(/\r?\n/).slice(1);
    const pattern = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
    return lines.map(line => {
        const c = line.split(pattern).map(v => v.replace(/^"|"$/g, '').trim());
        if(!c[1] || !c[1].includes("/")) return null;
        const parts = c[1].split("/");
        const m = parseInt(parts[parts.length-2]);
        const d = parseInt(parts[parts.length-1]);
        return { month: m, day: d, time: c[2]||"", name: c[3]||"", event: c[4]||"", people: c[5]||"", phone: c[6]||"", note: c[7] || "" };
    }).filter(e => e);
}

function renderCalendar(year, month) {
    const cal = document.getElementById("calendar");
    const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
    document.getElementById("monthDisplay").innerText = `${year} ${monthNames[month]}`;
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    document.querySelectorAll('.day').forEach(d => d.remove());

    for(let i=0; i<firstDay; i++) {
        const div = document.createElement("div"); div.className = "day"; cal.appendChild(div);
    }

    for(let d=1; d<=daysInMonth; d++) {
        const div = document.createElement("div");
        div.className = "day";
        if(d === now.getDate() && month === now.getMonth()) div.classList.add("today");
        div.innerHTML = `<span>${d}</span>`;
        
        const dayEvents = allEvents.filter(e => e.month === (month + 1) && e.day === d);
        if(dayEvents.length > 0) {
            const dots = document.createElement("div"); dots.className = "dots";
            dayEvents.slice(0,3).forEach(ev => {
                const dot = document.createElement("div"); dot.className = "dot";
                const t = (ev.event + ev.note + ev.name).toUpperCase();
                if(t.includes("VIP") || t.includes("市長") || t.includes("貴賓")) dot.style.background = "var(--vip)";
                else if(t.includes("待確認") || t.includes("暫定")) dot.style.background = "var(--pending)";
                dots.appendChild(dot);
            });
            div.appendChild(dots);
        }

        div.onclick = () => {
            document.querySelectorAll('.day').forEach(el => el.style.boxShadow = "none");
            if(!div.classList.contains('today')) div.style.boxShadow = "inset 0 0 0 2px var(--accent)";
            showEvents(month + 1, d);
        };
        cal.appendChild(div);
    }
}

function showEvents(m, d) {
    const list = document.getElementById("eventList");
    document.getElementById("selectedDateText").innerText = `${m}月${d}日 Schedule`;
    list.innerHTML = "";

    const filtered = allEvents.filter(e => e.month === m && e.day === d).sort((a,b) => a.time.localeCompare(b.time));

    if(filtered.length === 0) {
        list.innerHTML = "<div style='opacity:0.2; text-align:center; padding:40px; font-size:16px;'>No records found</div>";
        return;
    }

    filtered.forEach(e => {
        const t = (e.event + e.note + e.name).toUpperCase();
        let statusClass = ""; let badge = "";
        if(t.includes("VIP") || t.includes("市長") || t.includes("貴賓")) { 
            statusClass = "vip"; badge = `<span class="badge" style="background:var(--vip)">VIP</span>`; 
        } else if(t.includes("待確認") || t.includes("暫定")) { 
            statusClass = "pending"; badge = `<span class="badge" style="background:var(--pending); color:#000">PENDING</span>`; 
        }

        list.innerHTML += `
            <div class="event-card ${statusClass}">
                <div class="time-tag">${e.time} ${badge}</div>
                <div class="name-row">${e.name} <span style="font-size:14px; opacity:0.4; font-weight:400;">/ ${e.people}P</span></div>
                <div class="info-row">📌 ${e.event}</div>
                <div class="info-row">📞 ${e.phone}</div>
                ${e.note ? `<div class="note-box">${e.note}</div>` : ""}
            </div>
        `;
    });
}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
