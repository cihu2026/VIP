<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>🌿 後慈湖公務行事曆</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Noto Sans TC",sans-serif;
}

body{
    background:#0f1115;
    color:white;
    padding:16px;
}

.title{
    text-align:center;
    font-size:34px;
    font-weight:900;
    margin-top:10px;
}

.sub{
    text-align:center;
    opacity:.7;
    margin-top:8px;
    margin-bottom:25px;
}

.card{
    background:#1b1f27;
    border-radius:24px;
    padding:20px;
    margin-bottom:20px;
}

.today{

    text-align:center;

    font-size:28px;

    font-weight:900;
}

.today-status{

    margin-top:15px;

    padding:18px;

    border-radius:20px;

    font-size:24px;

    font-weight:900;

    text-align:center;
}

.calendar{

    display:grid;

    grid-template-columns:
    repeat(7,1fr);

    gap:8px;

    margin-top:20px;
}

.day{

    background:#1e2633;

    border-radius:18px;

    min-height:90px;

    padding:10px;

    position:relative;
}

.day-number{

    font-size:18px;

    font-weight:900;
}

.event{

    margin-top:8px;

    padding:4px 6px;

    border-radius:10px;

    font-size:12px;

    font-weight:800;

    overflow:hidden;

    white-space:nowrap;

    text-overflow:ellipsis;
}

.detail-card{

    background:#1e2633;

    padding:18px;

    border-radius:20px;

    margin-top:15px;
}

.footer{

    text-align:center;

    opacity:.45;

    margin-top:30px;

    font-size:13px;
}

</style>

</head>

<body>

<div class="title">
🌿 後慈湖公務行事曆
</div>

<div class="sub">
Google Sheet 同步版
</div>

<div class="card">

<div class="today">
📅 今日狀態
</div>

<div
id="todayStatus"
class="today-status">

⏳ 讀取中...

</div>

</div>

<div class="card">

<h2>
📅 本月行事曆
</h2>

<div
class="calendar"
id="calendar">

</div>

</div>

<div class="card">

<h2>
📌 活動詳細資訊
</h2>

<div id="detail"></div>

</div>

<div class="footer">
VIP Calendar Dashboard
</div>

<script>

// 🌿 Google Sheet CSV

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg/export?format=csv";

// 🌿 AI分類

function getType(text){

    text = text || "";

    if(
        text.includes("市長")
        ||
        text.includes("VIP")
        ||
        text.includes("貴賓")
    ){

        return {
            label:"VIP",
            color:"#ff5252"
        };
    }

    if(
        text.includes("拍攝")
        ||
        text.includes("攝影")
    ){

        return {
            label:"拍攝",
            color:"#9c27b0"
        };
    }

    if(
        text.includes("導覽")
    ){

        return {
            label:"導覽",
            color:"#00c853"
        };
    }

    return {
        label:"活動",
        color:"#2979ff"
    };
}

// 🌿 讀取 Google Sheet

async function loadSheet(){

    try{

        const res =
        await fetch(SHEET_URL);

        const csv =
        await res.text();

        parseCSV(csv);

    }catch(err){

        console.error(err);

        document.getElementById(
            "todayStatus"
        ).innerHTML =
        "❌ 無法讀取 Google Sheet";
    }
}

// 🌿 CSV解析

function parseCSV(csv){

    const rows =
    csv.split("\n").slice(1);

    let events = [];

    rows.forEach(r=>{

        const cols = r.split(",");

        if(cols.length >= 8){

            events.push({

                date:cols[1],
                time:cols[2],
                name:cols[3],
                event:cols[4],
                people:cols[5],
                phone:cols[6],
                note:cols[7]
            });
        }
    });

    renderCalendar(events);
}

// 🌿 月曆

function renderCalendar(events){

    const calendar =
    document.getElementById("calendar");

    const detail =
    document.getElementById("detail");

    calendar.innerHTML = "";

    detail.innerHTML = "";

    const today =
    new Date();

    const currentMonth =
    today.getMonth()+1;

    const daysInMonth =
    new Date(
        today.getFullYear(),
        currentMonth,
        0
    ).getDate();

    // 今日VIP判斷

    let todayVip = false;

    // 建立月曆

    for(let day=1;day<=daysInMonth;day++){

        const dayDiv =
        document.createElement("div");

        dayDiv.className = "day";

        let html = `

        <div class="day-number">
            ${day}
        </div>
        `;

        // 找活動

        events.forEach(e=>{

            if(!e.date) return;

            const match =
            e.date.match(/\d{1,2}\/(\d{1,2})/);

            if(match){

                const eventDay =
                parseInt(match[1]);

                if(eventDay===day){

                    const info =
                    getType(
                        `${e.event} ${e.note}`
                    );

                    html += `

                    <div
                    class="event"

                    style="
                    background:${info.color};
                    ">

                        ${info.label}

                    </div>
                    `;

                    detail.innerHTML += `

                    <div class="detail-card">

                        <h3>
                        📅 ${e.date}
                        </h3>

                        <br>

                        🕒 ${e.time}
                        <br><br>

                        👤 ${e.name}
                        <br><br>

                        📌 ${e.event}
                        <br><br>

                        👥 ${e.people}
                        <br><br>

                        ☎️ ${e.phone}
                        <br><br>

                        📝 ${e.note}

                    </div>
                    `;

                    // 今日VIP

                    if(
                        day===today.getDate()
                    ){

                        if(
                            info.label==="VIP"
                        ){

                            todayVip = true;
                        }
                    }
                }
            }
        });

        dayDiv.innerHTML = html;

        calendar.appendChild(dayDiv);
    }

    // 今日狀態

    const status =
    document.getElementById("todayStatus");

    if(todayVip){

        status.innerHTML =
        "🔴 今日有 VIP / 貴賓";

        status.style.background =
        "#ff5252";

    }else{

        status.innerHTML =
        "🟢 今日正常";

        status.style.background =
        "#00c853";
    }
}

// 🌿 啟動

loadSheet();

</script>

</body>
</html>
