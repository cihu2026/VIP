<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📌 後慈湖行程看板</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
    *{ margin:0; padding:0; box-sizing:border-box; font-family: "SF Pro Display", "Noto Sans TC", sans-serif; }
    body{ background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%); color:#e2e8f0; padding:20px; min-height:100vh; }
    .header-section { text-align: center; margin-bottom: 30px; }
    .title{ font-size:32px; font-weight:900; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
    .card{ background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 25px; margin-bottom: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    .today-status{ padding:20px; border-radius:20px; font-size:24px; font-weight:900; text-align:center; transition: 0.5s; box-shadow: inset 0 0 20px rgba(255,255,255,0.05); }
    #detail { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
    .detail-card{ background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding:20px; border-radius:22px; position: relative; animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .info-row { font-size: 15px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; line-height: 1.4; }
    .info-label { opacity: 0.6; min-width: 25px; font-size: 14px; margin-top: 2px; }
    .badge{ position: absolute; top: 20px; right: 20px; padding:4px 12px; border-radius:8px; font-size:12px; font-weight:900; }
    h3 { margin-bottom: 15px; font-size: 18px; color: #60a5fa; padding-right: 60px; }
    .note-box { margin-top: 10px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 12px; font-size: 14px; border-left: 4px solid #64748b; color: #cbd5e1; white-space: pre-wrap; }
</style>
</head>
<body>

<div class="header-section">
    <div class="title">📌 後慈湖行程看板</div>
</div>

<div class="card">
    <div id="todayStatus" class="today-status">⏳ 資料同步中...</div>
</div>

<div class="card">
    <h2 style="margin-bottom: 20px; font-size: 18px; opacity: 0.8; display: flex; align-items: center; gap: 8px;">
        <span>🔔 待辦行程清單</span>
        <span style="font-size: 12px; font-weight: normal; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px;">自動更新</span>
    </h2>
    <div id="detail"></div>
</div>

<script>
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

function getType(text = ""){
    const t = text.toUpperCase();
    if(t.includes("市長") || t.includes("VIP") || t.includes("貴賓")) return { label:"VIP", color:"#ef4444" };
    if(t.includes("拍攝") || t.includes("攝影")) return { label:"拍攝", color:"#a855f7" };
    if(t.includes("導覽")) return { label:"導覽", color:"#22c55e" };
    return { label:"行程", color:"#3b82f6" };
}

async function loadSheet(){
    try{
        const res = await fetch(`${SHEET_URL}&cb=${new Date().getTime()}`);
        const csv = await res.text();
        parseCSV(csv);
    }catch(err){
        document.getElementById("todayStatus").innerHTML = "❌ 連線失敗";
    }
}

function parseCSV(csv){
    const lines = csv.split(/\r?\n/);
    const result = [];
    const pattern = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;

    for(let i = 1; i < lines.length; i++){
        if(!lines[i].trim()) continue;
        const cols = lines[i].split(pattern).map(v => v.replace(/^"|"$/g, '').trim());
        
        if(cols.length >= 7){
            result.push({
                date: cols[1], 
                time: cols[2], 
                name: cols[3], 
                event: cols[4], 
                people: cols[5], 
                phone: cols[6], 
                note: cols[7] || ""
            });
        }
    }
    render(result);
}

function render(events){
    const detail = document.getElementById("detail");
    const status = document.getElementById("todayStatus");
    const now = new Date();
    
    const todayBase = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    const currentHour = now.getHours();

    detail.innerHTML = "";
    let activeCount = 0;

    events.forEach(e => {
        if(!e.date || !e.date.includes("/")) return;

        const parts = e.date.split("/");
        const m = parseInt(parts[0]) - 1;
        const d = parseInt(parts[1]);
        const eventTs = new Date(now.getFullYear(), m, d).getTime();
        
        const hourMatch = e.time.match(/^(\d{1,2})/);
        const eventHour = hourMatch ? parseInt(hourMatch[1]) : 0;

        // 隱藏判定：1.日期早於今天 2.日期是今天但小時早於現在
        if (eventTs < todayBase) return;
        if (eventTs === todayBase && eventHour < currentHour) return;

        activeCount++;
        const info = getType(`${e.event} ${e.note}`);
        detail.innerHTML += `
            <div class="detail-card">
                <span class="badge" style="background:${info.color}">${info.label}</span>
                <h3>📅 ${e.date} <span style="margin-left:8px; color:#fff;">${e.time}</span></h3>
                <div class="info-row"><span class="info-label">👤</span><span><b>${e.name}</b> (${e.people}人)</span></div>
                <div class="info-row"><span class="info-label">📌</span><span>${e.event}</span></div>
                <div class="info-row"><span class="info-label">📞</span><span>${e.phone}</span></div>
                ${e.note ? `<div class="note-box"><b>備註：</b><br>${e.note}</div>` : ''}
            </div>
        `;
    });

    if(activeCount > 0){
        status.innerHTML = `✅ 今日尚有 ${activeCount} 筆行程`;
        status.style.background = "linear-gradient(135deg, #1e40af, #3b82f6)";
    } else {
        status.innerHTML = "✨ 目前無待辦項目";
        status.style.background = "linear-gradient(135deg, #15803d, #22c55e)";
        detail.innerHTML = "<div style='opacity:0.4; grid-column: 1/-1; text-align:center; padding:60px;'>清單已空</div>";
    }
}

loadSheet();
setInterval(loadSheet, 30000);
</script>
</body>
</html>
