<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📌 後慈湖特殊行程表</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "SF Pro Display", "Noto Sans TC", sans-serif;
    }

    body{
        background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        color:#e2e8f0;
        padding:20px;
        min-height:100vh;
    }

    .header-section { text-align: center; margin-bottom: 30px; }
    .title{
        font-size:32px; font-weight:900;
        background: linear-gradient(to right, #fff, #94a3b8);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
    }

    .card{
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        padding: 25px;
        margin-bottom: 25px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    /* 頂部狀態列 */
    .today-status{
        padding:20px; border-radius:20px;
        font-size:24px; font-weight:900; text-align:center;
        transition: 0.5s;
        box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
    }

    /* 內容區塊佈局 */
    #detail { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }

    .detail-card{
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        padding:20px; border-radius:22px;
        position: relative;
        overflow: hidden;
        animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .info-row { font-size: 15px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; }
    .info-label { opacity: 0.6; min-width: 25px; font-size: 14px; margin-top: 2px; }
    
    .badge{ 
        position: absolute; top: 20px; right: 20px;
        padding:4px 12px; border-radius:8px; font-size:12px; font-weight:900; 
    }

    h3 { margin-bottom: 15px; font-size: 18px; color: #60a5fa; }
    .note-box { 
        margin-top: 10px; padding: 12px; background: rgba(0,0,0,0.2); 
        border-radius: 12px; font-size: 14px; border-left: 4px solid #64748b;
        color: #cbd5e1; line-height: 1.5;
    }

    /* 響應式調整 */
    @media (max-width: 480px) {
        .title { font-size: 24px; }
        .today-status { font-size: 20px; }
    }
</style>
</head>
<body>

<div class="header-section">
    <div class="title">📌 後慈湖行程表</div>
</div>

<div class="card">
    <div id="todayStatus" class="today-status">⏳ 同步雲端資料中...</div>
</div>

<div class="card">
    <h2 style="margin-bottom: 20px; font-size: 18px; opacity: 0.8; display: flex; align-items: center; gap: 8px;">
        <span>🔔 待辦行程清單</span>
        <span style="font-size: 12px; font-weight: normal; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px;">過期自動隱藏</span>
    </h2>
    <div id="detail"></div>
</div>

<script>
// 試算表設定
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

// 自動分類功能
function getType(text = ""){
    const t = text.toUpperCase();
    if(t.includes("市長") || t.includes("VIP") || t.includes("貴賓")) return { label:"VIP", color:"#ef4444" };
    if(t.includes("拍攝") || t.includes("攝影")) return { label:"拍攝", color:"#a855f7" };
    if(t.includes("導覽")) return { label:"導覽", color:"#22c55e" };
    return { label:"行程", color:"#3b82f6" };
}

async function loadSheet(){
    try{
        // 增加快取清除機制，確保 GitHub Pages 抓到最新試算表資料
        const res = await fetch(`${SHEET_URL}&cachebust=${new Date().getTime()}`);
        const csv = await res.text();
        parseCSV(csv);
    }catch(err){
        document.getElementById("todayStatus").innerHTML = "❌ 資料讀取失敗 (請檢查共用設定)";
    }
}

function parseCSV(csv){
    const rows = csv.split("\n").slice(1);
    let events = [];
    rows.forEach(r=>{
        // 處理 CSV 格式中的逗號與引號
        const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        if(cols.length >= 7) {
            events.push({ 
                date: cols[1]?.replace(/"/g, '').trim(), 
                time: cols[2]?.replace(/"/g, '').trim(), 
                name: cols[3]?.replace(/"/g, '').trim(), 
                event: cols[4]?.replace(/"/g, '').trim(), 
                people: cols[5]?.replace(/"/g, '').trim(), 
                phone: cols[6]?.replace(/"/g, '').trim(), 
                note: cols[7]?.replace(/"/g, '').trim() || ""
            });
        }
    });
    render(events);
}

function render(events){
    const detail = document.getElementById("detail");
    const status = document.getElementById("todayStatus");
    const now = new Date();
    
    // 基準時間（用於比較）
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const currentHour = now.getHours();

    detail.innerHTML = "";
    let activeCount = 0;

    events.forEach(e => {
        if(!e.date || !e.date.includes("/")) return;

        // 解析日期 (格式 M/D)
        const dateParts = e.date.split("/");
        const eventDate = new Date(now.getFullYear(), parseInt(dateParts[0])-1, parseInt(dateParts[1]));
        
        // 解析小時 (格式 HH:mm)
        const eventHour = parseInt(e.time.split(":")[0]) || 0;

        // 【自動隱藏邏輯核心】
        const isPastDay = eventDate < todayStart;
        const isToday = eventDate.getTime() === todayStart.getTime();
        const isExpiredToday = isToday && eventHour < currentHour;

        // 只有「非過去日期」且「非今天已過時」的行程才會顯示
        if (!isPastDay && !isExpiredToday) {
            activeCount++;
            const info = getType(`${e.event} ${e.note}`);
            
            detail.innerHTML += `
                <div class="detail-card">
                    <span class="badge" style="background:${info.color}">${info.label}</span>
                    <h3>📅 ${e.date} <span style="margin-left:8px; color:#fff; letter-spacing:1px;">${e.time}</span></h3>
                    <div class="info-row"><span class="info-label">👤</span> <span><b>${e.name}</b> (${e.people}人)</span></div>
                    <div class="info-row"><span class="info-label">📌</span> <span>${e.event}</span></div>
                    <div class="info-row"><span class="info-label">📞</span> <span>${e.phone}</span></div>
                    ${e.note ? `<div class="note-box"><b>備註：</b><br>${e.note}</div>` : ''}
                </div>
            `;
        }
    });

    // 更新頂部橫幅狀態
    if(activeCount > 0){
        status.innerHTML = `📢 剩餘 ${activeCount} 筆待辦行程`;
        status.style.background = "linear-gradient(135deg, #1e40af, #3b82f6)";
        status.style.border = "1px solid rgba(96, 165, 250, 0.3)";
    } else {
        status.innerHTML = "✅ 今日行程已結束 / 暫無預定項目";
        status.style.background = "linear-gradient(135deg, #15803d, #22c55e)";
        status.style.border = "1px solid rgba(34, 197, 94, 0.3)";
        detail.innerHTML = "<div style='opacity:0.4; grid-column: 1/-1; text-align:center; padding:60px; font-size:14px;'>目前沒有即將到來的行程項目</div>";
    }
}

// 啟動載入
loadSheet();

// 每 60 秒背景自動同步一次試算表
setInterval(loadSheet, 60000);
</script>
</body>
</html>
