<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📌 後慈湖行程看板 (重點強化版)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        :root {
            --primary-bg: #0f172a;
            --vip-red: #ef4444;
            --focus-gold: #fbbf24;
        }
        *{ margin:0; padding:0; box-sizing:border-box; font-family: "SF Pro Display", "Noto Sans TC", sans-serif; }
        body{ background: radial-gradient(circle at top, #1e293b 0%, var(--primary-bg) 100%); color:#e2e8f0; padding:15px; min-height:100vh; }
        
        .header-section { text-align: center; margin: 20px 0; }
        .title{ font-size:30px; font-weight:900; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 狀態列 */
        .status-bar{ background: linear-gradient(135deg, #1e40af, #3b82f6); padding:18px; border-radius:20px; font-size:20px; font-weight:900; text-align:center; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        /* 重點專區 */
        .focus-section { border: 2px solid var(--focus-gold); background: rgba(251, 191, 36, 0.05); border-radius: 25px; padding: 20px; margin-bottom: 25px; }
        .focus-title { color: var(--focus-gold); font-size: 18px; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* 卡片設計 */
        #detail { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 15px; }
        .detail-card{ background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding:20px; border-radius:22px; position: relative; transition: 0.3s; }
        
        /* 高亮樣式 */
        .is-vip { border-left: 5px solid var(--vip-red); background: rgba(239, 68, 68, 0.05); }
        .is-now { border: 2px solid var(--focus-gold); animation: pulse-border 2s infinite; }
        
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        .badge{ position: absolute; top: 20px; right: 20px; padding:4px 12px; border-radius:8px; font-size:12px; font-weight:900; color: white; }
        h3 { margin-bottom: 15px; font-size: 19px; color: #60a5fa; }
        .info-row { font-size: 15px; margin-bottom: 8px; display: flex; gap: 10px; }
        .note-box { margin-top: 10px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 12px; font-size: 14px; border-left: 4px solid #64748b; color: #cbd5e1; }
        
        .live-tag { color: var(--focus-gold); font-weight: 900; font-size: 12px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="title">📌 後慈湖行程看板</div>
</div>

<div id="todayStatus" class="status-bar">⏳ 同步資料中...</div>

<!-- 今日重點專區 -->
<div id="focusArea" class="focus-section" style="display: none;">
    <div class="focus-title">✨ 今日管理重點 (VIP / 即將抵達)</div>
    <div id="focusDetail" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 15px;"></div>
</div>

<div style="margin-bottom: 15px; opacity: 0.6; font-size: 14px; padding-left: 10px;">📅 所有待辦行程</div>
<div id="detail"></div>

<script>
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

function getType(text = "", note = ""){
    const t = (text + note).toUpperCase();
    if(t.includes("市長") || t.includes("VIP") || t.includes("貴賓")) return { label:"VIP", color:"#ef4444", important: true };
    if(t.includes("拍攝") || t.includes("攝影")) return { label:"拍攝", color:"#a855f7", important: false };
    if(t.includes("導覽")) return { label:"導覽", color:"#22c55e", important: false };
    return { label:"行程", color:"#3b82f6", important: false };
}

async function loadSheet(){
    try {
        const res = await fetch(`${SHEET_URL}&cb=${new Date().getTime()}`);
        const csv = await res.text();
        parseCSV(csv);
    } catch(err) {
        document.getElementById("todayStatus").innerHTML = "❌ 連線失敗";
    }
}

function parseCSV(csv){
    const lines = csv.split(/\r?\n/);
    const result = [];
    const pattern = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;

    for(let i = 1; i < lines.length; i++){
        if(!lines[i].trim()) continue;
        const cols = lines[i].split(pattern).map(v => v.replace(/^"|"$/g, '').trim());
        if(cols.length >= 7) {
            result.push({
                date: cols[1], time: cols[2], name: cols[3], 
                event: cols[4], people: cols[5], phone: cols[6], note: cols[7] || ""
            });
        }
    }
    render(result);
}

function render(events){
    const detail = document.getElementById("detail");
    const focusDetail = document.getElementById("focusDetail");
    const focusArea = document.getElementById("focusArea");
    const status = document.getElementById("todayStatus");
    
    const now = new Date();
    const todayStr = `${now.getMonth()+1}/${now.getDate()}`;
    const currentTimeMinutes = now.getHours() * 60 + now.getMinutes();

    detail.innerHTML = "";
    focusDetail.innerHTML = "";
    let count = 0;
    let hasFocus = false;

    events.forEach(e => {
        if(!e.date || !e.date.includes("/")) return;
        
        // 日期比對邏輯
        const parts = e.date.split("/");
        const isToday = (parseInt(parts[0]) === (now.getMonth()+1) && parseInt(parts[1]) === now.getDate());
        
        // 隱藏過去的日期
        const eventDate = new Date(now.getFullYear(), parseInt(parts[0])-1, parseInt(parts[1]));
        const todayNoon = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        if (eventDate < todayNoon) return;

        const info = getType(e.event, e.note);
        
        // 時間比對 (用於標記「進行中」)
        const timeParts = e.time.split(":");
        const eventTimeMinutes = (parseInt(timeParts[0]) || 0) * 60 + (parseInt(timeParts[1]) || 0);
        const isNow = isToday && Math.abs(currentTimeMinutes - eventTimeMinutes) <= 60; // 前後一小時內

        const cardHtml = `
            <div class="detail-card ${info.important ? 'is-vip' : ''} ${isNow ? 'is-now' : ''}">
                ${isNow ? '<span class="live-tag">⚡ 進行中 / 即將抵達</span>' : ''}
                <span class="badge" style="background:${info.color}">${info.label}</span>
                <h3>📅 ${e.date} ${e.time}</h3>
                <div class="info-row">👤 <b>${e.name}</b> (${e.people}人)</div>
                <div class="info-row">📌 ${e.event}</div>
                <div class="info-row">📞 ${e.phone}</div>
                ${e.note ? `<div class="note-box"><b>備註：</b><br>${e.note}</div>` : ''}
            </div>
        `;

        // 分流：VIP 或 正在進行的放入重點區
        if (info.important || isNow) {
            focusDetail.innerHTML += cardHtml;
            hasFocus = true;
        }
        
        detail.innerHTML += cardHtml;
        count++;
    });

    focusArea.style.display = hasFocus ? "block" : "none";
    status.innerHTML = count > 0 ? `✅ 今日尚有 ${count} 筆行程` : "✨ 目前無待辦項目";
}

loadSheet();
setInterval(loadSheet, 30000);
</script>
</body>
</html>
