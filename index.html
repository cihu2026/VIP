<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>慈湖公務團行政看板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
:root{--bg:#07101d;--bg2:#10233b;--text:#eef6ff;--muted:#a9b7ca;--border:rgba(255,255,255,.14);--accent:#6ee7f9;--mayor:#f8d56b;--director:#ef4444;--chief:#a855f7;--councilor:#f97316;--secretary:#38bdf8;--section:#22c55e;--vip:#fb7185;--normal:#cbd5e1;--special:#34d399}*{box-sizing:border-box;margin:0;padding:0;font-family:"Noto Sans TC",sans-serif}body{min-height:100vh;color:var(--text);padding:18px;background:radial-gradient(circle at top left,rgba(110,231,249,.22),transparent 34%),radial-gradient(circle at top right,rgba(168,85,247,.23),transparent 32%),linear-gradient(145deg,var(--bg),var(--bg2) 56%,#070b13);background-attachment:fixed}.app{max-width:1040px;margin:0 auto}.header-bar{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:20px;border:1px solid var(--border);border-radius:28px;background:rgba(255,255,255,.09);box-shadow:0 20px 55px rgba(0,0,0,.38);backdrop-filter:blur(18px);margin-bottom:14px}.badge{display:inline-flex;padding:5px 10px;border:1px solid rgba(110,231,249,.35);border-radius:999px;color:var(--accent);font-size:11px;font-weight:900;letter-spacing:.8px;background:rgba(110,231,249,.08);margin-bottom:8px}.main-title h1{font-size:28px;font-weight:900;line-height:1.15}.main-title p{margin-top:6px;font-size:11px;color:var(--muted);letter-spacing:1.6px;font-weight:800}.header-actions{display:flex;flex-direction:column;align-items:flex-end;gap:8px}#clock{font-size:20px;font-weight:900;padding:10px 12px;border-radius:16px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.12)}#lastUpdate{color:var(--muted);font-size:12px;font-weight:800}.toolbar,.legend{display:flex;gap:8px;flex-wrap:wrap}.toolbar{margin:0 0 14px}.legend{margin:0 0 18px}.btn,.pill{border:1px solid var(--border);background:rgba(255,255,255,.08);border-radius:999px;font-weight:900}.btn{color:#fff;padding:9px 13px;font-size:13px;cursor:pointer}.pill{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;padding:8px 10px}.pill i,.dot{display:block;border-radius:50%}.pill i{width:8px;height:8px;background:var(--normal)}.pill.mayor i,.dot.mayor{background:var(--mayor)}.pill.director i,.dot.director{background:var(--director)}.pill.chief i,.dot.chief{background:var(--chief)}.pill.councilor i,.dot.councilor{background:var(--councilor)}.pill.secretary i,.dot.secretary{background:var(--secretary)}.pill.section i,.dot.section{background:var(--section)}.pill.vip i,.dot.vip{background:var(--vip)}.pill.special i{background:var(--special)}.summary-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:18px}.summary-card,.calendar-box,.card,#empty-hint,#notice{background:rgba(255,255,255,.078);border:1px solid var(--border);box-shadow:0 15px 38px rgba(0,0,0,.24);backdrop-filter:blur(14px)}.summary-card{border-radius:20px;padding:14px}.summary-card .label{color:var(--muted);font-size:12px;font-weight:900;margin-bottom:5px}.summary-card .value{font-size:22px;font-weight:900}#notice{display:none;color:#fee2e2;border-color:rgba(248,113,113,.4);background:rgba(127,29,29,.28);padding:13px 15px;border-radius:18px;margin-bottom:15px;font-size:14px;font-weight:700}.calendars-container{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-bottom:24px}.calendar-box{border-radius:24px;padding:16px}.month-name{font-size:20px;font-weight:900;margin-bottom:14px;text-align:center}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.week-h{text-align:center;font-size:12px;color:#b5c2d2;padding-bottom:6px;font-weight:900}.day{aspect-ratio:1/1;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;font-weight:900;cursor:pointer;color:#d7e1ed;border:1px solid transparent;background:rgba(255,255,255,.025);position:relative}.day.today{background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff}.day.selected{border:2px solid var(--mayor);box-shadow:0 0 0 4px rgba(248,213,107,.13)}.day.closed{color:rgba(255,255,255,.38);background:rgba(255,255,255,.018)}.day.closed:after{content:"休";position:absolute;top:4px;right:5px;font-size:10px;color:rgba(255,255,255,.45)}.day.tuesday-special{background:rgba(52,211,153,.12);color:#d1fae5;border-color:rgba(52,211,153,.35)}.day.tuesday-special:after{content:"特開";position:absolute;top:4px;right:5px;font-size:10px;color:#86efac}.dot{width:6px;height:6px;background:#fff;margin-top:4px}.list-title{margin:18px 0 14px;font-size:28px;font-weight:900;display:flex;align-items:center;gap:12px}.list-title:before{content:"";width:8px;height:32px;background:linear-gradient(180deg,var(--accent),#3b82f6);border-radius:999px}.special-note{margin:-4px 0 14px;padding:12px 14px;border-radius:18px;border:1px solid rgba(52,211,153,.35);background:rgba(6,78,59,.32);color:#d1fae5;font-weight:900}.card{position:relative;overflow:hidden;border-radius:24px;padding:20px;margin-bottom:16px}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:7px;background:var(--normal)}.card.mayor:before{background:var(--mayor)}.card.director:before{background:var(--director)}.card.chief:before{background:var(--chief)}.card.councilor:before{background:var(--councilor)}.card.secretary:before{background:var(--secretary)}.card.section:before{background:var(--section)}.card.vip:before{background:var(--vip)}.time-tag{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--accent);font-weight:900;font-size:18px;margin-bottom:12px}.level-label{color:#06111f;font-size:12px;padding:5px 10px;border-radius:999px;white-space:nowrap;font-weight:900;background:var(--normal)}.level-label.director,.level-label.chief,.level-label.councilor,.level-label.vip{color:#fff}.level-label.mayor{background:var(--mayor)}.level-label.director{background:var(--director)}.level-label.chief{background:var(--chief)}.level-label.councilor{background:var(--councilor)}.level-label.secretary{background:var(--secretary)}.level-label.section{background:var(--section)}.level-label.vip{background:var(--vip)}.level-label.normal{background:rgba(203,213,225,.88);color:#0f172a}.group-name{font-size:23px;font-weight:900;margin-bottom:14px;line-height:1.35;word-break:break-word;white-space:pre-wrap}.group-name span{display:inline-block;font-size:15px;color:var(--mayor);font-weight:900;margin-left:8px}.meta-item{color:var(--muted);border-top:1px solid rgba(255,255,255,.08);padding-top:10px;font-size:16px;line-height:1.55;white-space:pre-wrap}.meta-item b{color:#fff;margin-left:5px}.note{margin-top:15px;padding:14px 15px;background:rgba(8,17,31,.42);border-radius:16px;font-size:15px;color:#d6deea;line-height:1.7;border:1px dashed rgba(255,255,255,.18);white-space:pre-wrap}#empty-hint{text-align:center;padding:42px;color:#8ca0b8;font-size:17px;font-weight:900;border-radius:22px}@media(max-width:760px){body{padding:13px}.header-bar{grid-template-columns:1fr;border-radius:24px;padding:18px}.header-actions{align-items:flex-start}.main-title h1{font-size:24px}#clock{font-size:17px}.summary-row{grid-template-columns:1fr;gap:9px}.calendars-container{grid-template-columns:1fr}.day{border-radius:14px;font-size:15px}.list-title{font-size:25px}.card{border-radius:22px;padding:18px}.group-name{font-size:21px}.time-tag{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="app">
  <div class="header-bar"><div class="main-title"><div class="badge">👥 OFFICIAL GROUP</div><h1>慈湖公務團行政看板</h1><p>CIHU OFFICIAL TOUR SCHEDULE</p></div><div class="header-actions"><div id="clock">00:00:00</div><div id="lastUpdate">資料同步中...</div></div></div>
  <div class="toolbar"><button class="btn" onclick="jumpToday()">今天</button><button class="btn" onclick="jumpTomorrow()">明天</button><button class="btn" onclick="manualReload()">重新整理</button></div>
  <div class="legend"><span class="pill mayor"><i></i>市長</span><span class="pill director"><i></i>局長</span><span class="pill chief"><i></i>處長</span><span class="pill councilor"><i></i>民代</span><span class="pill secretary"><i></i>秘書</span><span class="pill section"><i></i>課長</span><span class="pill vip"><i></i>貴賓/特殊</span><span class="pill special"><i></i>週二特開</span><span class="pill"><i></i>其他公務/外加</span></div>
  <div class="summary-row"><div class="summary-card"><div class="label">今日團數</div><div class="value" id="todayCount">0</div></div><div class="summary-card"><div class="label">今日人數</div><div class="value" id="todayPeople">0</div></div><div class="summary-card"><div class="label">未來行程</div><div class="value" id="futureCount">0</div></div></div>
  <div id="notice"></div>
  <div class="calendars-container"><div class="calendar-box"><div id="monthLabel-0" class="month-name">載入中...</div><div class="grid" id="calendar-0"><div class="week-h">日</div><div class="week-h">一</div><div class="week-h">二</div><div class="week-h">三</div><div class="week-h">四</div><div class="week-h">五</div><div class="week-h">六</div></div></div><div class="calendar-box"><div id="monthLabel-1" class="month-name">載入中...</div><div class="grid" id="calendar-1"><div class="week-h">日</div><div class="week-h">一</div><div class="week-h">二</div><div class="week-h">三</div><div class="week-h">四</div><div class="week-h">五</div><div class="week-h">六</div></div></div></div>
  <div class="list-title" id="listDateLabel">選擇日期查看行程</div><div id="eventList"></div>
</div>
<script>
const SHEET_ID="1-nkw5ZQIoQyNflxWbQ4_enhvtVAspX7RXGBm5u7RnBc";
const SHEET_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
const SYNC_INTERVAL=15000;
let allData=[],selectedDate=new Date();
const today=new Date();
function updateTime(){document.getElementById("clock").innerText=new Date().toLocaleTimeString("zh-TW",{hour12:false})}
updateTime();setInterval(updateTime,1000);
function esc(t){return String(t||"").replace(/[&<>'"]/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[s]))}
function h(t){return String(t||"").replace(/[：:]/g,"").replace(/\s+/g,"").trim()}
function parseCSV(csv){const rows=[];let r=[],f="",q=false;for(let i=0;i<csv.length;i++){const c=csv[i],n=csv[i+1];if(c==='"'){if(q&&n==='"'){f+='"';i++}else q=!q}else if(c===','&&!q){r.push(f.trim());f=""}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;r.push(f.trim());if(r.some(v=>v!==""))rows.push(r);r=[];f=""}else f+=c}if(f||r.length){r.push(f.trim());if(r.some(v=>v!==""))rows.push(r)}return rows}
function looksDate(v){const s=String(v||"").trim();return /^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/.test(s)||/^(\d{1,2})[\/\-](\d{1,2})$/.test(s)||/^(\d{1,2})[:：](\d{1,2})([:：]\d{1,2})?$/.test(s)}
function parseDate(v){const s=String(v||"").trim();let m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);if(m)return{y:+m[1],m:+m[2],d:+m[3]};m=s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);if(m)return{y:today.getFullYear(),m:+m[1],d:+m[2]};m=s.match(/^(\d{1,2})[:：](\d{1,2})([:：]\d{1,2})?$/);if(m)return{y:today.getFullYear(),m:+m[1],d:+m[2]};return null}
function normTime(v){let s=String(v||"").trim().replace(/：/g,":");let m=s.match(/^(\d{1,2}):(\d{2}):\d{2}$/);return m?`${m[1].padStart(2,"0")}:${m[2]}`:s}
function mins(v){let m=String(v||"").replace(/：/g,":").match(/(\d{1,2}):(\d{2})/);return m?+m[1]*60+ +m[2]:99999}
function formatPeople(v){let s=String(v||"").trim();if(!s)return"未知";if(/未知|待確認|不明|未定/.test(s))return s;if(/[人位名]/.test(s))return s;if(/^\d+$/.test(s))return s+"人";return s}
function col(headers,names){const ns=names.map(h);for(let i=0;i<headers.length;i++)if(ns.includes(headers[i]))return i;return -1}
function detectDate(headers,body){let d=col(headers,["日期","預約日期","參訪日期","Unnamed0","Unnamed"]);if(d!==-1)return d;let best=-1,score=0,max=Math.max(...body.map(r=>r.length),0);for(let c=0;c<max;c++){let s=0;for(const r of body.slice(0,15))if(looksDate(r[c]))s++;if(s>score){score=s;best=c}}return score?best:-1}
function parseData(csv){const rows=parseCSV(csv);if(!rows.length)return[];const headers=rows[0].map(h),body=rows.slice(1),di=detectDate(headers,body),ti=col(headers,["時間","預約時間","參訪時間"]),ni=col(headers,["團名","團體名稱","申請單位","單位名稱","姓名"]),pi=col(headers,["人數","參訪人數"]),ri=col(headers,["導覽老師","老師","負責老師"]),oi=col(headers,["備註","說明","其他"]);if(di===-1){showNotice("找不到日期欄位。請把日期欄標題改成「日期」，或確認日期格式如 2026-06-15。");return[]}hideNotice();return body.map(r=>{const d=parseDate(r[di]);if(!d)return null;const x={y:d.y,m:d.m,d:d.d,time:normTime(ti>=0?r[ti]:""),name:ni>=0?r[ni]:"",p:pi>=0?r[pi]:"",teacher:ri>=0?r[ri]:"",note:oi>=0?r[oi]:""};return x.name||x.time||x.teacher?x:null}).filter(Boolean)}
function level(x){const t=`${x.name}${x.note}${x.teacher}`;if(/市長/.test(t))return{key:"mayor",label:"👑 市長"};if(/局長|署長|副局長/.test(t))return{key:"director",label:"🔴 局長"};if(/處長|副處長/.test(t))return{key:"chief",label:"🟣 處長"};if(/議員|議長|副議長|立委/.test(t))return{key:"councilor",label:"🟠 民代"};if(/秘書|秘書長/.test(t))return{key:"secretary",label:"🔵 秘書"};if(/課長|股長|副座|副處/.test(t))return{key:"section",label:"🟢 課股長"};if(/貴賓|VIP|重要|長官|會長|外賓|KOL|媒體|拍攝|記者會|現勘/.test(t))return{key:"vip",label:"⭐ 特殊"};return{key:"normal",label:"公務/外加"}}
function top(events){const rank={mayor:8,director:7,chief:6,councilor:5,secretary:4,section:3,vip:2,normal:1};return events.map(level).sort((a,b)=>rank[b.key]-rank[a.key])[0]||{key:"normal"}}
function closed(y,m,d){return new Date(y,m-1,d).getDay()===2}
function dayEvents(y,m,d){return allData.filter(x=>x.y===y&&x.m===m&&x.d===d)}
function renderCal(mi,y,i){const box=document.getElementById(`calendar-${i}`),lab=document.getElementById(`monthLabel-${i}`),ml=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];lab.innerText=`${y}年 ${ml[mi]}`;box.querySelectorAll(".day").forEach(e=>e.remove());const start=new Date(y,mi,1).getDay(),days=new Date(y,mi+1,0).getDate();for(let k=0;k<start;k++){let e=document.createElement("div");e.className="day";box.appendChild(e)}for(let d=1;d<=days;d++){let e=document.createElement("div"),ev=dayEvents(y,mi+1,d),isTue=closed(y,mi+1,d);e.className="day";if(d===today.getDate()&&mi===today.getMonth()&&y===today.getFullYear())e.classList.add("today");if(d===selectedDate.getDate()&&mi===selectedDate.getMonth()&&y===selectedDate.getFullYear())e.classList.add("selected");if(isTue&&ev.length)e.classList.add("tuesday-special");else if(isTue)e.classList.add("closed");e.innerHTML=`<span>${d}</span>`;if(ev.length){let dot=document.createElement("div");dot.className=`dot ${top(ev).key}`;e.appendChild(dot)}e.onclick=()=>{selectedDate=new Date(y,mi,d);renderBoth();selectDate(y,mi+1,d)};box.appendChild(e)}}
function renderBoth(){let a=new Date(today.getFullYear(),today.getMonth(),1),b=new Date(today.getFullYear(),today.getMonth()+1,1);renderCal(a.getMonth(),a.getFullYear(),0);renderCal(b.getMonth(),b.getFullYear(),1)}
function selectDate(y,m,d){const list=document.getElementById("eventList"),week=["週日","週一","週二","週三","週四","週五","週六"],isTue=closed(y,m,d);document.getElementById("listDateLabel").innerText=`${m}月${d}日 (${week[new Date(y,m-1,d).getDay()]})`;let data=dayEvents(y,m,d).sort((a,b)=>mins(a.time)-mins(b.time));if(!data.length){list.innerHTML=`<div id="empty-hint">${isTue?"本日為週二休園；目前無公務團行程":"本日尚無行程安排"}</div>`;return}let special=isTue?'<div class="special-note">⚠️ 本日為週二休園日，但試算表已有行程資料，系統已標示為「週二特開」，仍照常顯示。</div>':'';list.innerHTML=special+data.map(x=>{const lv=level(x),tag=`<span class="level-label ${lv.key}">${lv.label}</span>`;return `<div class="card ${lv.key}"><span class="time-tag">預約時間：${esc(x.time||"未填")} ${tag}</span><div class="group-name">${esc(x.name||"未填團名")}<span>(${esc(formatPeople(x.p))})</span></div><div class="meta-item">導覽老師：<b>${esc(x.teacher||"未填")}</b></div>${x.note?`<div class="note"><b>備註：</b><br>${esc(x.note)}</div>`:""}</div>`}).join("")}
function numPeople(v){let m=String(v||"").match(/\d+/);return m?+m[0]:0}
function summary(){const y=today.getFullYear(),m=today.getMonth()+1,d=today.getDate(),td=new Date(y,m-1,d).getTime(),ev=dayEvents(y,m,d),f=allData.filter(x=>new Date(x.y,x.m-1,x.d).getTime()>=td);document.getElementById("todayCount").innerText=ev.length;document.getElementById("todayPeople").innerText=ev.reduce((s,x)=>s+numPeople(x.p),0)||"未定";document.getElementById("futureCount").innerText=f.length}
function showNotice(msg){const n=document.getElementById("notice");n.style.display="block";n.innerText=msg}
function hideNotice(){document.getElementById("notice").style.display="none"}
async function load(){try{const res=await fetch(`${SHEET_URL}&cache=${Date.now()}`,{cache:"no-store"});if(!res.ok)throw new Error(res.status);allData=parseData(await res.text());renderBoth();summary();selectDate(selectedDate.getFullYear(),selectedDate.getMonth()+1,selectedDate.getDate());document.getElementById("lastUpdate").innerText=`最後同步：${new Date().toLocaleTimeString("zh-TW",{hour12:false})}｜每15秒更新`}catch(e){console.error(e);showNotice("資料載入失敗。請確認試算表權限為知道連結者可檢視，或改用 Apps Script API。");document.getElementById("eventList").innerHTML='<div id="empty-hint">資料載入失敗，請確認試算表權限</div>'}}
function jumpToday(){selectedDate=new Date();renderBoth();selectDate(selectedDate.getFullYear(),selectedDate.getMonth()+1,selectedDate.getDate())}
function jumpTomorrow(){let t=new Date();t.setDate(t.getDate()+1);selectedDate=t;renderBoth();selectDate(t.getFullYear(),t.getMonth()+1,t.getDate())}
function manualReload(){load()}
load();setInterval(load,SYNC_INTERVAL);
</script>
</body>
</html>
