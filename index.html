<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
:root{--bg:#07101d;--bg2:#10233b;--text:#eef6ff;--muted:#a9b7ca;--border:rgba(255,255,255,.14);--accent:#6ee7f9;--mayor:#f8d56b;--director:#ef4444;--chief:#a855f7;--councilor:#f97316;--secretary:#38bdf8;--section:#22c55e;--vip:#fb7185;--normal:#cbd5e1;--special:#34d399}*{box-sizing:border-box;margin:0;padding:0;font-family:"Noto Sans TC",sans-serif}body{min-height:100vh;color:var(--text);padding:18px;background:radial-gradient(circle at top left,rgba(110,231,249,.22),transparent 34%),radial-gradient(circle at top right,rgba(168,85,247,.23),transparent 32%),linear-gradient(145deg,var(--bg),var(--bg2) 56%,#070b13);background-attachment:fixed}.app{max-width:1040px;margin:0 auto}.header-bar{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:20px;border:1px solid var(--border);border-radius:28px;background:rgba(255,255,255,.09);box-shadow:0 20px 55px rgba(0,0,0,.38);backdrop-filter:blur(18px);margin-bottom:14px}.badge{display:inline-flex;padding:5px 10px;border:1px solid rgba(110,231,249,.35);border-radius:999px;color:var(--accent);font-size:11px;font-weight:900;letter-spacing:.8px;background:rgba(110,231,249,.08);margin-bottom:8px}.main-title h1{font-size:28px;font-weight:900;line-height:1.15}.main-title p{margin-top:6px;font-size:11px;color:var(--muted);letter-spacing:1.6px;font-weight:800}.header-actions{display:flex;flex-direction:column;align-items:flex-end;gap:8px}#clock{font-size:20px;font-weight:900;padding:10px 12px;border-radius:16px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.12)}#lastUpdate{color:var(--muted);font-size:12px;font-weight:800}.toolbar,.legend{display:flex;gap:8px;flex-wrap:wrap}.toolbar{margin:0 0 14px}.legend{margin:0 0 18px}.btn,.pill{border:1px solid var(--border);background:rgba(255,255,255,.08);border-radius:999px;font-weight:900}.btn{color:#fff;padding:9px 13px;font-size:13px;cursor:pointer}.pill{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;padding:8px 10px}.pill i,.dot{display:block;border-radius:50%}.pill i{width:8px;height:8px;background:var(--normal)}.pill.mayor i,.dot.mayor{background:var(--mayor)}.pill.director i,.dot.director{background:var(--director)}.pill.chief i,.dot.chief{background:var(--chief)}.pill.councilor i,.dot.councilor{background:var(--councilor)}.pill.secretary i,.dot.secretary{background:var(--secretary)}.pill.section i,.dot.section{background:var(--section)}.pill.vip i,.dot.vip{background:var(--vip)}.pill.special i{background:var(--special)}.summary-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:18px}.summary-card,.calendar-box,.card,#empty-hint,#notice{background:rgba(255,255,255,.078);border:1px solid var(--border);box-shadow:0 15px 38px rgba(0,0,0,.24);backdrop-filter:blur(14px)}.summary-card{border-radius:20px;padding:14px}.summary-card .label{color:var(--muted);font-size:12px;font-weight:900;margin-bottom:5px}.summary-card .value{font-size:22px;font-weight:900}#notice{display:none;color:#fee2e2;border-color:rgba(248,113,113,.4);background:rgba(127,29,29,.28);padding:13px 15px;border-radius:18px;margin-bottom:15px;font-size:14px;font-weight:700;line-height:1.6}.calendars-container{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-bottom:24px}.calendar-box{border-radius:24px;padding:16px}.month-name{font-size:20px;font-weight:900;margin-bottom:14px;text-align:center}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.week-h{text-align:center;font-size:12px;color:#b5c2d2;padding-bottom:6px;font-weight:900}.day{aspect-ratio:1/1;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;font-weight:900;cursor:pointer;color:#d7e1ed;border:1px solid transparent;background:rgba(255,255,255,.025);position:relative}.day.today{background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff}.day.selected{border:2px solid var(--mayor);box-shadow:0 0 0 4px rgba(248,213,107,.13)}.day.closed{color:rgba(255,255,255,.38);background:rgba(255,255,255,.018)}.day.closed:after{content:"休";position:absolute;top:4px;right:5px;font-size:10px;color:rgba(255,255,255,.45)}.day.tuesday-special{background:rgba(52,211,153,.12);color:#d1fae5;border-color:rgba(52,211,153,.35)}.day.tuesday-special:after{content:"特開";position:absolute;top:4px;right:5px;font-size:10px;color:#86efac}.dot{width:6px;height:6px;background:#fff;margin-top:4px}.list-title{margin:18px 0 14px;font-size:28px;font-weight:900;display:flex;align-items:center;gap:12px}.list-title:before{content:"";width:8px;height:32px;background:linear-gradient(180deg,var(--accent),#3b82f6);border-radius:999px}.special-note{margin:-4px 0 14px;padding:12px 14px;border-radius:18px;border:1px solid rgba(52,211,153,.35);background:rgba(6,78,59,.32);color:#d1fae5;font-weight:900}.card{position:relative;overflow:hidden;border-radius:24px;padding:20px;margin-bottom:16px}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:7px;background:var(--normal)}.card.mayor:before{background:var(--mayor)}.card.director:before{background:var(--director)}.card.chief:before{background:var(--chief)}.card.councilor:before{background:var(--councilor)}.card.secretary:before{background:var(--secretary)}.card.section:before{background:var(--section)}.card.vip:before{background:var(--vip)}.time-tag{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--accent);font-weight:900;font-size:18px;margin-bottom:12px}.level-label{color:#06111f;font-size:12px;padding:5px 10px;border-radius:999px;white-space:nowrap;font-weight:900;background:var(--normal)}.level-label.director,.level-label.chief,.level-label.councilor,.level-label.vip{color:#fff}.level-label.mayor{background:var(--mayor)}.level-label.director{background:var(--director)}.level-label.chief{background:var(--chief)}.level-label.councilor{background:var(--councilor)}.level-label.secretary{background:var(--secretary)}.level-label.section{background:var(--section)}.level-label.vip{background:var(--vip)}.level-label.normal{background:rgba(203,213,225,.88);color:#0f172a}.group-name{font-size:23px;font-weight:900;margin-bottom:14px;line-height:1.35;word-break:break-word;white-space:pre-wrap}.group-name span{display:inline-block;font-size:15px;color:var(--mayor);font-weight:900;margin-left:8px}.meta-item{color:var(--muted);border-top:1px solid rgba(255,255,255,.08);padding-top:10px;font-size:16px;line-height:1.55;white-space:pre-wrap}.meta-item b{color:#fff;margin-left:5px}.note{margin-top:15px;padding:14px 15px;background:rgba(8,17,31,.42);border-radius:16px;font-size:15px;color:#d6deea;line-height:1.7;border:1px dashed rgba(255,255,255,.18);white-space:pre-wrap}#empty-hint{text-align:center;padding:42px;color:#8ca0b8;font-size:17px;font-weight:900;border-radius:22px}@media(max-width:760px){body{padding:13px}.header-bar{grid-template-columns:1fr;border-radius:24px;padding:18px}.header-actions{align-items:flex-start}.main-title h1{font-size:24px}#clock{font-size:17px}.summary-row{grid-template-columns:1fr;gap:9px}.calendars-container{grid-template-columns:1fr}.day{border-radius:14px;font-size:15px}.list-title{font-size:25px}.card{border-radius:22px;padding:18px}.group-name{font-size:21px}.time-tag{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="app">
  <div class="header-bar"><div class="main-title"><div class="badge">👥 OFFICIAL GROUP</div><h1>慈湖公務團行政看板</h1><p>CIHU OFFICIAL TOUR SCHEDULE</p></div><div class="header-actions"><div id="clock">00:00:00</div><div id="lastUpdate">資料同步中...</div></div></div>
  <div class="toolbar"><button class="btn" onclick="jumpToday()">今天</button><button class="btn" onclick="jumpTomorrow()">明天</button><button class="btn" onclick="manualReload()">重新整理</button></div>
  <div class="legend"><span class="pill mayor"><i></i>市長</span><span class="pill director"><i></i>局長</span><span class="pill chief"><i></i>處長</span><span class="pill councilor"><i></i>民代</span><span class="pill secretary"><i></i>秘書</span><span class="pill section"><i></i>課長</span><span class="pill vip"><i></i>貴賓/特殊</span><span class="pill special"><i></i>週二特開</span><span class="pill"><i></i>其他公務/外加</span></div>
  <div class="summary-row"><div class="summary-card"><div class="label">今日團數</div><div class="value" id="todayCount">0</div></div><div class="summary-card"><div class="label">今日人數</div><div class="value" id="todayPeople">0</div></div><div class="summary-card"><div class="label">未來行程</div><div class="value" id="futureCount">0</div></div></div>
  <div id="notice"></div>
  <div class="calendars-container"><div class="calendar-box"><div id="monthLabel-0" class="month-name">載入中...</div><div class="grid" id="calendar-0"><div class="week-h">日</div><div class="week-h">一</div><div class="week-h">二</div><div class="week-h">三</div><div class="week-h">四</div><div class="week-h">五</div><div class="week-h">六</div></div></div><div class="calendar-box"><div id="monthLabel-1" class="month-name">載入中...</div><div class="grid" id="calendar-1"><div class="week-h">日</div><div class="week-h">一</div><div class="week-h">二</div><div class="week-h">三</div><div class="week-h">四</div><div class="week-h">五</div><div class="week-h">六</div></div></div></div>
  <div class="list-title" id="listDateLabel">選擇日期查看行程</div><div id="eventList"></div>
</div>
<script>
var SHEET_ID="1-nkw5ZQIoQyNflxWbQ4_enhvtVAspX7RXGBm5u7RnBc";
var SHEET_URL="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv";
var SYNC_INTERVAL=15000;
var allData=[];
var selectedDate=new Date();
var today=new Date();
function byId(id){return document.getElementById(id);}
function setText(id,text){var e=byId(id);if(e){e.innerText=text;}}
function updateTime(){setText("clock",new Date().toLocaleTimeString("zh-TW",{hour12:false}));}
updateTime();setInterval(updateTime,1000);
function esc(t){return String(t||"").replace(/[&<>']/g,function(s){return {"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;"}[s];});}
function h(t){return String(t||"").replace(/[：:]/g,"").replace(/\s+/g,"").trim();}
function parseCSV(csv){var rows=[],row=[],field="",q=false,i,c,n;for(i=0;i<csv.length;i++){c=csv.charAt(i);n=csv.charAt(i+1);if(c==='"'){if(q&&n==='"'){field+='"';i++;}else{q=!q;}}else if(c===','&&!q){row.push(field.trim());field="";}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n'){i++;}row.push(field.trim());if(row.join("").trim()!==""){rows.push(row);}row=[];field="";}else{field+=c;}}if(field!==""||row.length){row.push(field.trim());if(row.join("").trim()!==""){rows.push(row);}}return rows;}
function looksDate(v){var s=String(v||"").trim();return /^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/.test(s)||/^(\d{1,2})[\/\-](\d{1,2})$/.test(s)||/^(\d{1,2})[:：](\d{1,2})([:：]\d{1,2})?$/.test(s);}
function parseDate(v){var s=String(v||"").trim(),m;m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);if(m){return{y:Number(m[1]),m:Number(m[2]),d:Number(m[3])};}m=s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);if(m){return{y:today.getFullYear(),m:Number(m[1]),d:Number(m[2])};}m=s.match(/^(\d{1,2})[:：](\d{1,2})([:：]\d{1,2})?$/);if(m){return{y:today.getFullYear(),m:Number(m[1]),d:Number(m[2])};}return null;}
function normTime(v){var s=String(v||"").trim().replace(/：/g,":"),m=s.match(/^(\d{1,2}):(\d{2}):\d{2}$/);return m?("0"+m[1]).slice(-2)+":"+m[2]:s;}
function mins(v){var m=String(v||"").replace(/：/g,":").match(/(\d{1,2}):(\d{2})/);return m?Number(m[1])*60+Number(m[2]):99999;}
function formatPeople(v){var s=String(v||"").trim();if(!s){return"未知";}if(/未知|待確認|不明|未定/.test(s)){return s;}if(/[人位名]/.test(s)){return s;}if(/^\d+$/.test(s)){return s+"人";}return s;}
function col(headers,names){var i,j,ns=[];for(j=0;j<names.length;j++){ns.push(h(names[j]));}for(i=0;i<headers.length;i++){if(ns.indexOf(headers[i])!==-1){return i;}}return -1;}
function detectDate(headers,body){var d=col(headers,["日期","預約日期","參訪日期","Unnamed0","Unnamed"]);if(d!==-1){return d;}var best=-1,score=0,c,r,s,max=0;for(r=0;r<body.length;r++){if(body[r].length>max){max=body[r].length;}}for(c=0;c<max;c++){s=0;for(r=0;r<body.length&&r<15;r++){if(looksDate(body[r][c])){s++;}}if(s>score){score=s;best=c;}}return score?best:-1;}
function parseData(csv){var rows=parseCSV(csv);if(!rows.length){return [];}var headers=[],i;for(i=0;i<rows[0].length;i++){headers.push(h(rows[0][i]));}var body=rows.slice(1),di=detectDate(headers,body),ti=col(headers,["時間","預約時間","參訪時間"]),ni=col(headers,["團名","團體名稱","申請單位","單位名稱","姓名"]),pi=col(headers,["人數","參訪人數"]),ri=col(headers,["導覽老師","老師","負責老師"]),oi=col(headers,["備註","說明","其他"]),out=[],r,d,x;if(di===-1){showNotice("找不到日期欄位。請把日期欄標題改成『日期』，或確認日期格式如 2026-06-15。");return [];}hideNotice();for(i=0;i<body.length;i++){r=body[i];d=parseDate(r[di]);if(!d){continue;}x={y:d.y,m:d.m,d:d.d,time:normTime(ti>=0?r[ti]:""),name:ni>=0?r[ni]:"",p:pi>=0?r[pi]:"",teacher:ri>=0?r[ri]:"",note:oi>=0?r[oi]:""};if(x.name||x.time||x.teacher){out.push(x);}}return out;}
function level(x){var t=""+x.name+x.note+x.teacher;if(/市長/.test(t)){return{key:"mayor",label:"市長"};}if(/局長|署長|副局長/.test(t)){return{key:"director",label:"局長"};}if(/處長|副處長/.test(t)){return{key:"chief",label:"處長"};}if(/議員|議長|副議長|立委/.test(t)){return{key:"councilor",label:"民代"};}if(/秘書|秘書長/.test(t)){return{key:"secretary",label:"秘書"};}if(/課長|股長|副座|副處/.test(t)){return{key:"section",label:"課股長"};}if(/貴賓|VIP|重要|長官|會長|外賓|KOL|媒體|拍攝|記者會|現勘/.test(t)){return{key:"vip",label:"特殊"};}return{key:"normal",label:"公務/外加"};}
function top(events){var rank={mayor:8,director:7,chief:6,councilor:5,secretary:4,section:3,vip:2,normal:1},arr=[],i;for(i=0;i<events.length;i++){arr.push(level(events[i]));}arr.sort(function(a,b){return rank[b.key]-rank[a.key];});return arr[0]||{key:"normal"};}
function closed(y,m,d){return new Date(y,m-1,d).getDay()===2;}
function dayEvents(y,m,d){var a=[],i,x;for(i=0;i<allData.length;i++){x=allData[i];if(x.y===y&&x.m===m&&x.d===d){a.push(x);}}return a;}
function renderCal(mi,y,idx){var box=byId("calendar-"+idx),lab=byId("monthLabel-"+idx),ml=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"],start,days,k,d,e,ev,isTue,dot;if(!box){return;}lab.innerText=y+"年 "+ml[mi];while(box.children.length>7){box.removeChild(box.lastChild);}start=new Date(y,mi,1).getDay();days=new Date(y,mi+1,0).getDate();for(k=0;k<start;k++){e=document.createElement("div");e.className="day";box.appendChild(e);}for(d=1;d<=days;d++){e=document.createElement("div");ev=dayEvents(y,mi+1,d);isTue=closed(y,mi+1,d);e.className="day";if(d===today.getDate()&&mi===today.getMonth()&&y===today.getFullYear()){e.className+=" today";}if(d===selectedDate.getDate()&&mi===selectedDate.getMonth()&&y===selectedDate.getFullYear()){e.className+=" selected";}if(isTue&&ev.length){e.className+=" tuesday-special";}else if(isTue){e.className+=" closed";}e.innerHTML="<span>"+d+"</span>";if(ev.length){dot=document.createElement("div");dot.className="dot "+top(ev).key;e.appendChild(dot);}e.setAttribute("data-y",y);e.setAttribute("data-m",mi+1);e.setAttribute("data-d",d);e.onclick=function(){selectedDate=new Date(Number(this.getAttribute("data-y")),Number(this.getAttribute("data-m"))-1,Number(this.getAttribute("data-d")));renderBoth();selectDate(selectedDate.getFullYear(),selectedDate.getMonth()+1,selectedDate.getDate());};box.appendChild(e);}}
function renderBoth(){var a=new Date(today.getFullYear(),today.getMonth(),1),b=new Date(today.getFullYear(),today.getMonth()+1,1);renderCal(a.getMonth(),a.getFullYear(),0);renderCal(b.getMonth(),b.getFullYear(),1);}
function selectDate(y,m,d){var list=byId("eventList"),week=["週日","週一","週二","週三","週四","週五","週六"],isTue=closed(y,m,d),data=dayEvents(y,m,d),html="",i,x,lv,tag;setText("listDateLabel",m+"月"+d+"日 ("+week[new Date(y,m-1,d).getDay()]+")");data.sort(function(a,b){return mins(a.time)-mins(b.time);});if(!data.length){list.innerHTML="<div id='empty-hint'>"+(isTue?"本日為週二休園；目前無公務團行程":"本日尚無行程安排")+"</div>";return;}if(isTue){html+="<div class='special-note'>本日為週二休園日，但試算表已有行程資料，系統已標示為『週二特開』，仍照常顯示。</div>";}for(i=0;i<data.length;i++){x=data[i];lv=level(x);tag="<span class='level-label "+lv.key+"'>"+esc(lv.label)+"</span>";html+="<div class='card "+lv.key+"'><span class='time-tag'>預約時間："+esc(x.time||"未填")+" "+tag+"</span><div class='group-name'>"+esc(x.name||"未填團名")+"<span>("+esc(formatPeople(x.p))+")</span></div><div class='meta-item'>導覽老師：<b>"+esc(x.teacher||"未填")+"</b></div>"+(x.note?"<div class='note'><b>備註：</b><br>"+esc(x.note)+"</div>":"")+"</div>";}list.innerHTML=html;}
function numPeople(v){var m=String(v||"").match(/\d+/);return m?Number(m[0]):0;}
function summary(){var y=today.getFullYear(),m=today.getMonth()+1,d=today.getDate(),td=new Date(y,m-1,d).getTime(),ev=dayEvents(y,m,d),f=[],i,x,sum=0;for(i=0;i<ev.length;i++){sum+=numPeople(ev[i].p);}for(i=0;i<allData.length;i++){x=allData[i];if(new Date(x.y,x.m-1,x.d).getTime()>=td){f.push(x);}}setText("todayCount",ev.length);setText("todayPeople",sum||"未定");setText("futureCount",f.length);}
function showNotice(msg){var n=byId("notice");if(n){n.style.display="block";n.innerText=msg;}}
function hideNotice(){var n=byId("notice");if(n){n.style.display="none";}}
function requestCSV(done){var xhr=new XMLHttpRequest();xhr.onreadystatechange=function(){if(xhr.readyState===4){if(xhr.status>=200&&xhr.status<300){done(null,xhr.responseText);}else{done(new Error("HTTP "+xhr.status));}}};xhr.open("GET",SHEET_URL+"&cache="+(new Date().getTime()),true);xhr.send();}
function load(){setText("lastUpdate","同步中...");requestCSV(function(err,text){if(err){showNotice("資料讀取失敗：請確認試算表共用權限，或稍後按重新整理。");setText("lastUpdate","同步失敗");return;}allData=parseData(text);renderBoth();summary();selectDate(selectedDate.getFullYear(),selectedDate.getMonth()+1,selectedDate.getDate());setText("lastUpdate","最後同步："+new Date().toLocaleTimeString("zh-TW",{hour12:false})+"｜每15秒更新");});}
function jumpToday(){selectedDate=new Date();renderBoth();selectDate(selectedDate.getFullYear(),selectedDate.getMonth()+1,selectedDate.getDate());}
function jumpTomorrow(){var t=new Date();t.setDate(t.getDate()+1);selectedDate=t;renderBoth();selectDate(t.getFullYear(),t.getMonth()+1,t.getDate());}
function manualReload(){load();}
try{load();setInterval(load,SYNC_INTERVAL);}catch(e){showNotice("程式啟動失敗："+e.message);setText("lastUpdate","程式錯誤");}
</script>
</body>
</html>
