<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>後慈湖行政排程系統</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap');
        
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --accent: #58a6ff;
            --vip: #f85149;
            --pending: #d29922;
            --text: #c9d1d9;
            --border: #30363d;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: "Noto Sans TC", sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px; 
            min-height: 100vh;
        }

        /* 頂部專業標題區 */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 25px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 25px;
        }
        .main-title h1 { font-size: 24px; font-weight: 900; color: #fff; letter-spacing: 1px; }
        .main-title p { font-size: 12px; color: var(--accent); font-weight: 700; }
        
        .real-time { text-align: right; line-height: 1.2; }
        #clock { font-size: 20px; font-weight: 700; color: #fff; }
        .status-tag { font-size: 11px; color: #3fb950; }

        /* 日曆區塊 */
        .calendar-box {
            background: var(--panel);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .month-name { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .week-h { text-align: center; font-size: 13px; color: #8b949e; padding-bottom: 10px; font-weight: 700; }
        .day { 
            aspect-ratio: 1/1; border-radius: 10px; border: 1px solid transparent;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.2s; position: relative;
        }
        .day:hover { background: rgba(255,255,255,0.05); }
        .day.today { background: var(--accent); color: #fff; font-weight: 900; }
        .day.selected { border-color: #fff; background: rgba(255,255,255,0.1); }

        /* 行程指示點 */
        .dot-box { display: flex; gap: 3px; position: absolute; bottom: 6px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: #444; }
        .dot.vip { background: var(--vip); box-shadow: 0 0 5px var(--vip); }
        .dot.event { background: #fff; }

        /* 行程清單標題 */
        .list-title { 
            margin: 35px 0 15px; font-size: 18px; font-weight: 900; color: #fff;
            display: flex; align-items: center; gap: 10px;
        }
        .list-title::before { content: ''; width: 4px; height: 20px; background: var(--accent); border-radius: 2px; }

        /* 行程卡片：極度清晰 */
        .card { 
            background: var(--panel); 
            border: 1px solid var(--border);
            border-radius: 12px; padding: 18px; margin-bottom: 12px;
            position: relative; overflow: hidden;
        }
        .card.is-vip { border-left: 5px solid var(--vip); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .time-tag { color: var(--accent); font-weight: 900; font-size: 16px; }
        .vip-label { background: var(--vip); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 900; }

        .group-name { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 8px; }
        .group-name span { font-size: 14px; color: #8b949e; font-weight: 400; margin-left: 5px; }

        .meta-info { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 14px; }
        .meta-item { color: #8b949e; }
        .meta-item b { color: #c9d1d9; }

        .note { 
            margin-top: 12px; padding: 10px; background: rgba(0,0,0,0.2); 
            border-radius: 6px; font-size: 13px; color: #8b949e; border: 1px solid rgba(255,255,255,0.05);
        }

        #empty-hint { text-align: center; padding: 50px; color: #484f58; font-weight: 700; }
    </style>
</head>
<body>

<div class="header-bar">
    <div class="main-title">
        <h1>後慈湖行政排程</h1>
        <p>CIHU ADMINISTRATION SYSTEM</p>
    </div>
    <div class="real-time">
        <div id="clock">00:00:00</div>
        <div class="status-tag">● 雲端資料同步中</div>
    </div>
</div>

<div class="calendar-box">
    <div id="monthLabel" class="month-name">2026年 5月</div>
    <div class="grid" id="calendar">
        <div class="week-h">日</div><div class="week-h">一</div><div class="week-h">二</div>
        <div class="week-h">三</div><div class="week-h">四</div><div class="week-h">五</div><div class="week-h">六</div>
    </div>
</div>

<div class="list-title" id="listDateLabel">載入中...</div>
<div id="eventList"></div>

<script>
// 1. 基本設定
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let allData = [];
const today = new Date();

// 2. 時鐘功能
function updateTime() {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW', {hour12:false});
}
setInterval(updateTime, 1000);

// 3. 抓取資料
async function load() {
    try {
        const res = await fetch(`${SHEET_URL}&cache=${Date.now()}`);
        const text = await res.text();
        allData = parse(text);
        renderCal(today.getMonth(), today.getFullYear());
        selectDate(today.getMonth() + 1, today.getDate());
    } catch (e) { console.error("資料載入失敗"); }
}

function parse(csv) {
    const rows = csv.split(/\r?\n/).slice(1);
    return rows.map(r => {
        const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
        if(!c[1]) return null;
        const dPart = c[1].split("/");
        return { 
            m: parseInt(dPart[dPart.length-2]), 
            d: parseInt(dPart[dPart.length-1]), 
            time: c[2], name: c[3], act: c[4], p: c[5], tel: c[6], note: c[7] 
        };
    }).filter(x => x);
}

// 4. 渲染日曆
function renderCal(m, y) {
    const container = document.getElementById("calendar");
    const mLabel = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
    document.getElementById("monthLabel").innerText = `${y}年 ${mLabel[m]}`;
    
    const start = new Date(y, m, 1).getDay();
    const days = new Date(y, m + 1, 0).getDate();
    document.querySelectorAll('.day').forEach(e => e.remove());

    for(let i=0; i<start; i++) container.appendChild(Object.assign(document.createElement("div"), {className:"day"}));

    for(let d=1; d<=days; d++) {
        const el = document.createElement("div");
        el.className = "day";
        if(d === today.getDate() && m === today.getMonth()) el.classList.add("today");
        el.innerHTML = `<span>${d}</span>`;
        
        const dayEvents = allData.filter(x => x.m === (m+1) && x.d === d);
        if(dayEvents.length > 0) {
            const dots = document.createElement("div"); dots.className = "dot-box";
            const isVip = dayEvents.some(x => (x.act+x.name+x.note).match(/貴賓/));
            const dot = document.createElement("div");
            dot.className = isVip ? "dot vip" : "dot event";
            dots.appendChild(dot);
            el.appendChild(dots);
        }
        
        el.onclick = () => {
            document.querySelectorAll('.day').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
            selectDate(m + 1, d);
        };
        container.appendChild(el);
    }
}

// 5. 顯示行程明細
function selectDate(m, d) {
    const list = document.getElementById("eventList");
    const week = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
    const dayName = week[new Date(2026, m-1, d).getDay()];
    
    document.getElementById("listDateLabel").innerText = `${m}月${d}日 (${dayName}) 行程明細`;
    
    const filtered = allData.filter(x => x.m === m && x.d === d).sort((a,b) => a.time.localeCompare(b.time));
    list.innerHTML = filtered.length ? "" : '<div id="empty-hint">此日期無行程安排</div>';

    filtered.forEach(x => {
        const isVip = (x.act+x.name+x.note).match(/VIP|市長|貴賓/);
        list.innerHTML += `
            <div class="card ${isVip ? 'is-vip' : ''}">
                <div class="card-header">
                    <div class="time-tag">預約時間：${x.time}</div>
                    ${isVip ? '<div class="vip-label">重要貴賓</div>' : ''}
                </div>
                <div class="group-name">${x.name} <span>(${x.p}人)</span></div>
                <div class="meta-info">
                    <div class="meta-item">活動名稱：<b>${x.act}</b></div>
                    <div class="meta-item">聯繫電話：<b>${x.tel}</b></div>
                </div>
                ${x.note ? `<div class="note">備註說明：${x.note}</div>` : ""}
            </div>
        `;
    });
}

load();
setInterval(load, 60000); // 每一分鐘自動更新資料
</script>
</body>
</html>
