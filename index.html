<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📌 後慈湖行程行政看板</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root {
            --bg: #0b0f1a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --vip: #f43f5e;
            --pending: #fbbf24;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: "Noto Sans TC", sans-serif; }
        body { 
            background: radial-gradient(circle at top left, #1e293b 0%, var(--bg) 80%); 
            color: #f1f5f9; padding: 15px; min-height: 100vh;
        }

        /* Header */
        .header { margin: 15px 0 20px; text-align: center; }
        .month-title { font-size: 30px; font-weight: 900; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Calendar Card */
        .calendar-container {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .weekday { text-align: center; font-size: 14px; font-weight: 900; color: #64748b; padding-bottom: 10px; }
        .day { 
            aspect-ratio: 1/1; background: rgba(255,255,255,0.02); border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .day.today { background: rgba(59, 130, 246, 0.2); border-color: var(--accent); color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .dots { display: flex; gap: 3px; margin-top: 4px; height: 6px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }

        /* Detail List */
        .details-header { margin: 30px 0 15px; font-size: 24px; font-weight: 900; display: flex; align-items: center; gap: 10px; border-left: 6px solid var(--accent); padding-left: 15px; }
        .event-list { display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        .event-card { 
            background: var(--glass); border: 1px solid var(--glass-border); padding: 22px; border-radius: 25px;
            position: relative; overflow: hidden; animation: fadeInUp 0.4s ease forwards;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .event-card::before { content: ''; position: absolute; left: 0; top: 0; width: 8px; height: 100%; background: var(--accent); }
        .event-card.vip::before { background: var(--vip); box-shadow: 4px 0 15px rgba(244, 63, 94, 0.4); }
        .event-card.pending::before { background: var(--pending); }

        .time-tag { font-size: 18px; font-weight: 900; color: #94a3b8; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .name-row { font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .info-row { font-size: 18px; color: #cbd5e1; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .note-box { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; font-size: 18px; color: #94a3b8; border: 1px solid rgba(255,255,255,0.05); }
        .badge { padding: 3px 10px; border-radius: 8px; font-size: 14px; color: #fff; font-weight: 900; }
        
        #sync-info { position: fixed; bottom: 15px; right: 15px; font-size: 12px; opacity: 0.5; background: #000; padding: 5px 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div id="monthDisplay" class="month-title">2026 MAY</div>
</div>

<div class="calendar-container">
    <div class="calendar-grid" id="calendar">
        <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
        <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>
    </div>
</div>

<div class="details-header">📌 <span id="selectedDateText">今日行程</span></div>
<div id="eventList" class="event-list"></div>
<div id="sync-info">自動更新中...</div>

<script>
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg}/export?format=csv`;

let allEvents = [];
const now = new Date();

async function fetchData() {
    try {
        const res = await fetch(`${SHEET_URL}&cb=${new Date().getTime()}`);
        const csv = await res.text();
        allEvents = parseCSV(csv);
        renderCalendar(now.getFullYear(), now.getMonth());
        // 預設顯示今天
        showEvents(now.getMonth() + 1, now.getDate());
        document.getElementById('sync-info').innerText = `更新於: ${new Date().toLocaleTimeString()}`;
    } catch (e) { console.error("Fetch Error"); }
}

function parseCSV(csv) {
    const lines = csv.split(/\r?\n/).slice(1);
    const pattern = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
    return lines.map(line => {
        const c = line.split(pattern).map(v => v.replace(/^"|"$/g, '').trim());
        // 欄位對應: [1]日期, [2]時間, [3]姓名, [4]活動, [5]人數, [6]電話, [7]備註
        if(!c[1] || !c[1].includes("/")) return null;
        const [m, d] = c[1].split("/").map(Number);
        return { month: m, day: d, time: c[2], name: c[3], event: c[4], people: c[5], phone: c[6], note: c[7] || "" };
    }).filter(e => e);
}

function renderCalendar(year, month) {
    const cal = document.getElementById("calendar");
    const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
    document.getElementById("monthDisplay").innerText = `${year}年 ${monthNames[month]}`;
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    document.querySelectorAll('.day').forEach(d => d.remove());

    for(let i=0; i<firstDay; i++) {
        const div = document.createElement("div"); div.className = "day"; cal.appendChild(div);
    }

    for(let d=1; d<=daysInMonth; d++) {
        const div = document.createElement("div");
        div.className = "day";
        if(d === now.getDate() && month === now.getMonth()) div.classList.add("today");
        div.innerHTML = `<span>${d}</span>`;
        
        const dayEvents = allEvents.filter(e => e.month === (month + 1) && e.day === d);
        if(dayEvents.length > 0) {
            const dots = document.createElement("div"); dots.className = "dots";
            dayEvents.slice(0,3).forEach(ev => {
                const dot = document.createElement("div"); dot.className = "dot";
                const t = (ev.event + ev.note).toUpperCase();
                if(t.includes("VIP") || t.includes("市長") || t.includes("貴賓")) dot.style.background = "var(--vip)";
                else if(t.includes("待確認") || t.includes("暫定")) dot.style.background = "var(--pending)";
                else dot.style.background = "#fff";
                dots.appendChild(dot);
            });
            div.appendChild(dots);
        }

        div.onclick = () => {
            document.querySelectorAll('.day').forEach(el => el.style.borderColor = "transparent");
            div.style.borderColor = "var(--accent)";
            showEvents(month + 1, d);
            document.querySelector('.details-header').scrollIntoView({ behavior: 'smooth' });
        };
        cal.appendChild(div);
    }
}

function showEvents(m, d) {
    const list = document.getElementById("eventList");
    document.getElementById("selectedDateText").innerText = `${m}/${d} 行程明細`;
    list.innerHTML = "";

    const filtered = allEvents.filter(e => e.month === m && e.day === d).sort((a,b) => a.time.localeCompare(b.time));

    if(filtered.length === 0) {
        list.innerHTML = "<div style='opacity:0.3; text-align:center; padding:50px; font-size:20px;'>此日期無預約行程</div>";
        return;
    }

    filtered.forEach(e => {
        const t = (e.event + e.note).toUpperCase();
        let statusClass = ""; let badge = "";
        if(t.includes("VIP") || t.includes("市長") || t.includes("貴賓")) { 
            statusClass = "vip"; badge = "<span class='badge' style='background:var(--vip)'>⭐ VIP</span>"; 
        } else if(t.includes("待確認") || t.includes("暫定")) { 
            statusClass = "pending"; badge = "<span class='badge' style='background:var(--pending); color:#000'>⚠️ 待確認</span>"; 
        }

        list.innerHTML += `
            <div class="event-card ${statusClass}">
                <div class="time-tag">⏰ ${e.time} ${badge}</div>
                <div class="name-row">${e.name} <span style="font-size:18px; opacity:0.6; font-weight:400;">(${e.people}人)</span></div>
                <div class="info-row">📌 ${e.event}</div>
                <div class="info-row">📞 ${e.phone}</div>
                ${e.note ? `<div class="note-box">💡 備註：${e.note}</div>` : ""}
            </div>
        `;
    });
}

fetchData();
setInterval(fetchData, 30000); // 30秒自動同步
</script>
</body>
</html>
