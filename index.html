<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>🌿 LINE AI 排程板</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Noto Sans TC",sans-serif;
}

body{
    background:#0f1115;
    color:white;
    padding:18px;
}

.title{
    text-align:center;
    font-size:34px;
    font-weight:900;
    margin-top:10px;
}

.sub{
    text-align:center;
    opacity:.7;
    margin-top:8px;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#1b1f27;
    border-radius:24px;
    padding:20px;
    margin-bottom:20px;
}

textarea{

    width:100%;

    min-height:180px;

    border:none;

    border-radius:20px;

    background:#11151c;

    color:white;

    padding:18px;

    font-size:16px;

    line-height:1.7;
}

.btn{
    width:100%;
    margin-top:15px;
    padding:18px;
    border:none;
    border-radius:20px;

    background:linear-gradient(
        135deg,
        #00c853,
        #0091ea
    );

    color:white;
    font-size:20px;
    font-weight:900;
}

.btn.red{
    background:linear-gradient(
        135deg,
        #ff5252,
        #ff1744
    );
}

.month-title{
    margin-top:25px;
    margin-bottom:12px;
    font-size:28px;
    font-weight:900;
}

.event-card{

    background:#1e2633;

    padding:18px;

    border-radius:20px;

    margin-top:14px;
}

.event-date{
    font-size:24px;
    font-weight:900;
}

.event-time{
    margin-top:8px;
    font-size:18px;
}

.event-type{
    margin-top:10px;
    font-size:18px;
    font-weight:800;
}

.event-note{
    margin-top:10px;
    opacity:.85;
    line-height:1.7;
}

.search{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:#11151c;
    color:white;
    margin-top:10px;
    font-size:16px;
}

.footer{
    text-align:center;
    opacity:.45;
    margin-top:30px;
    font-size:13px;
}

.example{

    background:#11151c;

    padding:15px;

    border-radius:16px;

    margin-top:15px;

    line-height:1.8;

    opacity:.85;
}

</style>

</head>

<body>

<div class="title">
🌿 LINE AI 排程板
</div>

<div class="sub">
LINE訊息 → AI分析 → 半年事件時間軸
</div>

<div class="card">

<h2>
📝 貼上 LINE 訊息
</h2>

<div class="example">

日期：6/26  
時間：13:30  
事件：開幕記者會  
備註：市長出席

</div>

<textarea
id="inputText"
placeholder="請貼上 LINE 訊息">

</textarea>

<button
class="btn"
onclick="analyzeText()">

🤖 AI 分析加入

</button>

<button
class="btn red"
onclick="clearAll()">

🗑️ 清除全部資料

</button>

</div>

<div class="card">

<input
type="text"
id="searchInput"
class="search"
placeholder="🔍 搜尋日期 / VIP / 市長 / 記者會..."

onkeyup="renderEvents()">

</div>

<div class="card">

<h2>
📅 半年事件時間軸
</h2>

<div id="timeline"></div>

</div>

<div class="footer">
LINE AI Timeline Dashboard
</div>

<script>

// 🌿 AI分類

const smartTypes = [

{
    keyword:"市長",
    type:"🔴 市長/VIP",
    color:"#ff5252"
},

{
    keyword:"VIP",
    type:"🟣 VIP",
    color:"#9c27b0"
},

{
    keyword:"貴賓",
    type:"🟣 VIP",
    color:"#9c27b0"
},

{
    keyword:"攝影",
    type:"🔵 攝影活動",
    color:"#2979ff"
},

{
    keyword:"拍攝",
    type:"🔵 拍攝活動",
    color:"#2979ff"
},

{
    keyword:"記者會",
    type:"🟠 記者會",
    color:"#ff9800"
},

{
    keyword:"導覽",
    type:"🟢 導覽需求",
    color:"#00c853"
},

{
    keyword:"KOL",
    type:"🟡 KOL活動",
    color:"#ffd600"
},

{
    keyword:"KOC",
    type:"🟡 KOC活動",
    color:"#ffd600"
},

{
    keyword:"警局",
    type:"🚓 警局相關",
    color:"#ff1744"
},

{
    keyword:"分局長",
    type:"🚨 長官層級",
    color:"#ff1744"
},

{
    keyword:"服務處",
    type:"🏛️ 服務處",
    color:"#26c6da"
},

{
    keyword:"議員",
    type:"🏛️ 議員相關",
    color:"#ff6d00"
},

{
    keyword:"立委",
    type:"🏛️ 立委相關",
    color:"#ff6d00"
}

];

// 🌿 資料庫

let events = JSON.parse(
    localStorage.getItem("lineEvents")
) || [];

const timeline =
document.getElementById("timeline");

// 🌿 AI分析

function analyzeText(){

    const text =
    document.getElementById("inputText")
    .value;

    if(!text){

        alert("請貼上LINE訊息");

        return;
    }

    // 日期

    const dateMatch =
    text.match(
        /\d{1,2}\/\d{1,2}|\d{1,2}月\d{1,2}日/g
    );

    // 時間

    const timeMatch =
    text.match(/\d{1,2}[:：]\d{2}/g);

    let date =
    dateMatch
    ?
    dateMatch[0]
    :
    "未指定日期";

    let time =
    timeMatch
    ?
    timeMatch[0]
    :
    "未指定時間";

    let month =
    parseInt(
        date.split(/[\/月]/)[0]
    );

    let day =
    parseInt(
        date.match(/\d{1,2}(?=日|$)/)
    );

    // AI分類

    let foundType = "📌 一般事件";

    let foundColor = "#00c853";

    smartTypes.forEach(t=>{

        if(text.includes(t.keyword)){

            foundType = t.type;

            foundColor = t.color;
        }
    });

    // 加入資料庫

    events.unshift({

        date,
        time,
        month,
        day,
        type:foundType,
        color:foundColor,
        note:text
    });

    // 去重複

    events = events.filter(
        (v,i,a)=>

        i===a.findIndex(t=>

            t.date===v.date &&
            t.time===v.time &&
            t.note===v.note
        )
    );

    // 儲存

    localStorage.setItem(
        "lineEvents",
        JSON.stringify(events)
    );

    document.getElementById("inputText")
    .value = "";

    renderEvents();
}

// 🌿 顯示事件

function renderEvents(){

    const keyword =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

    timeline.innerHTML = "";

    let filtered =
    events.filter(e=>

        e.date.toLowerCase().includes(keyword)
        ||

        e.type.toLowerCase().includes(keyword)
        ||

        e.note.toLowerCase().includes(keyword)
    );

    // 排序

    filtered.sort((a,b)=>{

        if(a.month!==b.month){

            return a.month-b.month;
        }

        return a.day-b.day;
    });

    // 月份群組

    let grouped = {};

    filtered.forEach(e=>{

        if(!grouped[e.month]){

            grouped[e.month] = [];
        }

        grouped[e.month].push(e);
    });

    // UI

    for(let month in grouped){

        timeline.innerHTML += `

        <div class="month-title">
            📅 ${month} 月
        </div>
        `;

        grouped[month].forEach(e=>{

            timeline.innerHTML += `

            <div
            class="event-card"

            style="
            border-left:
            8px solid ${e.color};
            ">

                <div class="event-date">
                    ${e.date}
                </div>

                <div class="event-time">
                    🕒 ${e.time}
                </div>

                <div class="event-type">
                    ${e.type}
                </div>

                <div class="event-note">
                    ${e.note}
                </div>

            </div>
            `;
        });
    }
}

// 🌿 清除全部

function clearAll(){

    if(confirm("確定清除全部資料？")){

        localStorage.removeItem(
            "lineEvents"
        );

        events = [];

        renderEvents();
    }
}

// 🌿 啟動

renderEvents();

</script>

</body>
</html>
