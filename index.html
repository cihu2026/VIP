-size:10px;color:rgba(255,255,255,.45)}.day.tuesday-special{background:rgba(52,211,153,.12);color:#d1fae5;border-color:rgba(52,211,153,.35)}.day.tuesday-special:after{content:"特開";position:absolute;top:4px;right:5px;font-size:10px;color:#86efac}.dot{width:6px;height:6px;background:#fff;margin-top:4px}.list-title{margin:18px 0 14px;font-size:28px;font-weight:900;display:flex;align-items:center;gap:12px}.list-title:before{content:"";width:8px;height:32px;background:linear-gradient(180deg,var(--accent),#3b82f6);border-radius:999px}.special-note{margin:-4px 0 14px;padding:12px 14px;border-radius:18px;border:1px solid rgba(52,211,153,.35);background:rgba(6,78,59,.32);color:#d1fae5;font-weight:900}.card{position:relative;overflow:hidden;border-radius:24px;padding:20px;margin-bottom:16px}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:7px;background:var(--normal)}.card.mayor:before{background:var(--mayor)}.card.director:before{background:var(--director)}.card.chief:before{background:var(--chief)}.card.councilor:before{background:var(--councilor)}.card.secretary:before{background:var(--secretary)}.card.section:before{background:var(--section)}.card.vip:before{background:var(--vip)}.time-tag{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--accent);font-weight:900;font-size:18px;margin-bottom:12px}.level-label{color:#06111f;font-size:12px;padding:5px 10px;border-radius:999px;white-space:nowrap;font-weight:900;background:var(--normal)}.level-label.director,.level-label.chief,.level-label.councilor,.level-label.vip{color:#fff}.level-label.mayor{background:var(--mayor)}.level-label.director{background:var(--director)}.level-label.chief{background:var(--chief)}.level-label.councilor{background:var(--councilor)}.level-label.secretary{background:var(--secretary)}.level-label.section{background:var(--section)}.level-label.vip{background:var(--vip)}.level-label.normal{background:rgba(203,213,225,.88);color:#0f172a}.group-name{font-size:23px;font-weight:900;margin-bottom:14px;line-height:1.35;word-break:break-word;white-space:pre-wrap}.group-name span{display:inline-block;font-size:15px;color:var(--mayor);font-weight:900;margin-left:8px}.meta-item{color:var(--muted);border-top:1px solid rgba(255,255,255,.08);padding-top:10px;font-size:16px;line-height:1.55;white-space:pre-wrap}.meta-item b{color:#fff;margin-left:5px}.note{margin-top:15px;padding:14px 15px;background:rgba(8,17,31,.42);border-radius:16px;font-size:15px;color:#d6deea;line-height:1.7;border:1px dashed rgba(255,255,255,.18);white-space:pre-wrap}#empty-hint{text-align:center;padding:42px;color:#8ca0b8;font-size:17px;font-weight:900;border-radius:22px}@media(max-width:760px){body{padding:13px}.header-bar{grid-template-columns:1fr;border-radius:24px;padding:18px}.header-actions{align-items:flex-start}.main-title h1{font-size:24px}#clock{font-size:17px}#lastUpdate{text-align:left}.summary-row{grid-template-columns:1fr;gap:9px}.calendars-container{grid-template-columns:1fr}.day{border-radius:14px;font-size:15px}.list-title{font-size:25px}.card{border-radius:22px;padding:18px}.group-name{font-size:21px}.time-tag{align-items:flex-start;flex-direction:column}}

<body>
<div class="app">
  <div class="header-bar"><div class="main-title"><div class="badge">👥 OFFICIAL GROUP</div><h1>慈湖公務團行政看板</h1><p>CIHU OFFICIAL TOUR SCHEDULE</p></div><div class="header-actions"><div id="clock">00:00:00</div><div id="lastUpdate">程式啟動中...</div></div></div>
  <div class="toolbar"><button class="btn" onclick="jumpToday()">今天</button><button class="btn" onclick="jumpTomorrow()">明天</button><button class="btn" onclick="manualReload()">重新整理</button></div>
  <div class="legend"><span class="pill mayor"><i></i>市長</span><span class="pill director"><i></i>局長</span><span class="pill chief"><i></i>處長</span><span class="pill councilor"><i></i>民代</span><span class="pill secretary"><i></i>秘書</span><span class="pill section"><i></i>課長</span><span class="pill vip"><i></i>貴賓/特殊</span><span class="pill special"><i></i>週二特開</span><span class="pill"><i></i>其他公務/外加</span></div>
  <div class="summary-row"><div class="summary-card"><div class="label">今日團數</div><div class="value" id="todayCount">0</div></div><div class="summary-card"><div class="label">今日人數</div><div class="value" id="todayPeople">0</div></div><div class="summary-card"><div class="label">未來行程</div><div class="value" id="futureCount">0</div></div></div>
  <div id="notice"></div>
  <div class="calendars-container"><div class="calendar-box"><div id="monthLabel-0" class="month-name">載入中...</div><div class="grid" id="calendar-0"><div class="week-h">日</div><div class="week-h">一</div><div class="week-h">二</div><div class="week-h">三</div><div class="week-h">四</div><div class="week-h">五</div><div class="week-h">六</div></div></div><div class="calendar-box"><div id="monthLabel-1" class="month-name">載入中...</div><div class="grid" id="calendar-1"><div class="week-h">日</div><div class="week-h">一</div><div class="week-h">二</div><div class="week-h">三</div><div class="week-h">四</div><div class="week-h">五</div><div class="week-h">六</div></div></div></div>
  <div class="list-title" id="listDateLabel">選擇日期查看行程</div><div id="eventList"></div>
</div>
<script>
(function(){
'use strict';
var APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxJJIiY-MSbsiU_AkKLhaI72-aiqVFNyTltmXYXn5lEzw3l0biRAAxU550ffCXSLmr9/exec';
var SYNC_INTERVAL = 15000;
var LOAD_TIMEOUT = 12000;
var allData = [];
var selectedDate = new Date();
var today = new Date();
var loadingScript = null;
var loadTimer = null;
var loadSeq = 0;
var skippedRowsCount = 0;
function byId(id){ return document.getElementById(id); }
function setText(id,text){ var el = byId(id); if(el){ el.innerText = text; } }
function pad(n){ n = Number(n); return n < 10 ? '0' + n : '' + n; }
function clockText(){ var d = new Date(); return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()); }
function updateTime(){ setText('clock', clockText()); }
function esc(t){ return String(t || '').replace(/[&<>']/g,function(s){ return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;'}[s]; }); }
function cleanText(t){ return String(t || '').replace(/\u3000/g,' ').replace(/\s+/g,' ').trim(); }
function valueOfCell(c){ if(c === null || c === undefined){ return ''; } if(typeof c === 'object' && c.f !== undefined && c.f !== null){ return String(c.f); } if(typeof c === 'object' && c.v !== undefined && c.v !== null){ return String(c.v); } return String(c); }
function cell(row,idx){ return valueOfCell(row && row[idx]); }
function validDate(y,m,d){ y = Number(y); m = Number(m); d = Number(d); if(!y || m < 1 || m > 12 || d < 1 || d > 31){ return null; } var dt = new Date(y,m-1,d); if(dt.getFullYear() !== y || dt.getMonth() !== m-1 || dt.getDate() !== d){ return null; } return {y:y,m:m,d:d}; }
function parseDate(v){ var s = cleanText(v); var m; var dt; if(!s){ return null; } if(s.indexOf('Date(') === 0){ m = s.match(/Date\((\d+),(\d+),(\d+)/); if(m){ return validDate(m[1], Number(m[2]) + 1, m[3]); } } m = s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/); if(m){ return validDate(m[1],m[2],m[3]); } m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})$/); if(m){ return validDate(today.getFullYear(),m[1],m[2]); } m = s.match(/^(\d{1,2})[:：](\d{1,2})([:：]\d{1,2})?$/); if(m){ return validDate(today.getFullYear(),m[1],m[2]); } dt = new Date(s); if(!isNaN(dt.getTime())){ return validDate(dt.getFullYear(),dt.getMonth()+1,dt.getDate()); } return null; }
function normTime(v){ var s = cleanText(v).replace(/：/g,':'); var m; if(!s){ return ''; } m = s.match(/(\d{1,2}):(\d{2})(?::\d{2})?/); if(m){ return (/改/.test(s) ? '改' : '') + pad(m[1]) + ':' + m[2]; } return s; }
function mins(v){ var m = String(v || '').replace(/：/g,':').match(/(\d{1,2}):(\d{2})/); return m ? Number(m[1]) * 60 + Number(m[2]) : 99999; }
function formatPeople(v){ var s = cleanText(v); if(!s){ return '未知'; } if(/未知|待確認|不明|未定/.test(s)){ return s; } if(/[人位名]/.test(s)){ return s; } if(/^\d+$/.test(s)){ return s + '人'; } return s; }
function normalizeRows(resp){ if(resp && Array.isArray(resp.values)){ return resp.values; } if(resp && resp.table && Array.isArray(resp.table.rows)){ return resp.table.rows.map(function(r){ return (r.c || []).map(valueOfCell); }); } if(Array.isArray(resp)){ return resp; } return []; }
function detectDateCol(rows){ var best = 0; var bestScore = 0; for(var c=0;c<6;c++){ var score = 0; for(var r=0;r<rows.length && r<30;r++){ if(parseDate(cell(rows[r],c))){ score++; } } if(score > bestScore){ bestScore = score; best = c; } } return bestScore ? best : 0; }
function extractPhone(name){ var m = String(name || '').match(/09[\d\s\-]{7,}/g); return m && m.length ? m[0].replace(/\D/g,'').slice(0,10) : ''; }
function isMoveToAnotherDate(raw,x){ var m = raw.match(/改(?:至|到)?\s*(\d{1,2})[\/\-.](\d{1,2})/); return m ? (Number(m[1]) !== x.m || Number(m[2]) !== x.d) : false; }
function shouldSkipRow(x){ var raw = cleanText([x.dateRaw,x.timeRaw,x.name,x.p,x.teacher,x.note].join(' ')); if(/取消|作廢|刪除|刪掉|撤銷|停辦|不用|不需要/.test(raw)){ return true; } if(/重複|與.*重複|留\s*\d+\s*號|留.*號/.test(raw)){ return true; } return isMoveToAnotherDate(raw,x); }
function isChangeRow(x){ return /改/.test(String(x.timeRaw || '') + String(x.name || '') + String(x.note || '')); }
function dedupeChangedRows(rows){ var out = []; for(var i=0;i<rows.length;i++){ var x = rows[i]; var phone = extractPhone(x.name); if(phone && isChangeRow(x)){ for(var j=out.length-1;j>=0;j--){ var old = out[j]; if(old.y === x.y && old.m === x.m && old.d === x.d && extractPhone(old.name) === phone){ out.splice(j,1); skippedRowsCount++; } } } else if(phone){ var skip = false; for(var k=0;k<out.length;k++){ var old2 = out[k]; if(old2.y === x.y && old2.m === x.m && old2.d === x.d && extractPhone(old2.name) === phone && isChangeRow(old2)){ skip = true; skippedRowsCount++; break; } } if(skip){ continue; } } out.push(x); } return out; }
function parseData(resp){ var rows = normalizeRows(resp); var di = detectDateCol(rows); var ti = di + 1; var ni = di + 2; var pi = di + 3; var ri = di + 4; var oi = di + 5; var out = []; skippedRowsCount = 0; for(var i=0;i<rows.length;i++){ var r = rows[i] || []; var d = parseDate(cell(r,di)); if(!d){ continue; } var x = {row:i+1,y:d.y,m:d.m,d:d.d,dateRaw:cell(r,di),timeRaw:cell(r,ti),time:normTime(cell(r,ti)),name:cell(r,ni),p:cell(r,pi),teacher:cell(r,ri),note:cell(r,oi)}; if(!(x.name || x.time || x.teacher)){ continue; } if(shouldSkipRow(x)){ skippedRowsCount++; continue; } out.push(x); } return dedupeChangedRows(out); }
function level(x){ var t = '' + x.name + x.note + x.teacher; if(/市長/.test(t)){ return {key:'mayor',label:'市長'}; } if(/局長|署長|副局長/.test(t)){ return {key:'director',label:'局長'}; } if(/處長|副處長/.test(t)){ return {key:'chief',label:'處長'}; } if(/議員|議長|副議長|立委/.test(t)){ return {key:'councilor',label:'民代'}; } if(/秘書|秘書長/.test(t)){ return {key:'secretary',label:'秘書'}; } if(/課長|股長|副座|副處/.test(t)){ return {key:'section',label:'課股長'}; } if(/貴賓|VIP|重要|長官|會長|外賓|KOL|媒體|拍攝|記者會|現勘/.test(t)){ return {key:'vip',label:'特殊'}; } return {key:'normal',label:'公務/外加'}; }
function top(events){ var rank = {mayor:8,director:7,chief:6,councilor:5,secretary:4,section:3,vip:2,normal:1}; var arr = []; for(var i=0;i<events.length;i++){ arr.push(level(events[i])); } arr.sort(function(a,b){ return rank[b.key] - rank[a.key]; }); return arr[0] || {key:'normal'}; }
function closed(y,m,d){ return new Date(y,m-1,d).getDay() === 2; }
function dayEvents(y,m,d){ var a = []; for(var i=0;i<allData.length;i++){ var x = allData[i]; if(x.y === y && x.m === m && x.d === d){ a.push(x); } } return a; }
function renderCal(monthIndex,year,idx){ var box = byId('calendar-' + idx); var lab = byId('monthLabel-' + idx); var ml = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月']; if(!box || !lab){ return; } lab.innerText = year + '年 ' + ml[monthIndex]; while(box.children.length > 7){ box.removeChild(box.lastChild); } var start = new Date(year,monthIndex,1).getDay(); var days = new Date(year,monthIndex+1,0).getDate(); for(var k=0;k<start;k++){ var blank = document.createElement('div'); blank.className = 'day'; box.appendChild(blank); } for(var d=1;d<=days;d++){ var e = document.createElement('div'); var ev = dayEvents(year,monthIndex+1,d); var isTue = closed(year,monthIndex+1,d); e.className = 'day'; if(d === today.getDate() && monthIndex === today.getMonth() && year === today.getFullYear()){ e.className += ' today'; } if(d === selectedDate.getDate() && monthIndex === selectedDate.getMonth() && year === selectedDate.getFullYear()){ e.className += ' selected'; } if(isTue && ev.length){ e.className += ' tuesday-special'; } else if(isTue){ e.className += ' closed'; } e.innerHTML = '<span>' + d + '</span>'; if(ev.length){ var dot = document.createElement('div'); dot.className = 'dot ' + top(ev).key; e.appendChild(dot); } e.setAttribute('data-y',year); e.setAttribute('data-m',monthIndex+1); e.setAttribute('data-d',d); e.onclick = function(){ selectedDate = new Date(Number(this.getAttribute('data-y')),Number(this.getAttribute('data-m'))-1,Number(this.getAttribute('data-d'))); renderBoth(); selectDate(selectedDate.getFullYear(),selectedDate.getMonth()+1,selectedDate.getDate()); }; box.appendChild(e); } }
function renderBoth(){ var a = new Date(today.getFullYear(),today.getMonth(),1); var b = new Date(today.getFullYear(),today.getMonth()+1,1); renderCal(a.getMonth(),a.getFullYear(),0); renderCal(b.getMonth(),b.getFullYear(),1); }
function selectDate(y,m,d){ var list = byId('eventList'); var week = ['週日','週一','週二','週三','週四','週五','週六']; var isTue = closed(y,m,d); var data = dayEvents(y,m,d); var html = ''; setText('listDateLabel', m + '月' + d + '日 (' + week[new Date(y,m-1,d).getDay()] + ')'); data.sort(function(a,b){ return mins(a.time) - mins(b.time); }); if(!data.length){ list.innerHTML = '<div id="empty-hint">' + (isTue ? '本日為週二休園；目前無公務團行程' : '本日尚無行程安排') + '</div>'; return; } if(isTue){ html += '<div class="special-note">本日為週二休園日，但試算表已有行程資料，系統已標示為「週二特開」，仍照常顯示。</div>'; } for(var i=0;i<data.length;i++){ var x = data[i]; var lv = level(x); var tag = '<span class="level-label ' + lv.key + '">' + esc(lv.label) + '</span>'; html += '<div class="card ' + lv.key + '"><span class="time-tag">預約時間：' + esc(x.time || '未填') + ' ' + tag + '</span><div class="group-name">' + esc(x.name || '未填團名') + '<span>(' + esc(formatPeople(x.p)) + ')</span></div><div class="meta-item">導覽老師：<b>' + esc(x.teacher || '未填') + '</b></div>' + (x.note ? '<div class="note"><b>備註：</b><br>' + esc(x.note) + '</div>' : '') + '</div>'; } list.innerHTML = html; }
function numPeople(v){ var m = String(v || '').match(/\d+/); return m ? Number(m[0]) : 0; }
function summary(){ var y = today.getFullYear(); var m = today.getMonth()+1; var d = today.getDate(); var td = new Date(y,m-1,d).getTime(); var ev = dayEvents(y,m,d); var future = 0; var sum = 0; for(var i=0;i<ev.length;i++){ sum += numPeople(ev[i].p); } for(var j=0;j<allData.length;j++){ var x = allData[j]; if(new Date(x.y,x.m-1,x.d).getTime() >= td){ future++; } } setText('todayCount', ev.length); setText('todayPeople', sum || '未定'); setText('futureCount', future); }
function showNotice(msg){ var n = byId('notice'); if(n){ n.style.display = 'block'; n.innerText = msg; } }
function hideNotice(){ var n = byId('notice'); if(n){ n.style.display = 'none'; } }
function afterLoadOk(){ if(loadTimer){ clearTimeout(loadTimer); loadTimer = null; } renderBoth(); summary(); selectDate(selectedDate.getFullYear(),selectedDate.getMonth()+1,selectedDate.getDate()); setText('lastUpdate','最後同步：' + clockText() + '｜每15秒更新\n有效 ' + allData.length + ' 筆，已略過 ' + skippedRowsCount + ' 筆取消/重複/改期資料'); }
window.sheetLoaded = function(resp){ if(!resp || resp.status === 'error'){ showNotice('Apps Script 有回應，但回傳錯誤。請檢查 Apps Script 是否可讀取試算表。'); allData = []; afterLoadOk(); return; } allData = parseData(resp); if(!allData.length){ showNotice('Apps Script 已回傳資料，但沒有抓到有效行程。\n請確認回傳格式是否為 {status:"ok", values:[[...]]}，且 A欄日期、B欄時間、C欄團名仍在原位置。'); } else { hideNotice(); } afterLoadOk(); };
function failLoad(reason){ allData = []; renderBoth(); summary(); selectDate(selectedDate.getFullYear(),selectedDate.getMonth()+1,selectedDate.getDate()); setText('lastUpdate','同步失敗：' + clockText()); showNotice(reason + '\n\n請確認 Apps Script 部署設定：\n執行身分：我\n誰可以存取：任何人\n並確認 doGet 會輸出 callback + "(" + JSON.stringify(result) + ")"'); }
function load(){ var seq = ++loadSeq; setText('lastUpdate','同步中...'); if(loadTimer){ clearTimeout(loadTimer); } if(loadingScript && loadingScript.parentNode){ loadingScript.parentNode.removeChild(loadingScript); } loadingScript = document.createElement('script'); loadingScript.src = APP_SCRIPT_URL + (APP_SCRIPT_URL.indexOf('?') > -1 ? '&' : '?') + 'callback=sheetLoaded&cache=' + (new Date().getTime()); loadingScript.async = true; loadingScript.onerror = function(){ if(seq === loadSeq){ failLoad('資料讀取失敗：無法連線到 Apps Script。'); } }; loadTimer = setTimeout(function(){ if(seq === loadSeq){ failLoad('資料讀取逾時：Apps Script 沒有回應。瀏覽器不會再卡在「載入中」。'); } }, LOAD_TIMEOUT); document.body.appendChild(loadingScript); }
window.jumpToday = function(){ selectedDate = new Date(); renderBoth(); selectDate(selectedDate.getFullYear(),selectedDate.getMonth()+1,selectedDate.getDate()); };
window.jumpTomorrow = function(){ var t = new Date(); t.setDate(t.getDate()+1); selectedDate = t; renderBoth(); selectDate(t.getFullYear(),t.getMonth()+1,t.getDate()); };
window.manualReload = function(){ load(); };
function start(){ updateTime(); setInterval(updateTime,1000); renderBoth(); selectDate(selectedDate.getFullYear(),selectedDate.getMonth()+1,selectedDate.getDate()); load(); setInterval(load,SYNC_INTERVAL); }
try{ start(); } catch(e){ setText('lastUpdate','程式錯誤'); showNotice('程式啟動失敗：' + e.message); }
})();
</script>
