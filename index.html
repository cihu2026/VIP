<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌿 日曆型 AI 排程板</title>
    <style>
        :root {
            --bg-color: #121418;
            --card-bg: #1e222a;
            --cal-bg: #2d3440;
            --accent: #00e676;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background: var(--bg-color); color: #fff; padding: 15px; padding-bottom: 50px; }

        /* 標題與輸入區 */
        .top-info { text-align: center; margin-bottom: 20px; }
        .input-card { background: var(--card-bg); border-radius: 20px; padding: 15px; margin-bottom: 25px; border: 1px solid #333; }
        textarea { 
            width: 100%; min-height: 100px; background: #111; border: 1px solid #444; 
            color: #fff; padding: 12px; border-radius: 12px; font-size: 16px; margin-bottom: 10px;
        }
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--accent); color: #000; }
        .btn-clear { background: #333; color: #ff5252; }

        /* 搜尋框 */
        .search-box {
            width: 100%; padding: 12px; background: #2d3440; border: none; 
            border-radius: 10px; color: #fff; margin-bottom: 20px;
        }

        /* 日曆區段 */
        .month-header { 
            font-size: 24px; font-weight: 800; color: var(--accent);
            margin: 30px 0 15px 5px; display: flex; align-items: center;
        }
        .month-header::after { content: ''; flex: 1; height: 1px; background: #333; margin-left: 15px; }

        /* 單個事件段落 */
        .event-block {
            display: flex; gap: 15px; background: var(--card-bg);
            margin-bottom: 15px; border-radius: 16px; overflow: hidden;
            border: 1px solid #333; position: relative;
        }

        /* 左側日曆格 */
        .cal-box {
            width: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--cal-bg); border-right: 1px solid #333;
        }
        .cal-month { font-size: 12px; opacity: 0.7; margin-bottom: 2px; }
        .cal-date { font-size: 26px; font-weight: 900; line-height: 1; }
        .cal-day { font-size: 12px; margin-top: 5px; padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.3); }

        /* 右側詳細內容 */
        .info-box { flex: 1; padding: 12px; }
        .info-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .info-time { color: var(--accent); font-weight: bold; font-size: 15px; }
        .info-tag { font-size: 11px; background: #444; padding: 2px 8px; border-radius: 20px; color: #ccc; }
        .info-text { 
            font-size: 15px; color: #e2e8f0; line-height: 1.6; 
            white-space: pre-wrap; word-break: break-all;
        }

        /* 側邊顏色條 */
        .color-bar { width: 6px; height: 100%; position: absolute; left: 0; top: 0; }
    </style>
</head>
<body>

<div class="top-info">
    <h2>📅 LINE AI 日曆排程</h2>
</div>

<div class="input-card">
    <textarea id="inputText" placeholder="直接貼上 LINE 訊息...&#10;範例：7/15 14:00 專案會議 (地點：3樓)"></textarea>
    <div class="btn-row">
        <button class="btn btn-add" onclick="analyze()">⚡ 快速加入</button>
        <button class="btn btn-clear" onclick="clearData()">清空</button>
    </div>
</div>

<input type="text" id="search" class="search-box" placeholder="🔍 搜尋事件內容..." onkeyup="render()">

<div id="timeline"></div>

<script>
    let db = JSON.parse(localStorage.getItem("calendarEvents")) || [];

    const types = [
        { key: "市長", tag: "🔴 重要行程", color: "#ff5252" },
        { key: "記者會", tag: "🟠 媒體活動", color: "#fb8c00" },
        { key: "會議", tag: "🔵 內部會議", color: "#2196f3" },
        { key: "拍攝", tag: "🎥 影像攝影", color: "#e91e63" },
        { key: "現勘", tag: "🚧 現場勘查", color: "#00bcd4" }
    ];

    function analyze() {
        const raw = document.getElementById("inputText").value.trim();
        if(!raw) return;

        const dateMatch = raw.match(/(\d{1,2})[\/\.月](\d{1,2})/);
        const timeMatch = raw.match(/(\d{1,2})[:：](\d{2})/);

        const m = dateMatch ? parseInt(dateMatch[1]) : (new Date().getMonth() + 1);
        const d = dateMatch ? parseInt(dateMatch[2]) : new Date().getDate();
        const t = timeMatch ? timeMatch[0] : "全天";

        const year = new Date().getFullYear();
        const weekDay = ["週日","週一","週二","週三","週四","週五","週六"][new Date(year, m-1, d).getDay()];

        let category = "📌 一般事項";
        let color = "#00e676";
        types.forEach(item => {
            if(raw.includes(item.key)) { category = item.tag; color = item.color; }
        });

        db.push({ m, d, weekDay, t, category, color, note: raw, id: Date.now() });
        db.sort((a,b) => a.m !== b.m ? a.m - b.m : a.day - b.day);
        
        localStorage.setItem("calendarEvents", JSON.stringify(db));
        document.getElementById("inputText").value = "";
        render();
    }

    function render() {
        const query = document.getElementById("search").value.toLowerCase();
        const container = document.getElementById("timeline");
        container.innerHTML = "";

        let currentM = -1;
        db.filter(ev => ev.note.toLowerCase().includes(query)).forEach(ev => {
            if(ev.m !== currentM) {
                currentM = ev.m;
                container.innerHTML += `<div class="month-header">${currentM} 月份</div>`;
            }

            container.innerHTML += `
                <div class="event-block">
                    <div class="color-bar" style="background:${ev.color}"></div>
                    <div class="cal-box">
                        <div class="cal-month">${ev.m}月</div>
                        <div class="cal-date">${ev.d}</div>
                        <div class="cal-day">${ev.weekDay}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-top">
                            <div class="info-time">🕒 ${ev.t}</div>
                            <div class="info-tag">${ev.category}</div>
                        </div>
                        <div class="info-text">${ev.note}</div>
                    </div>
                </div>
            `;
        });
    }

    function clearData() { if(confirm("確定刪除所有日曆資料？")) { db = []; localStorage.clear(); render(); } }

    render();
</script>

</body>
</html>
