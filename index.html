<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>🌿 AI 特殊事件看板 PRO</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    font-family:"Noto Sans TC",sans-serif;
}

body{
    background:#0f1115;
    color:white;
    min-height:100vh;
    padding:20px;
}

.title{
    text-align:center;
    font-size:34px;
    font-weight:900;
    margin-top:10px;
}

.sub{
    text-align:center;
    opacity:.7;
    margin-top:8px;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#1b1f27;
    border-radius:24px;
    padding:20px;
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.upload{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#2b3240;
    color:white;
    font-size:17px;
}

.preview{
    width:100%;
    border-radius:20px;
    margin-top:15px;
    display:none;
}

.btn{
    width:100%;
    margin-top:15px;
    padding:18px;
    border:none;
    border-radius:20px;

    background:linear-gradient(
        135deg,
        #00c853,
        #0091ea
    );

    color:white;

    font-size:20px;
    font-weight:800;
}

.btn.red{
    background:linear-gradient(
        135deg,
        #ff5252,
        #ff1744
    );
}

.loading{
    text-align:center;
    margin-top:20px;
    display:none;
}

.result{
    margin-top:15px;
}

.event-card{

    background:#1e2633;

    padding:18px;

    border-radius:20px;

    margin-top:15px;
}

.event-date{
    font-size:26px;
    font-weight:900;
}

.event-time{
    margin-top:8px;
    font-size:20px;
    font-weight:700;
}

.event-type{
    margin-top:10px;
    font-size:18px;
    font-weight:800;
}

.event-detail{
    margin-top:10px;
    opacity:.85;
    line-height:1.7;
}

textarea{
    width:100%;
    margin-top:20px;
    background:#11151c;
    color:white;
    border:none;
    border-radius:16px;
    padding:15px;
    min-height:220px;
    font-size:14px;
}

.footer{
    text-align:center;
    opacity:.45;
    margin-top:30px;
    font-size:13px;
}

</style>

</head>

<body>

<div class="title">
🌿 AI 特殊事件看板
</div>

<div class="sub">
手機截圖 → OCR辨識 → AI分析特殊安排
</div>

<div class="card">

<input
type="file"
id="imageInput"
accept="image/*"
class="upload">

<img
id="preview"
class="preview">

<button
class="btn"
onclick="scanImage()">

🔍 AI 開始分析

</button>

<button
class="btn red"
onclick="clearHistory()">

🗑️ 清除全部紀錄

</button>

<div
class="loading"
id="loading">

⏳ AI OCR 分析中...

</div>

</div>

<div class="card">

<div
id="result"
class="result">

</div>

<textarea
id="fullText"
placeholder="OCR辨識文字">

</textarea>

</div>

<div class="footer">
AI Special Event Dashboard PRO
</div>

<script>

// 🌿 AI智慧關鍵字

const smartKeywords = [

    {
        word:"警局",
        type:"🚓 警局相關",
        color:"#ff5252"
    },

    {
        word:"分局長",
        type:"🚨 長官層級",
        color:"#ff1744"
    },

    {
        word:"服務處",
        type:"🏛️ 服務處",
        color:"#ff9800"
    },

    {
        word:"立委",
        type:"🏛️ 立委相關",
        color:"#ff6d00"
    },

    {
        word:"議員",
        type:"🏛️ 議員相關",
        color:"#ff6d00"
    },

    {
        word:"長官",
        type:"👔 長官安排",
        color:"#2979ff"
    },

    {
        word:"外加",
        type:"➕ 額外名額",
        color:"#00c853"
    },

    {
        word:"獨立帶",
        type:"⭐ 特殊帶隊",
        color:"#00b0ff"
    },

    {
        word:"貴賓",
        type:"🌟 VIP",
        color:"#9c27b0"
    },

    {
        word:"VIP",
        type:"🌟 VIP",
        color:"#9c27b0"
    },

    {
        word:"加梯",
        type:"📈 加梯",
        color:"#26c6da"
    },

    {
        word:"保留",
        type:"📌 保留名額",
        color:"#ffc107"
    }
];

const imageInput =
document.getElementById("imageInput");

const preview =
document.getElementById("preview");

const result =
document.getElementById("result");

const loading =
document.getElementById("loading");

const fullText =
document.getElementById("fullText");

// 🌿 自動恢復紀錄

window.onload = ()=>{

    let saved = JSON.parse(
        localStorage.getItem("aiEvents")
    ) || [];

    if(saved.length > 0){

        result.innerHTML = saved.join("");
    }
};

// 🌿 預覽圖片

imageInput.addEventListener("change",e=>{

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = ev => {

            preview.src = ev.target.result;

            preview.style.display = "block";
        };

        reader.readAsDataURL(file);
    }
});

// 🌿 OCR分析

async function scanImage(){

    const file =
    imageInput.files[0];

    if(!file){

        alert("請先上傳截圖");

        return;
    }

    loading.style.display = "block";

    try{

        const {
            data:{ text }
        } = await Tesseract.recognize(

            file,

            'chi_tra+eng',

            {
                logger:m=>console.log(m)
            }
        );

        loading.style.display = "none";

        fullText.value = text;

        analyzeAI(text);

    }catch(err){

        console.error(err);

        loading.style.display = "none";

        alert("OCR辨識失敗");
    }
}

// 🌿 AI分析

function analyzeAI(text){

    let html = "";

    html += `
    <h2>
    ⚠️ AI 偵測到的特殊事件
    </h2>
    `;

    // 🌿 抓時間

    const timeMatch =
    text.match(/\d{1,2}[:：]\d{2}/g);

    // 🌿 抓日期

    const dateMatch =
    text.match(
        /\d{1,3}[\/\-年]\d{1,2}[\/\-月]\d{1,2}日?|\d{1,2}\/\d{1,2}|\d{1,2}月\d{1,2}日/g
    );

    // 🌿 今天 / 明天

    let specialDay = "";

    if(text.includes("今天")){

        specialDay = "📍 今天";
    }

    if(text.includes("明天")){

        specialDay = "📍 明天";
    }

    let foundAny = false;

    smartKeywords.forEach(item=>{

        if(text.includes(item.word)){

            foundAny = true;

            let time =
            timeMatch ?
            timeMatch[0] :
            "未找到時間";

            let date =
            dateMatch ?
            dateMatch[0] :
            "未找到日期";

            html += `

            <div
            class="event-card"

            style="
            border-left:
            8px solid ${item.color};
            ">

                <div class="event-date">
                    ${date}
                </div>

                <div class="event-time">
                    🕒 ${time}
                </div>

                <div class="event-type">
                    ${item.type}
                </div>

                <div class="event-detail">

                    ${specialDay}

                    <br><br>

                    偵測到：
                    ${item.word}

                </div>

            </div>
            `;
        }
    });

    if(!foundAny){

        html += `

        <div class="event-card">

            <div class="event-type">
                ✅ 未發現特殊安排
            </div>

        </div>
        `;
    }

    // 🌿 AI摘要

    html += `

    <div
    class="event-card"

    style="
    border-left:
    8px solid #00c853;
    ">

        <div class="event-type">
            📅 AI 日期分析
        </div>

        <div class="event-detail">

            ${
                dateMatch
                ?
                "偵測日期：" + dateMatch.join("、")
                :
                "未找到日期"
            }

            <br><br>

            ${
                timeMatch
                ?
                "偵測時間：" + timeMatch.join("、")
                :
                "未找到時間"
            }

        </div>

    </div>
    `;

    // 🌿 儲存歷史

    let savedEvents = JSON.parse(
        localStorage.getItem("aiEvents")
    ) || [];

    savedEvents.unshift(html);

    localStorage.setItem(
        "aiEvents",
        JSON.stringify(savedEvents)
    );

    result.innerHTML =
    savedEvents.join("");
}

// 🌿 清除紀錄

function clearHistory(){

    localStorage.removeItem("aiEvents");

    result.innerHTML = "";

    fullText.value = "";

    alert("已清除全部紀錄");
}

</script>

</body>
</html>
