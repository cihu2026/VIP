<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIHU Professional Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Noto+Sans+TC:wght@300;500;700;900&display=swap');
        
        :root {
            --bg: #080a0f;
            --surface: #12151c;
            --accent: #0070f3;
            --vip: #ff0055;
            --pending: #f5a623;
            --text-primary: #ffffff;
            --text-secondary: #8899a6;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Montserrat', "Noto Sans TC", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text-primary); 
            padding: 24px; 
            min-height: 100vh;
        }

        /* 頂部導航列 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .brand-box .title { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        .brand-box .sub { font-size: 11px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; font-weight: 600; }
        .date-info { text-align: right; color: var(--text-secondary); font-size: 13px; font-weight: 500; }

        /* 日曆區域：極度清晰排版 */
        .calendar-wrapper {
            background: var(--surface);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 40px;
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .weekday { 
            text-align: center; font-size: 12px; font-weight: 800; 
            color: #444; padding-bottom: 12px;
        }
        .day { 
            aspect-ratio: 1/1; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.2s;
            border: 1px solid transparent;
        }
        .day:hover { background: rgba(255,255,255,0.03); }
        
        /* 狀態：今日 */
        .day.today { 
            background: var(--accent); 
            color: #fff; font-weight: 800;
            box-shadow: 0 8px 16px rgba(0, 112, 243, 0.3);
        }
        /* 狀態：選中 */
        .day.selected { border-color: #fff; }

        /* 行程提示點 */
        .indicator { display: flex; gap: 3px; margin-top: 4px; height: 4px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: #444; }
        .dot.has-vip { background: var(--vip); box-shadow: 0 0 6px var(--vip); }
        .dot.has-event { background: #fff; }

        /* 行程明細區 */
        .list-header { 
            font-size: 18px; font-weight: 700; margin-bottom: 20px; 
            display: flex; align-items: center; justify-content: space-between;
        }
        .list-header .count-pill { font-size: 12px; background: #222; padding: 4px 12px; border-radius: 20px; color: var(--text-secondary); }

        .event-card { 
            background: var(--surface);
            margin-bottom: 16px;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .event-card:active { transform: scale(0.98); }
        .event-card.vip { border-left: 4px solid var(--vip); }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .time-label { font-size: 15px; font-weight: 800; color: var(--accent); }
        .vip-tag { font-size: 10px; background: var(--vip); padding: 2px 8px; border-radius: 4px; font-weight: 800; }

        .guest-name { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 14px; color: var(--text-secondary); }
        
        .note-box { 
            margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);
            font-size: 14px; color: #aaa; line-height: 1.5;
        }

        #sync-tag { position: fixed; bottom: 20px; width: 100%; text-align: center; font-size: 10px; color: #444; pointer-events: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="brand-box">
        <div class="sub">Administrative</div>
        <div class="title" id="monthDisplay">MAY 2026</div>
    </div>
    <div class="date-info">
        <div id="clock">00:00:00</div>
        <div style="opacity: 0.5">Real-time Sync</div>
    </div>
</div>

<div class="calendar-wrapper">
    <div class="calendar-grid" id="calendar">
        <div class="weekday">S</div><div class="weekday">M</div><div class="weekday">T</div>
        <div class="weekday">W</div><div class="weekday">T</div><div class="weekday">F</div><div class="weekday">S</div>
    </div>
</div>

<div class="list-header">
    <span id="selectedDateTitle">Schedule Detail</span>
    <span class="count-pill" id="eventCount">0 Events</span>
</div>

<div id="eventList"></div>
<div id="sync-tag">DATABASE CONNECTED • AUTO REFRESH ON</div>

<script>
// --- 配置區 ---
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let allEvents = [];
const today = new Date();

// --- 功能邏輯 ---
function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
}
setInterval(updateClock, 1000);

async function fetchData() {
    try {
        const res = await fetch(`${SHEET_URL}&cb=${Date.now()}`);
        const csv = await res.text();
        allEvents = parseCSV(csv);
        renderCalendar(today.getMonth(), today.getFullYear());
        // 初始載入當天
        selectDate(today.getMonth() + 1, today.getDate());
    } catch (e) { console.error("Sync Error"); }
}

function parseCSV(csv) {
    const lines = csv.split(/\r?\n/).slice(1);
    return lines.map(line => {
        const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
        if(!c[1]) return null;
        const p = c[1].split("/");
        return { 
            m: parseInt(p[p.length-2]), d: parseInt(p[p.length-1]), 
            time: c[2], name: c[3], type: c[4], p: c[5], tel: c[6], note: c[7] 
        };
    }).filter(e => e);
}

function renderCalendar(m, y) {
    const cal = document.getElementById("calendar");
    const names = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
    document.getElementById("monthDisplay").innerText = names[m] + " " + y;
    
    const first = new Date(y, m, 1).getDay();
    const total = new Date(y, m + 1, 0).getDate();
    document.querySelectorAll('.day').forEach(e => e.remove());

    for(let i=0; i<first; i++) cal.appendChild(Object.assign(document.createElement("div"), {className:"day"}));

    for(let d=1; d<=total; d++) {
        const dayEl = document.createElement("div");
        dayEl.className = "day";
        if(d === today.getDate() && m === today.getMonth()) dayEl.classList.add("today");
        dayEl.innerHTML = `<span>${d}</span>`;
        
        const dayData = allEvents.filter(e => e.m === (m+1) && e.d === d);
        if(dayData.length > 0) {
            const ind = document.createElement("div"); ind.className = "indicator";
            const isVip = dayData.some(e => (e.type+e.name+e.note).match(/VIP|市長|貴賓/));
            const dot = document.createElement("div");
            dot.className = isVip ? "dot has-vip" : "dot has-event";
            ind.appendChild(dot);
            dayEl.appendChild(ind);
        }
        
        dayEl.onclick = () => {
            document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
            dayEl.classList.add('selected');
            selectDate(m + 1, d);
        };
        cal.appendChild(dayEl);
    }
}

function selectDate(m, d) {
    const list = document.getElementById("eventList");
    document.getElementById("selectedDateTitle").innerText = `${m}月${d}日 行程`;
    
    const filtered = allEvents.filter(e => e.m === m && e.d === d).sort((a,b) => a.time.localeCompare(b.time));
    document.getElementById("eventCount").innerText = `${filtered.length} Events`;
    
    list.innerHTML = filtered.length ? "" : '<div style="text-align:center; padding:60px; color:#333; font-weight:700;">EMPTY</div>';

    filtered.forEach(e => {
        const isVip = (e.type+e.name+e.note).match(/VIP|市長|貴賓/);
        list.innerHTML += `
            <div class="event-card ${isVip ? 'vip' : ''}">
                <div class="card-top">
                    <div class="time-label">T- ${e.time}</div>
                    ${isVip ? '<div class="vip-tag">VIP</div>' : ''}
                </div>
                <div class="guest-name">${e.name}</div>
                <div class="meta-grid">
                    <div>👥 ${e.p} PAX</div>
                    <div>📍 ${e.type}</div>
                    <div style="grid-column: span 2">📞 ${e.tel}</div>
                </div>
                ${e.note ? `<div class="note-box">${e.note}</div>` : ""}
            </div>
        `;
    });
}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
