<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>🌿 AI 半年事件資料庫</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Noto Sans TC",sans-serif;
}

body{
    background:#0f1115;
    color:white;
    padding:18px;
}

.title{
    text-align:center;
    font-size:34px;
    font-weight:900;
    margin-top:10px;
}

.sub{
    text-align:center;
    opacity:.7;
    margin-top:8px;
    margin-bottom:25px;
    line-height:1.6;
}

.card{
    background:#1b1f27;
    border-radius:24px;
    padding:20px;
    margin-bottom:20px;
}

.upload{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#2b3240;
    color:white;
    font-size:17px;
}

.preview{
    width:100%;
    border-radius:20px;
    margin-top:15px;
    display:none;
}

.btn{
    width:100%;
    margin-top:15px;
    padding:18px;
    border:none;
    border-radius:20px;

    background:linear-gradient(
        135deg,
        #00c853,
        #0091ea
    );

    color:white;
    font-size:20px;
    font-weight:900;
}

.btn.red{
    background:linear-gradient(
        135deg,
        #ff5252,
        #ff1744
    );
}

.loading{
    text-align:center;
    margin-top:20px;
    display:none;
}

.month-title{
    margin-top:20px;
    margin-bottom:12px;
    font-size:28px;
    font-weight:900;
}

.event-card{

    background:#1e2633;

    padding:18px;

    border-radius:20px;

    margin-top:14px;
}

.event-date{
    font-size:24px;
    font-weight:900;
}

.event-time{
    margin-top:8px;
    font-size:18px;
    opacity:.9;
}

.event-type{
    margin-top:10px;
    font-size:18px;
    font-weight:800;
}

.event-detail{
    margin-top:10px;
    line-height:1.7;
    opacity:.85;
}

.search{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:#11151c;
    color:white;
    margin-top:10px;
    font-size:16px;
}

.footer{
    text-align:center;
    opacity:.45;
    margin-top:30px;
    font-size:13px;
}

</style>

</head>

<body>

<div class="title">
🌿 AI 半年事件資料庫
</div>

<div class="sub">
LINE截圖 → OCR → AI整理 → 半年事件時間軸
</div>

<div class="card">

<input
type="file"
id="imageInput"
accept="image/*"
class="upload">

<img
id="preview"
class="preview">

<button
class="btn"
onclick="scanImage()">

🔍 AI 開始整理

</button>

<button
class="btn red"
onclick="clearAll()">

🗑️ 清除全部資料

</button>

<div
class="loading"
id="loading">

⏳ AI OCR 分析中...

</div>

</div>

<div class="card">

<input
type="text"
id="searchInput"
class="search"
placeholder="🔍 搜尋日期 / VIP / 市長 / 攝影..."

onkeyup="renderEvents()">

</div>

<div class="card">

<h2>
📅 半年事件時間軸
</h2>

<div id="timeline"></div>

</div>

<div class="footer">
AI Timeline Dashboard PRO
</div>

<script>

// 🌿 AI關鍵字分類

const smartTypes = [

{
    keyword:"市長",
    type:"🔴 市長/VIP",
    color:"#ff5252"
},

{
    keyword:"VIP",
    type:"🟣 VIP",
    color:"#9c27b0"
},

{
    keyword:"貴賓",
    type:"🟣 VIP",
    color:"#9c27b0"
},

{
    keyword:"攝影",
    type:"🔵 攝影活動",
    color:"#2979ff"
},

{
    keyword:"拍攝",
    type:"🔵 拍攝活動",
    color:"#2979ff"
},

{
    keyword:"記者會",
    type:"🟠 記者會",
    color:"#ff9800"
},

{
    keyword:"導覽",
    type:"🟢 導覽需求",
    color:"#00c853"
},

{
    keyword:"KOL",
    type:"🟡 KOL活動",
    color:"#ffd600"
},

{
    keyword:"KOC",
    type:"🟡 KOC活動",
    color:"#ffd600"
},

{
    keyword:"警局",
    type:"🚓 警局相關",
    color:"#ff1744"
},

{
    keyword:"分局長",
    type:"🚨 長官層級",
    color:"#ff1744"
},

{
    keyword:"服務處",
    type:"🏛️ 服務處",
    color:"#26c6da"
},

{
    keyword:"議員",
    type:"🏛️ 議員相關",
    color:"#ff6d00"
},

{
    keyword:"立委",
    type:"🏛️ 立委相關",
    color:"#ff6d00"
}

];

const imageInput =
document.getElementById("imageInput");

const preview =
document.getElementById("preview");

const loading =
document.getElementById("loading");

const timeline =
document.getElementById("timeline");

// 🌿 資料庫

let events = JSON.parse(
    localStorage.getItem("timelineEvents")
) || [];

// 🌿 預覽圖片

imageInput.addEventListener("change",e=>{

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = ev => {

            preview.src = ev.target.result;

            preview.style.display = "block";
        };

        reader.readAsDataURL(file);
    }
});

// 🌿 OCR

async function scanImage(){

    const file =
    imageInput.files[0];

    if(!file){

        alert("請先上傳截圖");

        return;
    }

    loading.style.display = "block";

    try{

        const {
            data:{ text }
        } = await Tesseract.recognize(

            file,

            'chi_tra+eng',

            {
                logger:m=>console.log(m)
            }
        );

        loading.style.display = "none";

        analyzeAI(text);

    }catch(err){

        console.error(err);

        loading.style.display = "none";

        alert("OCR辨識失敗");
    }
}

// 🌿 AI分析

function analyzeAI(text){

    // 日期

    const dates =
    text.match(
        /\d{1,2}\/\d{1,2}|\d{1,2}月\d{1,2}日/g
    ) || [];

    // 時間

    const times =
    text.match(/\d{1,2}[:：]\d{2}/g) || [];

    smartTypes.forEach(type=>{

        if(text.includes(type.keyword)){

            dates.forEach((date,index)=>{

                const month =
                parseInt(date.split(/[\/月]/)[0]);

                const day =
                parseInt(date.match(/\d{1,2}(?=日|$)/));

                events.unshift({

                    month,
                    day,
                    date,

                    time:
                    times[index]
                    || "未指定",

                    type:
                    type.type,

                    keyword:
                    type.keyword,

                    color:
                    type.color,

                    raw:text
                });
            });
        }
    });

    // 🌿 去重複

    events = events.filter(
        (v,i,a)=>

        i===a.findIndex(t=>

            t.date===v.date &&
            t.type===v.type &&
            t.time===v.time
        )
    );

    // 🌿 儲存

    localStorage.setItem(
        "timelineEvents",
        JSON.stringify(events)
    );

    renderEvents();
}

// 🌿 顯示事件

function renderEvents(){

    const keyword =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

    timeline.innerHTML = "";

    let filtered =
    events.filter(e=>

        e.date.toLowerCase().includes(keyword)
        ||

        e.type.toLowerCase().includes(keyword)
        ||

        e.keyword.toLowerCase().includes(keyword)
    );

    // 🌿 排序

    filtered.sort((a,b)=>{

        if(a.month!==b.month){

            return a.month-b.month;
        }

        return a.day-b.day;
    });

    // 🌿 月份群組

    let grouped = {};

    filtered.forEach(e=>{

        if(!grouped[e.month]){

            grouped[e.month] = [];
        }

        grouped[e.month].push(e);
    });

    // 🌿 UI

    for(let month in grouped){

        timeline.innerHTML += `

        <div class="month-title">
            📅 ${month} 月
        </div>
        `;

        grouped[month].forEach(e=>{

            timeline.innerHTML += `

            <div
            class="event-card"

            style="
            border-left:
            8px solid ${e.color};
            ">

                <div class="event-date">
                    ${e.date}
                </div>

                <div class="event-time">
                    🕒 ${e.time}
                </div>

                <div class="event-type">
                    ${e.type}
                </div>

                <div class="event-detail">
                    關鍵字：
                    ${e.keyword}
                </div>

            </div>
            `;
        });
    }
}

// 🌿 清除全部

function clearAll(){

    if(confirm("確定清除全部資料？")){

        localStorage.removeItem(
            "timelineEvents"
        );

        events = [];

        renderEvents();
    }
}

// 🌿 啟動

renderEvents();

</script>

</body>
</html>
