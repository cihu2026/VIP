<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📌 後慈湖行程監控系統</title>
<style>
    /* ... (保留之前的 CSS 樣式) ... */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
    body{ background: #0f172a; color:#e2e8f0; font-family: "Noto Sans TC", sans-serif; padding:20px; }
    .card{ background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
    .today-status { text-align: center; font-size: 24px; font-weight: 900; padding: 15px; border-radius: 15px; }
    .detail-card { background: rgba(255,255,255,0.08); margin-bottom: 10px; padding: 15px; border-radius: 12px; border-left: 5px solid #3b82f6; }
    .badge { padding: 2px 8px; border-radius: 5px; font-size: 12px; float: right; }
    .info-row { margin: 5px 0; font-size: 15px; }
</style>
</head>
<body>

<div class="card">
    <div id="todayStatus" class="today-status">🔄 正在連線至試算表...</div>
</div>

<div class="card">
    <h2>🔔 即將到來行程 (自動過濾過期項目)</h2>
    <div id="detail">載入中...</div>
</div>

<script>
// 自動將編輯連結轉為 CSV 匯出連結
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

async function fetchData() {
    try {
        const response = await fetch(CSV_URL);
        const data = await response.text();
        processData(data);
    } catch (error) {
        document.getElementById("todayStatus").innerHTML = "❌ 無法讀取資料，請檢查共用權限";
    }
}

function processData(csvText) {
    const rows = csvText.split('\n').slice(1); // 略過標題列
    const detailContainer = document.getElementById("detail");
    const statusBox = document.getElementById("todayStatus");
    const now = new Date();
    const todayStr = `${now.getMonth() + 1}/${now.getDate()}`;
    
    let htmlContent = "";
    let count = 0;

    rows.forEach(row => {
        const cols = row.split(',');
        if (cols.length < 5) return;

        const dateVal = cols[1].trim();   // B欄: 日期
        const timeVal = cols[2].trim();   // C欄: 時間
        const eventName = cols[4].trim(); // E欄: 行程名稱
        const note = cols[7] ? cols[7].trim() : "";

        // 判斷是否為過去的行程
        const eventDate = new Date(`${now.getFullYear()}/${dateVal}`);
        const eventHour = parseInt(timeVal.split(':')[0]) || 0;
        
        // 清除日期時間對象，僅比對日期
        const todayNoon = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const targetDate = new Date(now.getFullYear(), eventDate.getMonth(), eventDate.getDate());

        const isPast = targetDate < todayNoon;
        const isToday = targetDate.getTime() === todayNoon.getTime();
        const isExpiredToday = isToday && eventHour < now.getHours();

        // 核心邏輯：如果日期已過，或是今天的時間已過，就不顯示
        if (!isPast && !isExpiredToday) {
            count++;
            const typeInfo = getTag(eventName + note);
            htmlContent += `
                <div class="detail-card" style="border-left-color: ${typeInfo.color}">
                    <span class="badge" style="background:${typeInfo.color}">${typeInfo.label}</span>
                    <div class="info-row"><b>📅 日期：</b>${dateVal} (${timeVal})</div>
                    <div class="info-row"><b>📌 行程：</b>${eventName}</div>
                    <div class="info-row"><b>👤 對象：</b>${cols[3]} (${cols[5]}人)</div>
                    <div class="info-row"><b>📞 電話：</b>${cols[6]}</div>
                    ${note ? `<div class="info-row"><b>📝 備註：</b>${note}</div>` : ''}
                </div>`;
        }
    });

    detailContainer.innerHTML = htmlContent || "<div style='text-align:center; padding:20px; opacity:0.5;'>目前沒有待辦行程</div>";
    statusBox.innerHTML = count > 0 ? `✅ 還有 ${count} 筆行程待處理` : "✅ 今日已無行程";
    statusBox.style.background = count > 0 ? "#1e3a8a" : "#065f46";
}

function getTag(text) {
    if (text.includes("VIP") || text.includes("市長") || text.includes("貴賓")) return {label:"VIP", color:"#ef4444"};
    if (text.includes("拍攝")) return {label:"拍攝", color:"#a855f7"};
    return {label:"一般", color:"#3b82f6"};
}

// 初始載入
fetchData();
// 每 5 分鐘自動刷新一次
setInterval(fetchData, 300000);
</script>
</body>
</html>
