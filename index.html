<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📌 後慈湖行程看板 (即時更新版)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        :root {
            --primary-bg: #0f172a;
            --vip-red: #ef4444;
            --confirm-orange: #f59e0b;
            --future-blue: #3b82f6;
        }
        *{ margin:0; padding:0; box-sizing:border-box; font-family: "SF Pro Display", "Noto Sans TC", sans-serif; }
        body{ background: radial-gradient(circle at top, #1e293b 0%, var(--primary-bg) 100%); color:#e2e8f0; padding:15px; min-height:100vh; }
        
        .header-section { text-align: center; margin: 20px 0; }
        .title{ font-size:28px; font-weight:900; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        
        .status-bar{ background: linear-gradient(135deg, #1e40af, #3b82f6); padding:15px; border-radius:18px; font-size:18px; font-weight:900; text-align:center; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        #detail { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 15px; }
        .detail-card{ background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding:18px; border-radius:20px; position: relative; animation: fadeIn 0.4s ease forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 特殊狀態樣式 */
        .is-confirm { border: 2px solid var(--confirm-orange); background: rgba(245, 158, 11, 0.1); }
        .is-confirm .badge { background: var(--confirm-orange) !important; }
        
        .badge{ position: absolute; top: 18px; right: 18px; padding:4px 10px; border-radius:6px; font-size:11px; font-weight:900; }
        h3 { margin-bottom: 12px; font-size: 18px; color: #60a5fa; padding-right: 60px; }
        
        .info-row { font-size: 14px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 8px; line-height: 1.4; }
        .info-label { opacity: 0.5; min-width: 20px; }
        
        .note-box { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; font-size: 13px; border-left: 3px solid #64748b; color: #cbd5e1; white-space: pre-wrap; }
        
        .date-tag { font-size: 12px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; margin-right: 5px; color: #fff; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="title">📌 後慈湖行程看板</div>
</div>

<div id="todayStatus" class="status-bar">⏳ 同步資料中...</div>

<div id="detail"></div>

<script>
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

function getStatusInfo(eventText = "", noteText = ""){
    const fullText = (eventText + noteText).toUpperCase();
    
    // 優先判斷是否待確認
    if(fullText.includes("待確認") || fullText.includes("未定") || fullText.includes("暫定")){
        return { label: "⚠️ 待確認", color: "#f59e0b", className: "is-confirm" };
    }
    if(fullText.includes("市長") || fullText.includes("VIP") || fullText.includes("貴賓")){
        return { label: "⭐ VIP", color: "#ef4444", className: "is-vip" };
    }
    if(fullText.includes("拍攝") || fullText.includes("攝影")){
        return { label: "📷 拍攝", color: "#a855f7", className: "" };
    }
    return { label: "📅 行程", color: "#3b82f6", className: "" };
}

async function loadSheet(){
    try{
        const res = await fetch(`${SHEET_URL}&cb=${new Date().getTime()}`);
        const csv = await res.text();
        parseCSV(csv);
    }catch(err){
        document.getElementById("todayStatus").innerHTML = "❌ 連線失敗";
    }
}

function parseCSV(csv){
    const lines = csv.split(/\r?\n/);
    const result = [];
    const pattern = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;

    for(let i = 1; i < lines.length; i++){
        if(!lines[i].trim()) continue;
        const cols = lines[i].split(pattern).map(v => v.replace(/^"|"$/g, '').trim());
        if(cols.length >= 7){
            result.push({
                date: cols[1], time: cols[2], name: cols[3], 
                event: cols[4], people: cols[5], phone: cols[6], note: cols[7] || ""
            });
        }
    }
    render(result);
}

function render(events){
    const detail = document.getElementById("detail");
    const status = document.getElementById("todayStatus");
    const now = new Date();
    
    // 取得今天凌晨的時間戳用於比較
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

    detail.innerHTML = "";
    let activeCount = 0;

    events.forEach(e => {
        if(!e.date || !e.date.includes("/")) return;

        // 解析日期 (假設格式為 MM/DD)
        const parts = e.date.split("/");
        const eventDate = new Date(now.getFullYear(), parseInt(parts[0]) - 1, parseInt(parts[1])).getTime();

        // --- 過濾邏輯：只顯示今天(含)以後的行程 ---
        if(eventDate < today) return;

        activeCount++;
        const state = getStatusInfo(e.event, e.note);

        detail.innerHTML += `
            <div class="detail-card ${state.className}">
                <span class="badge" style="background:${state.color}">${state.label}</span>
                <h3><span class="date-tag">${e.date}</span> ${e.time}</h3>
                <div class="info-row"><span class="info-label">👤</span><span><b>${e.name}</b> (${e.people}人)</span></div>
                <div class="info-row"><span class="info-label">📌</span><span>${e.event}</span></div>
                <div class="info-row"><span class="info-label">📞</span><span>${e.phone}</span></div>
                ${e.note ? `<div class="note-box"><b>備註：</b><br>${e.note}</div>` : ''}
            </div>
        `;
    });

    if(activeCount > 0){
        status.innerHTML = `✅ 今日及後續共有 ${activeCount} 筆行程`;
        status.style.background = "linear-gradient(135deg, #1e40af, #3b82f6)";
    } else {
        status.innerHTML = "✨ 目前無待辦行程";
        status.style.background = "linear-gradient(135deg, #059669, #10b981)";
        detail.innerHTML = "<div style='opacity:0.3; grid-column:1/-1; text-align:center; padding:50px;'>目前沒有待處理的預約</div>";
    }
}

loadSheet();
setInterval(loadSheet, 30000);
</script>
</body>
</html>
