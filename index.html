<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>🌿 AI 月曆整理系統</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Noto Sans TC",sans-serif;
    box-sizing:border-box;
}

body{
    background:#0f1115;
    color:white;
    padding:18px;
}

.title{
    text-align:center;
    font-size:34px;
    font-weight:900;
    margin-top:10px;
}

.sub{
    text-align:center;
    opacity:.7;
    margin-top:8px;
    margin-bottom:25px;
}

.card{
    background:#1b1f27;
    border-radius:24px;
    padding:20px;
    margin-bottom:20px;
}

.upload{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#2b3240;
    color:white;
    font-size:17px;
}

.btn{
    width:100%;
    margin-top:15px;
    padding:18px;
    border:none;
    border-radius:20px;

    background:linear-gradient(
        135deg,
        #00c853,
        #0091ea
    );

    color:white;
    font-size:20px;
    font-weight:900;
}

.btn.red{
    background:linear-gradient(
        135deg,
        #ff5252,
        #ff1744
    );
}

.loading{
    text-align:center;
    margin-top:20px;
    display:none;
}

.calendar{

    display:grid;

    grid-template-columns:
    repeat(7,1fr);

    gap:10px;
}

.day{

    background:#1e2633;

    border-radius:18px;

    min-height:90px;

    padding:10px;

    position:relative;
}

.day-number{
    font-size:18px;
    font-weight:900;
}

.dot{

    width:12px;
    height:12px;

    border-radius:50%;

    margin-top:8px;
}

.event-list{
    margin-top:20px;
}

.event-card{

    background:#1e2633;

    padding:18px;

    border-radius:20px;

    margin-top:15px;
}

.event-date{
    font-size:24px;
    font-weight:900;
}

.event-detail{
    margin-top:10px;
    line-height:1.8;
}

.preview{
    width:100%;
    border-radius:20px;
    margin-top:15px;
    display:none;
}

.footer{
    text-align:center;
    opacity:.45;
    margin-top:30px;
    font-size:13px;
}

</style>

</head>

<body>

<div class="title">
🌿 AI 月曆整理系統
</div>

<div class="sub">
LINE截圖 → AI分析 → 自動整理整月事件
</div>

<div class="card">

<input
type="file"
id="imageInput"
accept="image/*"
class="upload">

<img
id="preview"
class="preview">

<button
class="btn"
onclick="scanImage()">

🔍 AI 開始整理

</button>

<button
class="btn red"
onclick="clearAll()">

🗑️ 清除全部

</button>

<div
class="loading"
id="loading">

⏳ AI OCR 分析中...

</div>

</div>

<div class="card">

<h2>
📅 本月事件
</h2>

<br>

<div
class="calendar"
id="calendar">

</div>

</div>

<div class="card">

<h2>
📌 特殊事件列表
</h2>

<div
class="event-list"
id="eventList">

</div>

</div>

<div class="footer">
AI Calendar Dashboard PRO
</div>

<script>

// 🌿 AI關鍵字

const smartKeywords = [

"警局",
"分局長",
"服務處",
"立委",
"議員",
"長官",
"外加",
"獨立帶",
"VIP",
"貴賓",
"加梯",
"保留"

];

const imageInput =
document.getElementById("imageInput");

const preview =
document.getElementById("preview");

const loading =
document.getElementById("loading");

const calendar =
document.getElementById("calendar");

const eventList =
document.getElementById("eventList");

// 🌿 資料庫

let events = JSON.parse(
    localStorage.getItem("calendarEvents")
) || [];

// 🌿 月曆初始化

function renderCalendar(){

    calendar.innerHTML = "";

    for(let i=1;i<=31;i++){

        let hasEvent =
        events.some(e=>e.day==i);

        calendar.innerHTML += `

        <div class="day">

            <div class="day-number">
                ${i}
            </div>

            ${
                hasEvent
                ?
                `<div class="dot"
                style="background:#ff5252"></div>`
                :
                ""
            }

        </div>
        `;
    }
}

// 🌿 事件列表

function renderEvents(){

    eventList.innerHTML = "";

    events.sort((a,b)=>a.day-b.day);

    events.forEach(e=>{

        eventList.innerHTML += `

        <div class="event-card">

            <div class="event-date">
                📅 ${e.date}
            </div>

            <div class="event-detail">

                🕒 ${e.time}
                <br><br>

                ⚠️ ${e.type}

            </div>

        </div>
        `;
    });
}

// 🌿 預覽圖片

imageInput.addEventListener("change",e=>{

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = ev => {

            preview.src = ev.target.result;

            preview.style.display = "block";
        };

        reader.readAsDataURL(file);
    }
});

// 🌿 OCR

async function scanImage(){

    const file =
    imageInput.files[0];

    if(!file){

        alert("請先上傳截圖");

        return;
    }

    loading.style.display = "block";

    try{

        const {
            data:{ text }
        } = await Tesseract.recognize(

            file,

            'chi_tra+eng',

            {
                logger:m=>console.log(m)
            }
        );

        loading.style.display = "none";

        analyzeAI(text);

    }catch(err){

        console.error(err);

        loading.style.display = "none";

        alert("OCR辨識失敗");
    }
}

// 🌿 AI分析

function analyzeAI(text){

    // 日期

    const dateMatch =
    text.match(
        /\d{1,2}\/\d{1,2}|\d{1,2}月\d{1,2}日/g
    );

    // 時間

    const timeMatch =
    text.match(/\d{1,2}[:：]\d{2}/g);

    if(!dateMatch){

        alert("AI找不到日期");

        return;
    }

    let date =
    dateMatch[0];

    let day =
    parseInt(
        date.match(/\d{1,2}$/)
    );

    let time =
    timeMatch
    ?
    timeMatch[0]
    :
    "未找到";

    smartKeywords.forEach(k=>{

        if(text.includes(k)){

            events.unshift({

                date:date,

                day:day,

                time:time,

                type:k
            });
        }
    });

    // 🌿 儲存

    localStorage.setItem(
        "calendarEvents",
        JSON.stringify(events)
    );

    renderCalendar();

    renderEvents();
}

// 🌿 清除

function clearAll(){

    localStorage.removeItem(
        "calendarEvents"
    );

    events = [];

    renderCalendar();

    renderEvents();

    alert("已清除全部資料");
}

// 🌿 啟動

renderCalendar();

renderEvents();

</script>

</body>
</html>
