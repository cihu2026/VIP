<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIHU Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;500;700;900&display=swap');
        
        :root {
            --bg-color: #05070a;
            --accent-primary: #4f46e5; /* 靛藍色 */
            --accent-glow: rgba(79, 70, 229, 0.3);
            --vip-color: #ff3366;
            --pending-color: #ffcc00;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', "Noto Sans TC", sans-serif; }
        
        body { 
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(255, 51, 102, 0.05) 0%, transparent 40%);
            color: #fff; 
            padding: 24px; 
            min-height: 100vh;
            line-height: 1.6;
        }

        /* 標題美化 */
        .header { margin-bottom: 40px; }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .brand { font-size: 12px; font-weight: 800; letter-spacing: 4px; color: var(--accent-primary); text-transform: uppercase; }
        .month-display { font-size: 42px; font-weight: 900; letter-spacing: -2px; }

        /* 日曆卡片 */
        .calendar-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .weekday { 
            text-align: center; font-size: 11px; font-weight: 600; 
            color: #4b5563; padding-bottom: 16px; 
        }
        .day { 
            aspect-ratio: 1/1; border-radius: 14px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 17px; font-weight: 400; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .day:active { transform: scale(0.9); }
        
        /* 選中與今日樣式 */
        .day.today { background: #fff; color: #000; font-weight: 700; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .day.selected { border: 2px solid var(--accent-primary); }

        /* 行程小點 */
        .dot-container { display: flex; gap: 3px; position: absolute; bottom: 8px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.4); }
        .day.today .dot { background: rgba(0,0,0,0.3); }

        /* 行程清單 */
        .section-title { 
            margin: 48px 0 24px; font-size: 22px; font-weight: 700; 
            display: flex; justify-content: space-between; align-items: baseline;
        }
        .section-title span { font-size: 14px; color: #6b7280; font-weight: 400; }

        .event-card { 
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            position: relative;
            transition: all 0.3s;
        }
        .event-card:hover { background: rgba(255,255,255,0.05); }
        
        .time-box { font-size: 14px; color: var(--accent-primary); font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; }
        .vip-badge { background: var(--vip-color); color: #fff; padding: 2px 8px; border-radius: 6px; font-size: 10px; margin-left: 10px; }
        
        .event-name { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .event-meta { font-size: 15px; color: #94a3b8; display: flex; gap: 15px; flex-wrap: wrap; }
        
        .note-area { 
            margin-top: 16px; padding: 16px; background: rgba(0,0,0,0.2); 
            border-radius: 16px; font-size: 14px; color: #cbd5e1; border-left: 3px solid #334155;
        }

        #sync-status { position: fixed; bottom: 24px; right: 24px; font-size: 10px; color: #4b5563; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="brand">Cihu Admin Console</div>
        <div id="currentTime" style="font-size: 12px; color: #4b5563;"></div>
    </div>
    <div id="monthDisplay" class="month-display">MAY 2026</div>
</div>

<div class="calendar-card">
    <div class="calendar-grid" id="calendar">
        <div class="weekday">SUN</div><div class="weekday">MON</div><div class="weekday">TUE</div>
        <div class="weekday">WED</div><div class="weekday">THU</div><div class="weekday">FRI</div><div class="weekday">SAT</div>
    </div>
</div>

<div class="section-title">
    <div id="selectedDateLabel">Schedule</div>
    <span id="eventCount">0 Events</span>
</div>

<div id="eventList"></div>
<div id="sync-status">SYSTEM READY</div>

<script>
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let allEvents = [];
const now = new Date();

// 更新時間
setInterval(() => {
    const d = new Date();
    document.getElementById('currentTime').innerText = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}, 1000);

async function init() {
    try {
        const res = await fetch(`${SHEET_URL}&cb=${Date.now()}`);
        const csv = await res.text();
        allEvents = parseCSV(csv);
        render(now.getMonth(), now.getFullYear());
        selectDate(now.getMonth() + 1, now.getDate());
    } catch (e) {
        document.getElementById('sync-status').innerText = "CONNECTION ERROR";
    }
}

function parseCSV(csv) {
    const lines = csv.split(/\r?\n/).slice(1);
    return lines.map(line => {
        const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
        if(!c[1]) return null;
        const parts = c[1].split("/");
        return { 
            m: parseInt(parts[parts.length-2]), 
            d: parseInt(parts[parts.length-1]), 
            time: c[2], name: c[3], type: c[4], p: c[5], tel: c[6], note: c[7] 
        };
    }).filter(e => e);
}

function render(month, year) {
    const cal = document.getElementById("calendar");
    const mNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
    document.getElementById("monthDisplay").innerText = `${mNames[month]} ${year}`;
    
    const first = new Date(year, month, 1).getDay();
    const total = new Date(year, month + 1, 0).getDate();
    document.querySelectorAll('.day').forEach(e => e.remove());

    for(let i=0; i<first; i++) cal.appendChild(Object.assign(document.createElement("div"), {className: "day"}));

    for(let d=1; d<=total; d++) {
        const dayEl = document.createElement("div");
        dayEl.className = "day";
        if(d === now.getDate() && month === now.getMonth()) dayEl.classList.add("today");
        dayEl.innerHTML = `<span>${d}</span>`;
        
        const dayData = allEvents.filter(e => e.m === (month + 1) && e.d === d);
        if(dayData.length > 0) {
            const dots = document.createElement("div"); dots.className = "dot-container";
            dayData.slice(0,3).forEach(ev => {
                const dot = document.createElement("div"); dot.className = "dot";
                if((ev.type+ev.note+ev.name).match(/VIP|市長|貴賓/)) dot.style.background = "var(--vip-color)";
                dots.appendChild(dot);
            });
            dayEl.appendChild(dots);
        }
        dayEl.onclick = () => {
            document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
            dayEl.classList.add('selected');
            selectDate(month + 1, d);
        };
        cal.appendChild(dayEl);
    }
}

function selectDate(m, d) {
    const list = document.getElementById("eventList");
    const label = document.getElementById("selectedDateLabel");
    const count = document.getElementById("eventCount");
    label.innerText = `${m}月${d}日 行程`;
    
    const filtered = allEvents.filter(e => e.m === m && e.d === d).sort((a,b) => a.time.localeCompare(b.time));
    count.innerText = `${filtered.length} Events`;
    list.innerHTML = filtered.length ? "" : "<div style='opacity:0.2; padding:40px; text-align:center;'>No Schedule</div>";

    filtered.forEach(e => {
        const isVip = (e.type+e.note+e.name).match(/VIP|市長|貴賓/);
        list.innerHTML += `
            <div class="event-card">
                <div class="time-box">⏰ ${e.time} ${isVip ? '<span class="vip-badge">VIP GUEST</span>' : ''}</div>
                <div class="event-name">${e.name}</div>
                <div class="event-meta">
                    <span>👥 ${e.p}人</span>
                    <span>📍 ${e.type}</span>
                    <span>📞 ${e.tel}</span>
                </div>
                ${e.note ? `<div class="note-area">${e.note}</div>` : ""}
            </div>
        `;
    });
}

init();
setInterval(init, 60000);
</script>
</body>
</html>
