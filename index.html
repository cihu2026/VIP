<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>🌿 後慈湖 VIP 警示日曆</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Noto Sans TC",sans-serif;
}

body{
    background:#0f1115;
    color:white;
    padding:18px;
}

.title{
    text-align:center;
    font-size:34px;
    font-weight:900;
    margin-top:10px;
}

.sub{
    text-align:center;
    opacity:.7;
    margin-top:8px;
    margin-bottom:25px;
}

.card{
    background:#1b1f27;
    border-radius:24px;
    padding:20px;
    margin-bottom:20px;
}

.today{

    text-align:center;

    font-size:26px;

    font-weight:900;
}

.today-status{

    margin-top:15px;

    padding:18px;

    border-radius:20px;

    font-size:24px;

    font-weight:900;
}

.event-card{

    background:#1e2633;

    padding:18px;

    border-radius:20px;

    margin-top:14px;
}

.event-date{

    font-size:24px;

    font-weight:900;
}

.event-time{

    margin-top:8px;

    font-size:18px;
}

.event-type{

    margin-top:10px;

    font-size:18px;

    font-weight:800;
}

.event-note{

    margin-top:10px;

    opacity:.85;

    line-height:1.7;
}

.month-title{

    margin-top:24px;

    margin-bottom:12px;

    font-size:28px;

    font-weight:900;
}

.footer{

    text-align:center;

    opacity:.45;

    margin-top:30px;

    font-size:13px;
}

</style>

</head>

<body>

<div class="title">
🌿 後慈湖 VIP 警示日曆
</div>

<div class="sub">
Google 表單同步版
</div>

<div class="card">

<div class="today">
📅 今日狀態
</div>

<div
id="todayStatus"
class="today-status">

⏳ 讀取中...

</div>

</div>

<div class="card">

<h2>
📌 未來 VIP 活動
</h2>

<div id="timeline"></div>

</div>

<div class="footer">
VIP Alert Dashboard
</div>

<script>

// 🌿 Google Sheet CSV網址

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/你的ID/export?format=csv";

// 🌿 AI分類

function getType(text){

    text = text || "";

    if(
        text.includes("市長")
        ||
        text.includes("VIP")
        ||
        text.includes("貴賓")
    ){

        return {
            type:"🔴 VIP活動",
            color:"#ff5252"
        };
    }

    if(
        text.includes("拍攝")
        ||
        text.includes("攝影")
    ){

        return {
            type:"🟣 拍攝活動",
            color:"#9c27b0"
        };
    }

    if(
        text.includes("記者會")
    ){

        return {
            type:"🟠 記者會",
            color:"#ff9800"
        };
    }

    if(
        text.includes("導覽")
    ){

        return {
            type:"🟢 導覽需求",
            color:"#00c853"
        };
    }

    return {
        type:"📌 一般活動",
        color:"#2979ff"
    };
}

// 🌿 讀Google資料

async function loadSheet(){

    try{

        const res =
        await fetch(SHEET_URL);

        const csv =
        await res.text();

        parseCSV(csv);

    }catch(err){

        console.error(err);

        document.getElementById(
            "todayStatus"
        ).innerHTML =
        "❌ 無法讀取 Google Sheet";
    }
}

// 🌿 解析CSV

function parseCSV(csv){

    const rows =
    csv.split("\n").slice(1);

    let events = [];

    rows.forEach(r=>{

        const cols = r.split(",");

        if(cols.length >= 5){

            events.push({

                date:cols[1],
                time:cols[2],
                event:cols[3],
                people:cols[4],
                note:cols[5] || ""
            });
        }
    });

    renderEvents(events);
}

// 🌿 顯示

function renderEvents(events){

    const timeline =
    document.getElementById("timeline");

    timeline.innerHTML = "";

    // 今天

    const today =
    new Date();

    const todayText =
    `${today.getMonth()+1}/${today.getDate()}`;

    let todayVip = false;

    // 月份群組

    let grouped = {};

    events.forEach(e=>{

        const month =
        parseInt(
            e.date.split(/[\/月]/)[0]
        );

        if(!grouped[month]){

            grouped[month] = [];
        }

        grouped[month].push(e);

        // 今日VIP判斷

        if(
            e.date.includes(todayText)
        ){

            const all =
            `${e.event} ${e.note}`;

            if(
                all.includes("市長")
                ||
                all.includes("VIP")
                ||
                all.includes("貴賓")
            ){

                todayVip = true;
            }
        }
    });

    // 今日狀態

    const status =
    document.getElementById("todayStatus");

    if(todayVip){

        status.innerHTML =
        "🔴 今日有 VIP / 貴賓活動";

        status.style.background =
        "#ff5252";

    }else{

        status.innerHTML =
        "🟢 今日無特殊貴賓";

        status.style.background =
        "#00c853";
    }

    // 月曆

    for(let month in grouped){

        timeline.innerHTML += `

        <div class="month-title">
            📅 ${month} 月
        </div>
        `;

        grouped[month].forEach(e=>{

            const info =
            getType(
                `${e.event} ${e.note}`
            );

            timeline.innerHTML += `

            <div
            class="event-card"

            style="
            border-left:
            8px solid ${info.color};
            ">

                <div class="event-date">
                    ${e.date}
                </div>

                <div class="event-time">
                    🕒 ${e.time}
                </div>

                <div class="event-type">
                    ${info.type}
                </div>

                <div class="event-note">

                    📌 ${e.event}

                    <br><br>

                    👥 ${e.people}

                    <br><br>

                    📝 ${e.note}

                </div>

            </div>
            `;
        });
    }
}

// 🌿 啟動

loadSheet();

</script>

</body>
</html>
