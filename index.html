<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📌 後慈湖行政行程看板</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --bg: #0b0f1a;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --vip: #f43f5e;
            --pending: #f59e0b;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: "SF Pro Display", "Noto Sans TC", sans-serif; }
        
        body { 
            background: radial-gradient(circle at top left, #1e293b 0%, var(--bg) 60%); 
            color: #f1f5f9; 
            padding: 16px; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* 標題區 */
        .header { margin: 20px 0 25px; display: flex; justify-content: space-between; align-items: center; }
        .month-title { font-size: 32px; font-weight: 900; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 日曆容器 */
        .calendar-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 18px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .weekday { text-align: center; font-size: 14px; font-weight: 900; color: #64748b; padding-bottom: 12px; text-transform: uppercase; }

        .day { 
            aspect-ratio: 1/1; 
            background: rgba(255,255,255,0.02); 
            border-radius: 18px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 20px; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .day:active { transform: scale(0.9); }

        .day.today { 
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--accent);
            color: #60a5fa;
            position: relative;
        }
        .day.today::before {
            content: ''; position: absolute; inset: -4px; border: 2px solid var(--accent); border-radius: 22px; opacity: 0.3; animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0; } 100% { transform: scale(1); opacity: 0.3; } }

        /* 點點標記 */
        .dots { display: flex; gap: 4px; margin-top: 6px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; }

        /* 行程卡片清單 */
        .details-title { margin: 35px 0 15px; font-size: 26px; font-weight: 900; letter-spacing: -1px; }
        .event-list { display: flex; flex-direction: column; gap: 16px; padding-bottom: 60px; }

        .event-item { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 24px; border-radius: 28px;
            position: relative; overflow: hidden;
            transition: 0.3s;
        }

        .event-item::before {
            content: ''; position: absolute; left: 0; top: 0; width: 6px; height: 100%; background: var(--accent);
        }

        .event-item.vip::before { background: var(--vip); box-shadow: 4px 0 15px rgba(244, 63, 94, 0.4); }
        .event-item.vip { background: linear-gradient(to right, rgba(244, 63, 94, 0.05), transparent); }
        
        .event-item.pending::before { background: var(--pending); }

        .time-tag { font-size: 18px; font-weight: 900; color: #94a3b8; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .name-row { font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 6px; }
        .info-text { font-size: 19px; color: #cbd5e1; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
        
        .note-box { 
            margin-top: 18px; padding: 18px; background: rgba(0,0,0,0.2); 
            border-radius: 16px; font-size: 18px; color: #94a3b8; line-height: 1.6; border: 1px solid rgba(255,255,255,0.05);
        }

        .badge { padding: 4px 12px; border-radius: 10px; font-size: 14px; color: #fff; font-weight: 900; text-transform: uppercase; }
        
        #update-status { font-size: 12px; color: #475569; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div id="monthDisplay" class="month-title">2026 MAY</div>
</div>

<div class="calendar-container">
    <div class="calendar-grid" id="calendar">
        <div class="weekday">Sun</div><div class="weekday">Mon</div><div class="weekday">Tue</div>
        <div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div><div class="weekday">Sat</div>
    </div>
</div>

<div class="details-title">Schedule <span id="selectedDateText" style="color:var(--accent)">- 今天</span></div>
<div id="eventList" class="event-list"></div>
<div id="update-status">自動同步中...</div>

<script>
const SHEET_ID = "1HAWiDkq7R8B7Q1aPofH8AAg-WFJ-RMGFRt1pZHeFxOg";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

let allEvents = [];
const now = new Date();

async function init() {
    try {
        const res = await fetch(`${SHEET_URL}&cb=${new Date().getTime()}`);
        const csv = await res.text();
        allEvents = parseCSV(csv);
        renderCalendar(now.getFullYear(), now.getMonth());
        showEvents(now.getMonth() + 1, now.getDate());
        document.getElementById('update-status').innerText = `最後更新: ${new Date().toLocaleTimeString()}`;
    } catch (e) { document.getElementById("monthDisplay").innerText = "Connection Error"; }
}

function parseCSV(csv) {
    const lines = csv.split(/\r?\n/).slice(1);
    const pattern = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
    return lines.map(line => {
        const c = line.split(pattern).map(v => v.replace(/^"|"$/g, '').trim());
        if(!c[1] || !c[1].includes("/")) return null;
        const [m, d] = c[1].split("/").map(Number);
        return { month: m, day: d, time: c[2], name: c[3], event: c[4], people: c[5], phone: c[6], note: c[7] || "" };
    }).filter(e => e);
}

function renderCalendar(year, month) {
    const cal = document.getElementById("calendar");
    const mNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
    document.getElementById("monthDisplay").innerText = `${year} ${mNames[month]}`;
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    document.querySelectorAll('.day').forEach(d => d.remove());

    for(let i=0; i<firstDay; i++) {
        const div = document.createElement("div"); div.className = "day"; cal.appendChild(div);
    }

    for(let d=1; d<=daysInMonth; d++) {
        const div = document.createElement("div");
        div.className = "day";
        if(d === now.getDate() && month === now.getMonth()) div.classList.add("today");
        div.innerHTML = `<span>${d}</span>`;
        
        const dayEvents = allEvents.filter(e => e.month === (month + 1) && e.day === d);
        if(dayEvents.length > 0) {
            const dotContainer = document.createElement("div");
            dotContainer.className = "dots";
            dayEvents.slice(0,3).forEach(ev => {
                const dot = document.createElement("div"); dot.className = "dot";
                const t = (ev.event + ev.note).toUpperCase();
                if(t.includes("VIP") || t.includes("市長") || t.includes("貴賓")) dot.style.background = "var(--vip)";
                else if(t.includes("待確認") || t.includes("暫定")) dot.style.background = "var(--pending)";
                else dot.style.background = "#fff";
                dotContainer.appendChild(dot);
            });
            div.appendChild(dotContainer);
        }

        div.onclick = () => {
            document.querySelectorAll('.day').forEach(el => el.style.borderColor = "transparent");
            div.style.borderColor = "var(--accent)";
            showEvents(month + 1, d);
            document.querySelector('.details-title').scrollIntoView({ behavior: 'smooth' });
        };
        cal.appendChild(div);
    }
}

function showEvents(m, d) {
    const list = document.getElementById("eventList");
    document.getElementById("selectedDateText").innerText = `- ${m}/${d}`;
    list.innerHTML = "";

    const filtered = allEvents.filter(e => e.month === m && e.day === d).sort((a,b) => a.time.localeCompare(b.time));

    if(filtered.length === 0) {
        list.innerHTML = "<div style='opacity:0.3; text-align:center; padding:60px; font-size:20px;'>No Scheduled Events</div>";
        return;
    }

    filtered.forEach(e => {
        const t = (e.event + e.note).toUpperCase();
        let typeClass = ""; let badge = "";
        if(t.includes("VIP") || t.includes("市長") || t.includes("貴賓")) { 
            typeClass = "vip"; badge = "<span class='badge' style='background:var(--vip)'>VIP</span>"; 
        } else if(t.includes("待確認") || t.includes("暫定")) { 
            typeClass = "pending"; badge = "<span class='badge' style='background:var(--pending); color:#000'>PENDING</span>"; 
        }

        list.innerHTML += `
            <div class="event-item ${typeClass}">
                <div class="time-tag">🕒 ${e.time} ${badge}</div>
                <div class="name-row">${e.name} <span style="font-size:18px; opacity:0.5; font-weight:400;">/ ${e.people}P</span></div>
                <div class="info-text">📍 ${e.event}</div>
                <div class="info-text">📞 ${e.phone}</div>
                ${e.note ? `<div class="note-box">Note: ${e.note}</div>` : ""}
            </div>
        `;
    });
}

init();
setInterval(init, 30000); // 30秒自動重整
</script>
</body>
</html>
