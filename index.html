<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌿 LINE AI 智能排程板</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1b1f27;
            --input-bg: #11151c;
            --accent-green: #00c853;
            --accent-blue: #0091ea;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Noto Sans TC", sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); padding: 15px; }

        .header { text-align: center; margin: 20px 0 30px; }
        .title { font-size: 28px; font-weight: 900; letter-spacing: 1px; }
        .sub { opacity: .6; font-size: 14px; margin-top: 5px; }

        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2 { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        textarea { 
            width: 100%; min-height: 120px; border: none; border-radius: 15px; 
            background: var(--input-bg); color: white; padding: 15px; font-size: 15px; 
            line-height: 1.6; resize: none; outline: none;
        }

        .btn-group { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { 
            padding: 15px; border: none; border-radius: 15px; color: white; 
            font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-main { background: linear-gradient(135deg, var(--accent-green), var(--accent-blue)); }
        .btn-red { background: #3d161a; color: #ff5252; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        .search-bar {
            width: 100%; padding: 12px 20px; border: none; border-radius: 30px;
            background: var(--input-bg); color: white; margin-bottom: 10px; outline: none;
        }

        /* 時間軸樣式 */
        .month-section { margin-top: 30px; }
        .month-title { 
            font-size: 22px; font-weight: 900; margin-bottom: 15px; 
            padding-left: 10px; border-left: 5px solid var(--accent-green);
        }

        .event-item {
            display: flex; gap: 15px; margin-bottom: 15px;
            background: #242a35; border-radius: 18px; padding: 15px;
            animation: fadeIn 0.4s ease-out;
        }

        /* 左側日曆方塊 */
        .date-box {
            min-width: 65px; height: 75px; background: #2d3544;
            border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-top: 4px solid var(--accent-green);
        }
        .date-day { font-size: 22px; font-weight: 900; }
        .date-weekday { font-size: 12px; opacity: 0.6; }

        /* 右側內容 */
        .event-content { flex: 1; }
        .event-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .event-time { font-weight: 700; color: var(--accent-blue); font-size: 15px; }
        .event-tag { 
            font-size: 11px; padding: 2px 8px; border-radius: 6px; 
            background: rgba(255,255,255,0.1); font-weight: 600;
        }
        .event-note { 
            margin-top: 8px; font-size: 14px; line-height: 1.6; 
            white-space: pre-wrap; word-break: break-all; color: #e0e0e0;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .footer { text-align: center; opacity: 0.3; font-size: 12px; margin: 40px 0; }
    </style>
</head>
<body>

<div class="header">
    <div class="title">🌿 LINE AI 排程板</div>
    <div class="sub">自動解析訊息，建立半年活動排程</div>
</div>

<div class="card">
    <h2>📝 貼上訊息</h2>
    <textarea id="inputText" placeholder="直接貼上 LINE 訊息，例如：&#10;6/26 13:30 開幕記者會 (市長出席)"></textarea>
    <div class="btn-group">
        <button class="btn btn-main" onclick="analyzeText()">🤖 AI 智能加入</button>
        <button class="btn btn-red" onclick="clearAll()">清除</button>
    </div>
</div>

<input type="text" id="searchInput" class="search-bar" placeholder="🔍 搜尋關鍵字或日期..." onkeyup="renderEvents()">

<div id="timeline">
    <!-- 事件會顯示在這裡 -->
</div>

<div class="footer">Line Schedule AI Dashboard v2.0</div>

<script>
    const smartTypes = [
        { keyword: "市長", type: "🔴 市長行程", color: "#ff5252" },
        { keyword: "VIP", type: "🟣 VIP貴賓", color: "#9c27b0" },
        { keyword: "記者會", type: "🟠 記者會", color: "#ff9800" },
        { keyword: "拍攝", type: "🔵 攝影採訪", color: "#2979ff" },
        { keyword: "攝影", type: "🔵 攝影採訪", color: "#2979ff" },
        { keyword: "議員", type: "🏛️ 議會相關", color: "#ff6d00" },
        { keyword: "導覽", type: "🟢 導覽需求", color: "#00c853" }
    ];

    let events = JSON.parse(localStorage.getItem("lineEvents")) || [];

    function analyzeText() {
        const text = document.getElementById("inputText").value.trim();
        if (!text) return alert("請輸入內容");

        // 1. 提取日期 (支援 M/D, M月D日)
        const dateMatch = text.match(/(\d{1,2})[\/\.月](\d{1,2})/);
        // 2. 提取時間 (支援 HH:mm)
        const timeMatch = text.match(/(\d{1,2})[:：](\d{2})/);

        let month = dateMatch ? parseInt(dateMatch[1]) : (new Date().getMonth() + 1);
        let day = dateMatch ? parseInt(dateMatch[2]) : new Date().getDate();
        let time = timeMatch ? timeMatch[0] : "全天";

        // 計算星期
        const currentYear = new Date().getFullYear();
        const dateObj = new Date(currentYear, month - 1, day);
        const weekdays = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
        let weekday = weekdays[dateObj.getDay()];

        // 3. AI 分類
        let type = "📌 一般事件";
        let color = "#00c853";
        smartTypes.forEach(t => {
            if (text.includes(t.keyword)) {
                type = t.type;
                color = t.color;
            }
        });

        const newEvent = {
            id: Date.now(),
            month, day, weekday, time, type, color,
            note: text,
            fullDate: `${month}/${day}`
        };

        events.push(newEvent);
        saveAndRender();
        document.getElementById("inputText").value = "";
    }

    function saveAndRender() {
        // 排序：先比月份，再比日期，最後比時間
        events.sort((a, b) => a.month !== b.month ? a.month - b.month : a.day - b.day);
        localStorage.setItem("lineEvents", JSON.stringify(events));
        renderEvents();
    }

    function renderEvents() {
        const keyword = document.getElementById("searchInput").value.toLowerCase();
        const timeline = document.getElementById("timeline");
        timeline.innerHTML = "";

        const filtered = events.filter(e => e.note.toLowerCase().includes(keyword) || e.type.toLowerCase().includes(keyword));

        // 月份分組顯示
        let currentMonth = -1;
        filtered.forEach(e => {
            if (e.month !== currentMonth) {
                currentMonth = e.month;
                const mTitle = document.createElement('div');
                mTitle.className = 'month-title';
                mTitle.innerText = `📅 ${currentMonth}月`;
                timeline.appendChild(mTitle);
            }

            const item = document.createElement('div');
            item.className = 'event-item';
            item.innerHTML = `
                <div class="date-box" style="border-top-color: ${e.color}">
                    <div class="date-day">${e.day}</div>
                    <div class="date-weekday">${e.weekday}</div>
                </div>
                <div class="event-content">
                    <div class="event-header">
                        <span class="event-time">🕒 ${e.time}</span>
                        <span class="event-tag" style="color:${e.color}">${e.type}</span>
                    </div>
                    <div class="event-note">${e.note}</div>
                </div>
            `;
            timeline.appendChild(item);
        });
    }

    function clearAll() {
        if (confirm("確定要清空所有排程嗎？")) {
            events = [];
            saveAndRender();
        }
    }

    renderEvents();
</script>

</body>
</html>
